front:
  text: 大方廣圓覺經疏序唐江西道觀察使洪州刺史兼御史大夫裴休述夫血氣之屬必在知凡有知者必同體所謂真淨明妙虗徹靈通卓然而獨存者也是衆生之本源故曰心地是諸佛之所得故曰菩提交徹融攝故曰法界寂靜常樂故曰涅槃不濁不漏故曰清淨不妄不變故曰真如離過絶非故曰佛性護善遮惡故曰總持隱覆含攝故曰如來藏超越玄閟故曰密嚴國統衆德而大備爍羣昏而獨照故曰圓覺其實皆一心也背之則凡順之則聖迷之則生死始悟之則輪回息親而求之則止觀定慧推而廣之則六度萬行引而為智然後為正智依而為因然後為正因其實皆一法也終日圓覺而未嘗圓覺者凡夫也欲證圓覺而未極圓覺者菩薩也具足圓覺而住持圓覺者如來也離圓覺無六道捨圓覺無三乘非圓覺無如來泯圓覺無真法其實皆一道也三世諸佛之所證蓋證此也如來為一大事出現蓋為此也三藏十二部一切修多羅蓋詮此也然如來垂教指法有顯密立義有廣略乘時有前後當機有深淺非上根圓智其孰能大通之故如來於光明藏與十二大士密説而顯演潛通而廣被以印定其法為一切經之宗也圭峰禪師得法於荷澤嫡孫南印上足道圓和尚一日隨衆僧齋于州民任灌家居下位以次受經遇圓覺了義卷未終軸感悟流涕歸以所悟告其師師撫之曰汝當大弘圓頓之教此經諸佛授汝耳禪師既佩南宗密印受圓覺懸記於是閲大藏經律通唯識起信等論然後頓轡於華嚴法界宴坐於圓覺妙場究一雨之所霑窮五教之殊致乃為之疏解凡大疏三卷大鈔十三卷略疏兩卷小鈔六卷道場修證義一十八卷並行於世其敘教也圓其見法也徹其釋義也端如析薪其入觀也明若秉燭其辭也極於理而已不虗騁其文也扶於教而已不苟飾不以其所長病人故無排斥之説不以其未至蓋人故無胸臆之論蕩蕩然實十二部經之眼目三十五祖之骨髓生靈之大本三世之達道後世雖有作者不能過矣其四依之一乎或淨土之親聞乎何盡其義味如此也或曰道無形視者莫能覩道無方行者莫能至況文字乎在性之而已豈區區數萬言而可詮之哉對曰噫是不足以語道也前不云乎統衆德而大備爍羣昏而獨照者圓覺也蓋圓覺能出一切法一切法未嘗離圓覺今夫經律論三藏之文傳于中國者五千餘卷其所詮者何也戒定慧而已修戒定慧而求者何也圓覺而已圓覺一法也張萬行而求之者何衆生之根器異也然則大藏皆圓覺之經此疏乃大藏之疏也羅五千軸之文而以數卷之疏通之豈不至簡哉何言其繁也及其斷言語之道息思想之心忘能所滅影像然後為得也固不在詮表耳嗚呼生靈之所以往來者六道也鬼神沈幽愁之苦鳥獸懷獝狘之悲修羅方瞋諸天正樂可以整心慮趣菩提唯人道為能耳人而不為吾未如之何也已矣休常遊禪師之閫域受禪師之顯訣無以自效輒直讚其法而普告大衆耳其他備乎本序云大方廣圓覺經大疏本序終南山草堂寺沙門宗密述元亨利貞乾之德也始於一氣常樂我淨佛之德也本乎一心專一氣而致柔修一心而成道心也者沖虗妙粹炳煥靈明無去無來冥通三際非中非外洞徹十方不滅不生豈四山之可害離性離相奚五色之能盲處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天大矣哉萬法資始也萬法虗偽緣會而生生法本無一切唯識識如幻夢但是一心心寂而知目之圓覺彌滿清淨中不容他故德用無邊皆同一性性起為相境智歷然相得性融身心廓爾方之海印超彼太虗恢恢焉晃晃焉逈出思議之表我佛證此憫物迷之再歎奇哉三思大事既全十力能摧樹下魔軍爰起四心欲示宅中寶藏然迷頭捨父悟有易難故仙苑覺場教興頓漸漸設五時之異空有迭彰頓無二諦之殊幽靈絶待今此經者頓之類歟故如來入寂光土凡聖一源現受用身主伴同會曼殊大士創問本起之因薄伽至尊首提究竟之果照斯真體滅彼夢形知無我人誰受輪轉種種幻化生於覺心幻盡覺圓心通法遍心本是佛由念起而漂沈岸實不移因舟行而鶩驟頓除妄宰空不生華漸竭愛源金無重礦理絶修證智似階差覺前前非名後後位況妄忘起滅德等圓明者焉然出廄良駒已搖鞭影薶塵大寶須設治方故三觀澄明真假俱入諸輪綺互單復圓修四相潛神非覺違拒四病出體心華發明復令長中下期克念攝念而加行別遍互習業障惑障而銷亡成就慧身靜極覺遍百千世界佛境現前是以聞五種名超剎寶施福説半偈義勝河沙小乘實由無法不持無機不被者也噫巴歌和衆似量騰於猿心雪曲應稀了義匿於龍藏宗密髫專魯誥冠討竺墳俱溺筌唯味糟粕幸於涪上針芥相投禪遇南宗教逢斯典一言之下心地開通一軸之中義天朗耀頃以道非常道諸行無常今知心是佛心定當作佛然佛稱種智修假多聞故復行詣百城坐探羣籍講雖濫泰學且師安叨沐猶吾之納謬當真子之印再逢親友彌感佛恩久慨孤貧將陳法施採集般若綸貫華嚴提挈毗尼發明唯識然醫方萬品宜選對治海寶千般先求如意觀夫文富義博誠讓雜華指體投機無偕圓覺故參詳諸論反復百家以利其器方為疏解冥心聖旨極思研精義備性相禪兼頓漸使遊刃之士無假傍求反照之徒不看他面斯其志矣大者絶諸邊量方廣正而含容圓者德無不周覺者靈源不昧修多羅總指諸部了義者別歎斯文經者貫穿義華以之攝化羣品故云大方廣圓覺修多羅了義經也大方廣圓覺經大疏目録卷首序文二首卷上之一先經十門通釋一之三卷上之二先經十門通釋四之十卷上之三自入於神通大光明藏至永斷無明方成佛道文殊章卷上之四自云何無明文殊章至覺則無漸次方便亦如是普賢章卷中之一自普眼啓請至二十五有清淨卷中之二自彼清淨故十力四無所畏訖普眼章卷中之三自金剛藏啓請至是故復生地獄餓鬼彌勒章卷中之四自知欲可厭彌勒章訖清淨慧章卷下之一自威德啓請訖辨音章卷下之二自淨業啓請訖淨業章卷下之三自普覺啓請至安置淨居圓覺章卷下之四自若佛現在當正思惟圓覺章訖賢善首章卷尾疏科文上下卷大方廣圓覺經大疏目録終
