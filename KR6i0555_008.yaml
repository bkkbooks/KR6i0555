body:
  text: 終南山草堂寺沙門宗密述第二徵釋迷悟始終文四初三今初於是金剛藏菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解之可知二正陳詞句中三一慶其所悟大悲世尊善為一切諸菩薩衆宣揚如來圓覺清淨大陀羅尼因地法門漸次方便與諸衆生開發蒙昧在會法衆承佛慈誨幻翳朗然慧目清淨解曰兼指初段中因地法行者是一切行位根本故後必躡前故二難其所疑世尊若諸衆生本來成佛何故復有一切無明若諸無明衆生本有何因緣故如來復説本來成佛十方異生本成佛道後起無明一切如來何時復生一切煩惱解曰由前云衆生本成佛道故起此疑疑有三句一謂真能生妄二謂説妄為真三牒而縱之責無窮過意云本來是佛煩惱何生若無生中妄生起者如來成佛同本無生無生之中還應妄起成佛義等生否應齊齊生則果佛何尊齊否則因違現事進退不可故有斯云亦如復禮法師云真法性本淨妄法何由起如初句也妄法從真生此妄安可止如第三句三結請通釋唯願不捨無遮大慈為諸菩薩開祕密藏及為末世一切衆生得聞如是修多羅教了義法門永斷疑悔作是語已五體投地如是三請終而復始解曰據此三難諸典無文唯佛了知登地方受今乃請宣成教普示末世凡夫故曰無遮大慈開祕密藏祕謂非器不傳密謂覆相而説或隨自意或隨他意權實難測祕藏如不開匱密藏則一法含多今請不揀末世則開祕藏顯了而談則開密藏故涅槃云具縛凡夫能知如來祕密之藏了義法門者由此標目永斷疑悔者疑是根本通論疑者於諸諦理猶豫為性能障信心善品為業別顯則五蓋中疑有三一疑自謂己不能入理二疑師謂彼不能善教三疑法謂於所學為令出離為不出離又疑理事空有雙是雙非等如有病人疑自疑醫疑藥病終不愈今三疑中即疑法也此疑復有已起未起如天親判金剛經斷疑之意今皆含之剛藏為他請問令永斷故然斷疑方便者若疑境界令悟唯心若疑法性令觀無得餘皆例知今此斷疑通二方便對文可解悔者通論是不定之法悔善則惡悔惡則善故今請永斷即屬悔惡也亦五蓋數但此不因掉也然入道人若未通決生佛同異則或用功多時反自疑悔後三展虔誠也二讚許中爾時世尊告金剛藏菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來甚深祕密究竟方便是諸菩薩最上教誨了義大乘能使十方修學菩薩及諸末世一切衆生得決定信永斷疑悔汝今諦聽當為汝説解曰言如來甚深祕密究竟方便者然泛論如來祕密有其二意一如來之密藏謂一乘如來知見佛於漸教門中久默斯要故如前釋也故云究竟方便下答覺照離華翳等二如來即祕密由證密藏能所無二故三業具皆祕密也謂非色現色摩尼不能喻其多非量現量應持不能窮其頂不分而遍一多不足異其體全法為身一毛不可窮其際此身密也非近非遠目連尋之無際身子對而不聞非自非他若天鼓之無從猶谷響之緣發無邊法海卷之在一言無內圓音展之該萬類此口密也無心成事等覺尚不能知意密也二義之中經顯所證矣言決定信者前頓同佛境義當信根成就初發心住今但通決疑難以成前義故也三佇聽時金剛藏菩薩奉教歡喜及諸大衆默然而聽第四正説長行四一反覆起疑之本二喻釋現起之疑三顯淺難造深四結問不當理初中又三一總指輪回二真隨妄轉三結指前疑今初善男子一切世界始終生滅前後有無聚散起止念念相續循環往復種種取捨皆是輪回解曰於中初一句總標情器故云一切無著金剛論以四蘊為世界若不約情何成輪回又一切者總有十種如華嚴世界成就品説次六對辨其輪回謂但住有為即屬輪回心也始終者若唯約染緣則創變為始極證為終或無始有終若染淨對説則證菩提為始斷盡煩惱為終若唯約淨緣有始無終如上用心皆屬輪回之見唯心冥圓覺不住染淨方得無始無終新新而起曰生表此先非有故念念落謝曰滅表此後是無故過去名前未來名後現在住劫名有空劫名無成劫名聚壞劫名散現行為起調伏為止次二句正示輪回之相念念相續者情界器界皆依妄念既所依不斷故能依亦然循環往復者器界空已復成情界滅已復生惑業襲習報應綸輪塵沙劫波莫之遏絶後二句結成輪回取謂取著執我我所捨謂厭離厭苦所依又於根身則厭苦粗障為捨欣淨妙離為取於器界則厭此娑婆為捨欣彼極樂為取若取若捨種種不同皆是顛倒妄心變現輪回之相故論云一切分別即分別自心心不見心無相可得首楞云自心取自心非幻成幻法二真隨妄轉文三一法未出輪回而辨圓覺彼圓覺性即同流轉若免輪回無有是處解曰能觀是輪回之心故所觀圓覺亦爾如夢見實物物亦是夢故清涼大師答復禮法師云由來未曾悟故説妄無始二喻譬如動目能搖湛水又如定眼猶回轉火雲駛月運舟行岸移亦復如是解曰四對喻中初由目數動湛水如波搖次眼識遲鈍旋火成輪相餘二可見三合善男子諸旋未息彼物先住尚不可得何況輪轉生死垢心曾未清淨觀佛圓覺而不旋復解曰諸旋者眼目雲舟喻生死垢心也彼物者水火月岸喻圓覺也何況下正合三結指前疑是故汝等便生三惑解曰三惑者即前三種疑也據此結文的指即知定是先責起疑之本未是答難若是偏答三中之一難即不合總結三惑智者詳焉然雖非是正答已是標舉建立答義之意勢令息如上之念即前疑早合自亡況復空華金礦分明曉喻二喻釋現起之疑文二初一空中華無起滅喻二金中礦不重生喻初中三一喻釋二法合三結成今初善男子譬如幻翳妄見空華幻翳若除不可説言此翳已滅何時更起一切諸翳何以故翳華二法非相待故亦如空華滅於空時不可説言虗空何時更起空華何以故空本無華非起滅故解曰曲分為二初翳差華亡喻謂不知華因翳有乃謂從空而生喻不知妄出迷情却執真能生妄既得翳差即不見華聞説從翳而生又執何時更翳喻前觀成同佛普淨根塵因知妄染由迷又疑迷心却起問翳差之者或有他時更生不必的定永無如何以此為喻答喻者但取當日一席之事不説終身但以愚人晨旦見華食時眼差見華亂生亂滅謂言翳亦速起速停是以經中遮云不可故諸論喻釋佛云如大夢覺豈可難云睡起夢覺何妨明夜更睡還夢若如是難豈解喻焉二法非相待者翳不與華期華不隨翳生但翳故妄見非華實生二法各不相知況復一空一有故云不相待也縱使心迷生死亦寂但緣迷故妄似生死衆生本自不生幻華畢竟不起莫將翳待莫以迷求剛藏問目正似此也後空不生華喻前已合釋文易可知然佛頂經亦有此法喻文廣義略闕於待翳之文二法合生死涅槃同於起滅妙覺圓照離於華翳解曰迷見生死似華起悟得涅槃似華滅言圓覺離華翳則雙拂生死無明虗空非暫有無覺性何關迷悟衆生既如華起約誰更難無明無明生死既空何責本來成佛空華終不再起果位何得還迷由己計度不休見他覺性流轉若如是解頓遣三疑三疑鈎鎖連環不是三科別答下金礦喻即唯答佛不再迷此疑過深故重喻也三結成善男子當知虗空非是暫有亦非暫無況復如來圓覺隨順而為虗空平等本性解曰虗空世法尚不同華起滅況如來隨順圓覺湛然真常是虗空之體性耶覺為空性者佛頂云空生大覺中又云寂照含虗空復言平等者然圓覺雖是虗空之性而冥合不分周遍法界無分無限無別能依所依故云平等此意云空在覺中空尚常寂況覺為空性豈增減耶喻猶不及故云況復後金礦喻善男子如銷金礦金非銷有既已成金不重為礦經無窮時金性不壞不應説言本非成就如來圓覺亦復如是解曰曲分為二先喻此喻唯答佛不再迷之難前就圓悟之理生佛俱是本真以成普眼段中衆生本來成佛之義故舉空華元來不起非後始滅法合云生死涅槃同於起滅所以俱通三難今就不壞因果之相故説銷礦出金華則始終本無礦則因銷始盡意云圓頓之理雖齊迷悟不妨成異既有多生習障還須背習顯真真顯即究竟清淨若但用前喻即撥無迷悟因果之相便成邪見若但用此喻即成衆生覺性本來不淨失真常理亦成邪見道理微妙一喻難齊故説兩事是知此喻唯答第三難也文中喻意如人鍊金須得其礦若非金礦鍊亦無金若因銷有者銷頑石等亦應得金雖假燼冶銷融金性要須本有所以經言金非銷故有故金剛三昧經合金錢喻云昔迷故非無今覺故非入既已成金等者正喻佛不再迷不應説言等者喻佛隱顯無異佛頂亦云昔本無迷似有迷覺覺迷迷滅覺不生迷後法合者金喻法身鍊出喻報身作環釧等百千萬種喻化身礦中雖有金不銷金不出識中雖有佛不修佛何成三顯淺難造深文二初所造離念善男子一切如來妙圓覺心本無菩提及與涅槃亦無成佛及不成佛無妄輪回及非輪回解曰前通難了此別顯幽深難見言説不及下智難造以遮展轉無窮疑難先標覺心為宗後方拂迹者明非斷滅但離所拂非無覺心拂有三節初拂轉依之名轉煩惱生死故曰菩提涅槃體雖即真名因妄得後兩節皆雙拂對待圓覺性中都無此事若有少見則迷圓覺故華嚴云於法若有見此則未為見若無有見者如是乃見佛二能造滯情文四一舉勝彰劣二舉喻顯情三誡息妄心四重彰妄義今初善男子但諸聲聞所圓境界身心語言皆悉斷滅終不能至彼之親證所現涅槃何況能以有思惟心測度如來圓覺境界解曰文中兩對初小聖理智對後何況下凡心真覺對意云小聖真智生空尚不能親到小聖之理生空真如況凡心劣於前智真覺又超前理轉轉懸隔何能造耶如百寮尚畏宰相百姓豈親天子此正同金剛經四果之人尚無心言我證得四果豈如來有定法得阿耨菩提耶然四向四果斷證行相者謂斷三界見惑有十六心至第十五道類忍時名初果向至第十六心即入修道名須陀洹果以見惑頓斷不同修惑分三界別故欲界修惑分為九品斷至五品是一來向斷六品盡得一來果以九品惑能潤七生為上上品潤兩生次三品各潤一生次二品共潤一生後三品共潤一生六品惑盡已損六生故唯餘一度來生欲界斷惑七八品名第三果向九品全斷盡即得不還果次斷上二界修惑乃至有頂八品惑盡名阿羅漢向三界見修都盡得阿羅漢果成就我生已盡等四即是所圓境界矣言身心語言斷滅者沈空滯寂灰身滅智也彼之親證等者若未入滅即有餘涅槃若身智滅已即無餘涅槃思惟心者種種計度意云無心近理尚不能造有心轉背豈能測度故法華説大地皆如舍利弗共度不能知新發意及不退等菩薩皆言不測二舉喻顯情如取螢火燒須彌山終不能著以輪回心生輪回見入於如來大寂滅海終不能至解曰於中初舉喻後顯情即知前舉勝此舉喻並是顯分別心不能證覺密譏前三種翻覆疑難前云有思惟心即是此云以輪回心前云圓覺境界即是此云大寂滅海三誡息妄心是故我説一切菩薩及末世衆生先斷無始輪回根本解曰是故我説者即前未出輪回而辨圓覺無有是處若遠指即答文殊問先斷無明或指餘經皆如是説四重彰妄義文二一無實體善男子有作思惟從有心起皆是六塵妄想緣氣非實心體已如空華用此思惟辨於佛境猶如空華復結空果展轉妄想無有是處解曰從有心起者舉能起之根識有心者識也起者心所也六塵緣氣者舉能牽之境已如前釋非實心體者實心無念故已如空華者縱實有思惟有思惟心尚不能證覺何況此心早已如於空華自無其體向上更欲求證何異空華結果故言展轉虗妄此中始末都無故云無體後段秖言浮巧不能成覺不直言無故云無用勿見經有用此思惟之文便謂已屬後段即此思惟之用全無其體即名無實體也細意詳之二無勝用善男子虗妄浮心多諸巧見不能成就圓覺方便解曰從第一核疑之本兼此第三段大意總是責問者滯情分別過患所以其中此節最親因前三番之疑便都指是浮心巧見總不能證覺四結問不當理如是分別非為正問解曰乍看連次之經即似唯結巧見之文細詳其義乃都結第三一段問前讚善哉此責非正何也答前讚者美其起教此責者顯其實理此一段疑最障修證若不徵起末世長迷微有斯益故前讚也剛藏所徵意在佛責故知責此之過始彰徵起有功乍看似前後乖違細詳乃始終符合可審玩味妙在斯焉偈頌四初七句頌反核疑本爾時世尊欲重宣此義而説偈言金剛藏當知如來寂滅性未曾有終始若以輪回心思惟即旋復但至輪回際不能入佛海長行先舉妄想偈文先標實理次六句頌喻釋現起之疑譬如銷金礦金非銷故有雖復本來金終以銷成就一成真金體不復重為礦略不頌空華影在後段故三五句頌淺難造深於中二初三句頌所造離念生死與涅槃凡夫及諸佛同為空華相良由長行華無起滅喻中結文與此段同故此亦取空華之喻意該前後也後二句頌能造滯情思惟猶幻化何況詰虗妄四二句依解起行若能了此心然後求圓覺長偈第四互有互無第三深究輪回之根者謂窮其展轉根元推其差別種性故於中文四初三今初於是彌勒菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解如前矣次正陳詞句文二初慶前大悲世尊廣為菩薩開祕密藏令諸大衆深悟輪回分別邪正能施末世一切衆生無畏道眼於大涅槃生決定信無復重隨輪轉境界起循環見解曰深悟輪回者因舟行岸移等喻悟得真隨妄轉無畏者決定也道眼者五眼中即慧眼法眼具真俗故決定信者永不信餘首楞云妙信常住一切妄想滅盡無餘無復重隨等者不執月運岸移等二請後文二初舉法問二結益請初中二一問斷輪回世尊若諸菩薩及末世衆生欲遊如來大寂滅海云何當斷輪回根本於諸輪回有幾種性解曰寂滅海者大涅槃也具足三德能建大義體深用廣故如海也次二句問目就下釋之二問修悲智修佛菩提幾等差別回入塵勞當設幾種教化方便度諸衆生解曰初二句智法門無邊誓願學故後二句悲衆生無邊誓願度故此惑病既多方藥非一若無方便少湯添氷恐落愛見大悲故須問也二結益請唯願不捨救世大悲令諸修行一切菩薩及末世衆生慧目肅清照曜心鏡圓悟如來無上知見作是語已五體投地如是三請終而復始解曰慧目等者欲照心源必由淨慧慧目是能照心鏡是所照心淨如鏡故六祖偈云心如淨明鏡肅清者緣塵不雜無上知見者無能無所自在圓明故即同法華雙開菩提涅槃是無上義今即雙悟故同無上展虔同前讚許爾時世尊告彌勒菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生請問如來深奧祕密微妙之義令諸菩薩潔清慧目及令一切末世衆生永斷輪回心悟實相具無生忍汝今諦聽當為汝説時彌勒菩薩奉教歡喜及諸大衆默然而聽解曰深奧祕密微妙者本清淨之輪回無差別之種類等故無生忍者真性無生本來清淨衆生未悟妄心見生生即必滅故是輪回今悟實相了心真妄無生心既不生輪回永絶如是忍可名無生忍法既無生即無有滅故華嚴云不見有少法生滅何以故若無生即無滅故又云一切法無生一切法無滅若能如是解諸佛常現前故信力入印經中亦有無滅忍然不生不滅佛法之體八不之初釋有多門略伸一二初約境後約行境中略有五義一就遍計由是妄執無法可生滅也又理無故不生情有故不滅不滅即不生是一法矣二就依他謂緣會生即無生緣離滅而不滅又緣起無性故不生無性緣起故不滅中論云以有空義故一切法得成是故不生即不滅不滅即不生為一物也三約圓成性謂非是有為故無彼生滅相也又非妄心境故不生聖智所證故不滅不滅即不生為一物也四通論三性混融於一法上唯就遍計一向生滅就圓成唯不生滅就依他亦生滅亦不生滅就三無性故非生滅非不生滅五然此四句合為一聚圓融無礙頓思可見後約行者謂妄念斯寂猶若虗空何生何滅又雖起大用見心無生用謝歸寂了心無滅又常稱真理寂然居境於此心中有何生滅佇聽同上次下正説長行中二一答輪回中二問二答悲智中二問前中二一推本貪愛末五道令斷答第一問二明種性令知答第二問一中又二一示所斷二勸令斷初所斷中二門分別初總釋義後別釋文初中示所斷輪回本末者文云從無始際愛為根本欲因愛生命因欲有貪淫之欲欲塵助故五塵之欲生死相續乃至起諸違順造善惡等業受苦樂等報結云皆輪回故不成聖道即十二緣生之義也緣生義博略顯八門一總別名體二生起行相三業用差別四能所引生五攝歸一心六二世三世七因果離合八權實具彰初中總名緣起亦名緣生無有主宰作者受者從因而生託衆緣起本無而有有已散滅能潤所潤墮相續法故名緣生唯依他性蘊處界一分為體法相宗也亦唯妄想無相宗也亦唯真心法性宗也十二別者一無明明者擇法所無即明能無即癡也是行蘊中迷理起者二行者造作即身語意起善惡等三識者了別唯阿賴耶親因緣種四召體為名變礙為色即是一切有漏五蘊五者六處處是生長門義唯內六處六觸者觸謂第八識相應全及六識中異熟觸七受者領納體同於觸八愛者耽染即是當體九取者追欲即是四取十有者有果謂行種果種已潤十一生者蘊起即異熟五蘊十二老者變異死者滅無亦是前蘊上所出體皆法相宗若約實教依真而起皆無別體一二八九通於種現後二唯現餘唯種子二生起行相者不了第一義諦執著於我故不正思惟起於妄行行熏於心是識與識現行共生揀現行非種故名色與識互依如水與塵四取蘊識蘊已屬所依識故為名色名色增長為六處名增成意處色增成餘五故開顯明盛也根識既顯則對境為三和是觸觸必領受於受染著是愛愛增即取取即起於業種有也業熟即起漏蘊生也蘊熟老也則壞死也老非定有故附死立支也然惑苦中有開合問答至下當辨三業用差別者此十二支各有二業且各一者一令衆生迷於所緣二則能生未來果報識令諸有相續名色互相助成六處各取自境觸能觸對所緣受能領受愛增等事愛能染著可愛之事取令諸惑相續有能令於餘趣中生生者能起諸蘊老令根變死壞諸蘊餘各一者無明與行作生起因如次乃至生與老死作生起因死者不覺知故相續不絶四能所引生者一能引支謂無明行能引識等五果種故二所引支謂識等五是前二支所引發故三能生支謂愛取有近生當來生老死故四所生支謂生老死是前三支近所生故五攝歸一心者華嚴六地説也此復二門一推末歸本門經云三界所有唯是一心諸論同引此文證成唯識然隨宗解異總有八重前唯心章具列釋二本末依持門經云如來於此分別演説十二有支皆依一心如是而立一心頓具非佛不知故特言如來也何以故十二行列前後引生何唯一心下釋意者非唯三世不離真心今乃一念頓具十二彌顯前後不離一心此中亦攝俱舍剎那十二也隨事貪欲貪事非一隨舉一事一念即具與心共生心是識本是真心以與貪相應分別其事便名識也此中十二或次不次者同一念故事是行貪事即意業之行也於行迷惑是無明不知貪過能招於苦與無明緣也及心因也共生相應四蘊是名名色名色增長譯經誤也應云開顯為六處六處三分合為觸觸共生是受同時必領納故受無厭足是愛沒體相合愛攝不捨是取可知彼諸支和合是有愛取潤前六支有所起是生生熟為老老壞為死有為剎那生即異滅故故經云初生即有滅不為愚者説彼論總判上二門云餘處求解脫謂觀凡夫愚癡顛倒當於阿賴耶此云藏識如前説及阿陀那此云執持識中持種及色根故上二皆心之別名也求解脫乃於餘處我我所中求解脫故經明唯是一心論主意明心含染淨故雙舉二名釋一心義也則心外無我法當於一心中求求義云何若有我執即一心成賴耶若我執亡即捨此名唯阿陀那持無漏種此則妄心斯滅真心顯也六二世三世者約教不同故小乘生引俱開前二過去中八現在後二未來唯識即合能所引開能所生前十現在後二未來十因二果定不同世中三前七或異或同前七後二中三各定同世意以一重因果足顯輪回故斥小乘兩重施設華嚴即開能所引合能所生亦明三世經云無明緣行者是觀過去觀此二因能招現在識等識乃至受是觀現在觀此識等由過去業得復能得來果愛取有是觀未來觀此三因決得來果上明一往三世也以無明行為過去者為遮前七定同世故復示無明迷本際故以愛取有為未來者為遮愛取但是潤故示因招果令厭因故以因屬果故則能所引生及所發潤皆容互有故彼經前文説無明處亦有愛義説中際處亦有無明今此不言生老死者但觀因以知果未有果為所觀故或得對治即無果故亦以諸宗共許為果故略不明經論具有明文若斯勿局二世有云譯經謬者務在順其所宗也於是已後展轉相續此明流轉三世也不得對治復有後世後後無窮七因果離合者此十二支且一往前前為因後後為果無明唯因老死唯果餘望前後亦因亦果又無明愛取是本唯因生老死二是末唯果餘通本末亦因亦果又惑因苦果業通因果又惑業皆因唯苦為果又前十皆因後二為果上皆法相又真心不覺為因行等十一皆果楞伽起信皆以淨心為因根本無明為緣生業識等八權實具彰者問四生六道性類雖殊十二有支等無優劣如何上説或異或同答萬法皆空無非真性迷真倒執有十二支支分雖齊悟由根器根器既別説教寧同涅槃四類人皆觀十二因依所證深淺者由教機俱有深淺故欲使指南即唯佛性涅槃文欲解緣相須窮聖言各執一宗俱成不了了知權實杖則皆金然約自修深淺咸益準涅槃四類之意唯專俱舍義信解修習者即得二乘菩提依唯識者得菩薩菩提依華嚴者即得佛菩提也欲為師匠必在圓通故淨名經云深入緣起六識八識淺緣起法性隨緣深緣起斷諸邪見上來七段義亦已周緣是諸宗恐疑取捨今但約一教自具淺深文是華嚴大經義是世親釋論貫前諸説仍加數門今但提綱任自參驗既同論主幸共遵行謂經説十重緣起已結云如是十種今却注列釋處經各於結文之下逆順所注者前七唯取順文觀諸緣起彼論門門作三觀觀之今且每門略配其二也所謂有支相續故謂世間受生皆由著我等於第一義不了名無明等其義生起行相中略説訖論判為愚癡顛倒觀謂因緣無我而乃著我因緣從實諦起而乃迷諦故也一心所攝故文義俱如上説論判為餘處求解脫自業差別故前業用門已説訖論判此下四門為異道求解脫謂但一念不生方得解脫而乃別求故云異也此顛倒總有四因故以四門正義翻破之此門破冥性謂無明等各二業生彼因緣等事斷前即後絶何關冥性不相捨離故無明乃至生為緣令行乃至老死不斷故此破自在天為衆生因今以無明等為行等因尚不從餘支豈從自在也三道不斷故無明愛取不斷是煩惱道行有不斷是業道餘分不斷是苦道惑業苦三各分二者文含二意謂約三世二世初三世中煩惱二者過去迷本際故現在牽生報果故業二者過去已定當相受名未來未有功能立稱苦二者現定當相受名未來未起從過患立次二世中煩惱二者發潤別故業二者未潤已潤殊故苦二者種現異故言不斷者苦復生惑故如輪轉此破苦行因謂惑業是苦因欲脫苦須斷惑業今別修苦行苦何絶焉觀三世故二世三世門中已説此破無因既初二是次五因次三是後二因何得計無也三苦聚集故前五行苦觸受苦苦餘是壞苦論判此下四門為求異解脫謂緣性是一真心具於樂常淨我四德是真解脫何得異求故四段經明其但有四妄而無四德此當有苦無樂謂行苦隨逐乃至無色彼計無色為涅槃是以苦為樂也因緣生滅故無明為緣能生諸行無無明諸行亦無餘亦如是此破計非想等為涅槃因今觀之但是此滅非是常德生滅繫縛故無明緣行是生繫縛無明滅行滅是滅繫縛餘亦如是為彼計非想天等為解脫菩薩觀之是此繫縛不是淨德無所有盡故無明緣行者是無所有無明滅行滅者是盡滅餘亦如是此破計無所有處等為涅槃以滅盡故無真我德也此上十中初門觀我執緣相對前所注經文詳之即見餘九亦然次門前半觀第一義諦緣性也見緣性方脫緣縛故也餘半及後八門觀世諦緣相也觀之即真故於中自有六觀謂上餘半染依止觀因緣有分為染及染相依止一心故論云二諦差別以純真不生單妄不成和合方有緣集故也三四兩門染因觀三他因四自因第五門攝過觀觀苦集故謂以三道攝十二支即顯有支但攝苦因苦果過患六護過觀觀三世防護三過一多身齊生二自業無受三失業護者一潤未潤等故二非他身作故三勢力續故也七不厭厭觀苦苦壞苦凡夫不厭行苦二乘不厭菩薩皆厭八九十門深觀四句求緣皆無生無生而生破邪顯理深故也八因緣生故不自他生九但順緣生無知者故不共生十緣生無性無性緣生故非無因也又初門迷真起妄前半示染淨相次門真妄依持上餘半并此亦染淨依故次五妄法義門三四建立染法謂三因四緣五染過六力無力七慢非慢後三妄緣空幻八九窮之無始第十無而種種上十門經各有逆順即二十重論主各以三觀觀之總成六十重觀緣起也三觀者初相諦差別觀上判前無我二諦是也次大悲隨順觀即前隨經注之是也後一切相智觀上最後料簡真妄中注配之是也若從染淨無礙交徹則涉入重重若依染淨逆順雙融則真門寂寂法性緣起甚深甚深即此因緣名因佛性三觀即因因性因因至果成菩提性因性至果成涅槃性因果無礙是緣起性緣起大義深廣若斯欲辨輪回理須究了上來總釋義竟次別釋文文中四一指愛為本二欲助成因三展轉更依四起諸業報此同唯識攝十二支但為惑業苦也前三皆是惑道第四即是業苦然開之別配文亦相應至文當指亦可初一答根本餘三答種性其五性文答菩提問下當廣辨今且依前初中二初約貪欲以標指善男子一切衆生從無始際由有種種恩愛貪欲故有輪回解曰愛是愛支云無始際當於宿惑含無明支或無明已在前章此唯説愛貪欲是愛增之相即當取支今約貪欲粗相標指能貪之愛是輪回之本也首楞云流愛為種納想為胎交遘發生吸引同業以是因緣故有生死又涅槃云因愛生憂因憂生怖若離貪愛何憂何怖又佛名經云有愛則生愛盡即滅故知生死貪愛為本先令斷者如樹除根等欲者五欲即色聲香味觸也由於五欲引起愛心能令衆生不絶問欲應是心何言色等答瑜伽云欲有二種一煩惱欲二事欲事即五塵今謂心起合塵塵即名欲故下云由於欲境起諸違順又無常經云常求諸欲境等言種種者或天屬之恩如父母等或感事之恩如得惠賫等或任運生愛即自身及名利色味六親等或因敬成愛因恩成愛或因愛結恩恩之與愛應成四句謂恩非愛等又所貪之境衆多故能貪之愛不一然貪與愛亦應四句謂貪非愛等若對治揀境則有順有乖若約妄揀心則皆為過患又唯就愛復有其三一惡愛謂禽荒色荒及名利等二善愛謂貪求報行施戒等三法愛謂樂著名義及貪聖果而修行等故下云法愛不存心漸次可成就我身本不有憎愛何由生後約受生以結定若諸世界一切種性卵生胎生濕生化生皆因淫欲而正性命當知輪回愛為根本解曰卵等四生則受生差別故瑜伽釋衆生云思業為因㲉胎濕染為緣五蘊初起為生若以四生配六道者天及地獄化生鬼通胎化謂鬼子及地行羅剎是胎餘皆化生人畜各四人具四者毗舍佉母卵生三十二子胎即常人濕則捺女化則劫初畜具四者金翅及龍餘獸皆胎餘鳥皆卵然著地飛空若水若陸微細蠢動或卵胎或濕化不可具分品類問何以卵劣在初化勝居後答有二釋一約境具緣多者為首謂卵必具四胎三濕二化不兼餘故居其後二約心從本起末為次謂無明是卵即本識三細中最初業相能所未分混沌如卵既是根本故首明之無明發業蘊在藏識為胎愛水潤之方能受生為濕化生即從無而忽有為化故此次之皆因淫欲正性命者初受胎時妬忌父母父母亦皆生愛方得受身即當識等支也如俱舍説文中淫為耽染愛著但是情染總得名淫縱使化生亦依業染地論但云業染即俱舍世間品意偈云倒心趣欲境濕化染香處也若但約欲界輕重者俱舍云六受欲交抱執手笑視淫四洲之人同四王界餘諸異類卵濕胎形心染氣傳難具分析受性稟命莫不由之既性命由淫淫復由愛故云愛為根本二欲助成因由有諸欲助發愛性是故能令生死相續解曰諸欲是境愛性是心即愛之種子由是故下結輪回由外塵欲牽起愛心亦由愛心貪著於欲貪欲故造業造業故受報由此生死不斷故肇論云衆生所以久流轉者皆由著欲故也若欲止於心則無復生死潛神玄默與虗空合其德是名涅槃三展轉更依欲因愛生命因欲有衆生愛命還依欲本愛欲為因愛命為果解曰此當兩重三世門中後流轉三世也彼經云於是已後展轉相續今此文者欲謂貪淫命謂身命無愛欲則不生無欲身則不有當知欲因愛有身因欲生既有此身還生於愛由愛身故還為欲因復感未來生死果報如是展轉相續無窮四起諸業報業有二義一動作義即是行支二為因義即是有支報是苦果是酬因義即生老死二支然此業報釋教之宗撥之云無正名邪見五見中一不歸佛者皆由惑之內外殊途須知去取今尋本末總啓二門先以理教窮其根元後約本文釋其體相初中二一辨非二顯是初者謂儒道二教此方無西域宗教故不辨之也説人畜等類皆是虗無大道生成養育謂道法自然生於元氣元氣生天地天地生人畜萬物故愚智貴賤貧富苦樂皆稟於天由於時命及其死也却歸天地復其虗無今略敘本末非之外計曰夫道者虗無非有非物是故杳然冥然視聽不得老云有生於無莊云虗無無為萬物之本文云實出於虗列云無形而有形生焉此等皆謂恢形詭狀異性殊方覆天載地行星翔鳥愚智窮通無非虗無之道也非之曰道既是生死之源賢愚之本吉凶之府禍亂之基夫源本基府既其是常則禍亂凶愚不可除也何用老莊之教耶又道育虎狼胎桀紂夭顏冉禍夷齊是長惡棄善之物何名尊乎外計天命者莊云天地萬物之父母合則成體散則成始又曰才之殊者受之於天列曰精神者所受於天骸骨者所稟於地語曰死生有命富貴在天等非之曰若爾則天之賦命奚為貧多富少賤多貴少愚賢醜美禍福凶吉惡善一一例之苟多少之分在天天何不平乎夫無行貴守行賤有德貧無德富仁夭不仁壽義凶不義吉道喪不道興既由乎天天何興不道而喪道耶此乃顛倒冠履尊卑無序天之命也亦猶無恆之人易所不占何有福善益謙之賞禍淫害盈之罰焉況故生萬物以相殘害爪牙噬之類豈非無道之極乎易曰天地之大德曰生若生為大德則死為大賊今既不問賢愚罪孝皆賊之以死何用生之乎又既禍亂反逆皆由天命則聖人設教責人不責天罪物不罪命是不當也然則詩刺亂政書讚王道禮稱安上樂號移風豈是奉上天之意順造化之心乎外計自然曰道法自然謂烏玄鶴白松堅棘尖麟鳳本仁虎豹性害非為之所能也非之曰若無因而自然生無緣而自然化則一切無因緣處則應生化謂石應生草草應生人人應生畜等又應生無前後起無早晚神仙不藉丹藥太平不藉賢良仁義不藉教習老莊周孔何用立教為軌則乎外計元氣者莊曰人之生氣之聚則為生散則為死又曰恍惚之間而有氣氣變而有生又曰萬物一也通天下一氣聖人故貴一又曰天氣為魂地氣為魄易曰精氣為物遊魂為變非之曰若云氣成人等則欻生之神未曾習慮豈得嬰孩便能愛惡憍恣焉若云欻有便能隨念者則一切所為悉能隨念不待因緣學習而成也若云初稟氣生其性本靜由感物而易者且嬰兒一月驚畏相生一二三歲貪瞋嬌相如次而生此乃未有師習豈因感物而易乎又鷹犬性能搏噬因其性調之令其擊殺若先無性唯緣現習而能成者何不調鳩羊使搏噬乎又若稟氣而欻有死後氣散而欻無則誰為鬼神而靈知不斷乎今有鑑達前生追憶往事則知生前相續非稟氣欻有鮑靜李家曇諦弘覺羊祜指環又驗鬼神靈知不斷則知死後相續非氣散而欻無蔣濟之子託母求官嬖妾之父為兒結草蘇韶卒後來與姪節問答孔子語子貢云死後將自知之未晚故祭祀求禱人皆為之況死而蘇者説幽塗事劉聰云云或死後感動妻孥求索飲食或酬恩冤及邪病呪禁而愈等耶答王云云問若人死為鬼則古來諸鬼填塞巷路有其見者如何不爾答人死六道不必皆鬼鬼死復為人等豈古來積鬼常存耶且天地之氣本無知也無知之氣在人身中安得欻起而有知乎若稟得無知之氣而能知者則草木等既同稟氣皆應知也由是而觀人畜萬物雖附氣而生氣變為陰陽陽為風火陰為水土四大合散以心為主蓋是無始心神世世傳習續而為主也既生死成壞從心所傳則賢愚善惡資於熏習故仁暴由堯桀而不由天善惡在舜均而不在氣約此道理方有教遵修求之路損益禍福之端賞善罰惡之科避凶就吉之驗矣二顯是者然六道異生皆是如來藏心合於生滅名賴耶識能取境界相續起念計我我所名為意識造種種別業共業乘業受生稟氣成質其造業者皆因無明所發其受生者皆因貪愛所潤故遠公報應論云夫因緣之所感變化之所生豈不由其道哉無明為惑網之淵貪愛為衆纍之府二理共生冥為神用吉凶悔吝唯此之動無明掩其照故情想凝滯於外物貪愛流其性故四大結而成形形結則彼我有封情滯則善惡有主有封於彼我則私其身而身不忘有主於善惡則戀其生而生不絶文中二一別釋二總結初中三初惡業苦報由於欲境起諸違順境背愛心而生憎嫉造種種業是故復生地獄餓鬼解曰起諸違順者謂可意境不可意境境背等者由愛彼境境不順心便生熱惱憎嫉憎嫉故起瞋瞋故殺害逼惱打罵凌辱種種惡業從此便興亦可境稱愛心而生耽著淫盜飲噉侵奪綺妄種種惡業文無者略也言種種者十不善等生鬼獄者三惡報也無畜生者取其文潤成句以二例知亦可翻譯傳寫脫漏義必合有故華嚴云十不善業道上者地獄因中者畜生因下者餓鬼因然三惡道五門分別一釋名二出體三種類四身相五壽量初中地獄者梵云捺落迦此云苦器謂是盛貯受苦人之器今云地獄者地下有獄拘繫罪人受種種苦為順此方刑獄之稱故譯云爾餓鬼者雜心云以從他求又常飢虗恐怯多畏故畜生者人之資具人所畜養之生故亦名傍生以傍行故然六趣衆生皆以第八異熟識而為自體無覆無記性所攝故唯識云云三種類者地獄三類一根本二近邊三孤獨根本即是八熱八寒八熱處所縱廣皆十千由旬初從此下過二萬二千由旬有等活地獄多共聚集苦具殘害悶絶躃地空中聲言可還等活欻然復起等活下四千有黑繩繩拼剜鑿等衆合多人聚集兩鐵羝馬象虎師子等頭山間逼之流血復令和合鐵槽厭鐵山墮亦爾號叫尋捨鐵室火起痛切號叫大號叫室宅如胎藏苦過前故大也燒燃鐵熬串棒等燒炙也極燒燃三叉鐵丳下貫徹兩膊及頂又鍱裹鑊煎苦亦過前無間略説有六一四方火刺二鐵炭煎簸三鐵山四鐵釘苦五鐵丸六洋銅等七獄傍相當皆隔二千由旬八寒者亦廣十千不言上下初從此下阿耨達池下過三萬二千由旬一皰獄與等活齊廣大寒觸身分瘡皰下二千由旬有頗裂如皰潰膿血流出也喝哳怗郝郝凡虎虎凡三皆苦音青蓮華身分青淤皮膚破裂紅蓮華紅赤分裂大紅蓮華身分極大色亦如上近邊者八熱四門外各有四獄計一百二十八所也一煻煨煨齊膝也二尿糞糞尿為泥求舍陷中三鋒仞有三一銛刃路二劒樹林三鐵刺林四烈河沸灰水滿求舍墮中孤獨者山間曠野樹下空中或一或多受罪之處處所雖小苦具具足復有十八地獄謂鑊湯等然上等獄獄卒無情但隨業自見其琰魔王令治罰者即是有情畜生亦三謂水陸空本居大海後流餘處或四謂無足二足四足多足更相殘害他所驅役鞭撻等苦餓鬼亦三正法念云此下過五百由旬有琰魔王國後流餘處一由外障礙飲食到水被障或變膿血二由內障礙飲食咽如針如炬或癭三飲食無障礙飲噉燒燃及糞穢或自內縱得飲食亦不能噉又九種鬼謂炬口針咽嗅口針毛嗅毛大癭得棄得失勢力身相者無間中衆生與獄等量餘皆不定壽量者四天王壽是等活一日夜彼獄壽五百歲次五如次以忉利等例之餘二則極燒燃半中劫無間一中劫八寒相望於此如次近半若近邊孤獨則皆不定畜極一中劫鬼壽五百歲以月為日音釋欻音颷忽也捺乃八切難入聲手按也垪音怦與抨同彈也剜烏歡切音削也鍱音葉銅成片也皰音炮手足皰起也鐵同鐵羝同羝喝哳喝同喝哳知戞切音𧶇物之聲響也
