body:
  text: 終南山草堂寺沙門宗密述大文第二推窮妄宰於中二先示其相後顯本空智論云佛有二種説法先分別諸法後説畢竟空正是此也初中三謂徵釋結今初云何無明解曰徵此無明作何行相從何表顯知是無明然此徵釋無明者有其二意一由前云永斷無明恐謂定有可斷欲待斷盡方成佛道故今徵釋顯其本空二謂此無明是八萬塵勞之根十二因緣之首河沙煩惱由此而生塵劫輪回以之不絶非想定後還作貍身無為坑中猶名病行今欲明清淨覺性顯示圓頓妙門不先推破無明所作盡扶顛倒故決真心本有便推妄性元無依此了悟分明始得名為因地二釋者釋此無明五門分別一顯得名二釋體相三辨種類四明業用五正釋文初中明者擇法無彼明故名為無明又雖有本覺之明而無始覺之照論名不覺不者是無覺者是明但文異耳亦名為癡唯識百法迷諸經亦名為顛倒此經二出體相者華嚴云於第一義諦不了名曰無明者此明迷自此經云認四大等者即明認他理實而言但迷自必認他認他必迷自二文互舉也論云不覺者謂不如實知真如法一故不覺心起而有其念念無自相不離本覺猶如迷人依方故迷衆生亦爾依覺故迷若離覺性則無不覺釋曰此雖出體便顯體空正當此經兩段文矣俱舍中説明所治者是無明體唯識中説覆蔽真實迷於理事然有共不共若取發業即行蘊中迷理起者此等出體比起信論未徹其源何者起信依無明為因方生賴耶識此等所説乃是六七心所況迷自認他之行相似有本空之根源既無的示之文豈盡無明體性三種類者謂根本枝末共與不共相應不相應迷理迷事獨頭行俱覆業發業種現宿惑四業用者準論所説能生三細依華嚴即二種業一令衆生迷於所緣二與行作生起因今經云由此故有輪轉生死統而言之一切有漏之法無不皆是無明之所住持無有不是無明發起故論云當知世間一切境界皆依無明而得住持又下文云身心等相皆是無明餘如徵中五釋文者文分為三一按定其非二正釋其相三出其過患今初善男子一切衆生從無始來種種顛倒猶如迷人四方易處解曰謂此但標衆生云皆顛倒未顯顛倒之相如泛指甲乙云是罪人未出罪名所作何事故言按定其非文中先法後喻法中一切衆生者除圓了覺性其餘悉該言種種顛倒者心識狂亂為顛背覺合塵為倒倒有所執顛但荒狂或顛者頂也倒者頂下足上也其相不一故云種種種種之相如下所明喻中如人乍至川原或入聚落忽然心惑以東為西既一方迷餘三俱轉故云易處此喻四倒及下四雙然正迷之時方亦不轉忽然醒悟還是舊方反推此迷了無蹤迹無本來處無今去處第二正釋其相文二一法妄認四大為自身相六塵緣影為自心相解曰正釋顛倒之相也如述某甲有如是過作如是事今則迷自法身認他四大迷自真智認他緣念是其相也故肇公云法身隱於形㲉之中真智隱於緣慮之內正當此段文中先明認身後明認心所言認者執為我也認身者然四大從緣假和合有無我無主畢竟是空故淨名云是身如影從業緣現是身不實四大為家是身如空離我我所又如下文皮肉筋骨皆歸於地等然凡夫種種造業長劫輪回只由迷自法身執此四大為我認心者略為二釋一者六塵是境識體是心心對根塵有緣慮相慮相如影舉體全無自心靈明本非緣慮今認緣慮謂是自心念念隨之飄沈苦海如珠明徹本非青黃對青等時即有影像愚執其色謂是其珠如迷自心認緣影也故唯識云諸心心所依他起故亦如幻事非真實有乃至亦是法執首楞嚴云若分別心離塵無體斯則前塵分別影事塵非常住若塵滅時此心即同龜毛兔角其誰修證無生法忍故知緣影決定是空若清淨真心本無緣慮靈知不昧無住無依今認緣心誠為妄矣二者此一句經譯者回文不盡應云緣六塵影六塵影是所緣妄識是能緣六塵無實猶如影像從識所變舉體即空故此緣心亦無體也餘同前解前標顛倒云種種者通論即我法二執於中各有種種相縛下二空觀初當具敘破也及凡夫二乘同有三倒各有四倒下四念處觀中當釋若尅就此文即上迷身迷心總有四對顛倒謂四大非我認為我法身真我而不認是第一對四大如幻本無而見有法身真實本有而見無是第二對緣念生滅非心認為心真心了然而不自認是第三對緣念如珠中黑色全空而執有真心如珠中明相實有而見無是第四對一三我執二四法執如斯等見不因師宗但是凡愚任運如此既四對八隻不同故云種種二喻文二初直喻前文譬彼病目見空中華及第二月善男子空實無華病者妄執解曰翳眼觀空裏無華妄見華揑目望月輪月邊別見月空華幻月皆喻妄見衆生一念迷心翳自圓明覺性而於圓明體上妄見生滅身心故云空實無華病者妄執妄執之言正對前妄認之語若悟真如無相但是一心如空本無華天唯一月故首楞云見聞如幻翳三界若空華聞復翳根除塵銷覺圓淨又云汝身汝心外洎山河虗空大地咸是真精妙心中所現物亦可別配二喻謂華喻認身月喻認心身則但因心迷當體妄認如空華但因目翳外無別依心則內根外塵相依而起如幻月下因揑目上因本月相依而生故配身心照然義現然月喻例華亦應云月實無二揑者妄執經文影略故不具之又為一解翳揑皆喻見分空華二月皆喻相分眼喻智慧空及本月喻真理世親般若論以翳喻相分者據釋處之意取所見之華也後展轉倒見由妄執故非唯惑此虗空自性亦復迷彼實華生處解曰由妄執故牒前生起轉計所以非唯下帖義牒前成其轉倒惑空性者虗空自性清淨無物今執華生空處即似空變成華妄見虗空無生而生無物成物是迷惑虗空之性也亦復迷彼等者既執華從空而生即不知從翳而起翳則實是華之生處非謂真實之華若具法合應云非唯惑此真空自性亦復迷彼身心生處此乃但怪空裏有華不覺眼中有翳外嫌身心苦惱不知內畜迷情三出其過患由此妄有輪轉生死解曰妄執身心若無過患任其固執不必化之既由此執塵數劫中輪回不絶地獄鬼畜八苦五衰為害之深故須開示由此者因前妄認身心相也生死不實故稱妄有三結故名無明第二顯本空文三初標定善男子此無明者非實有體解曰言無體等者但是假名內外求之了不可得推其本際元是妙明故論云念無自相不離本覺又云依覺故迷若離覺性則無不覺了斯無體諸行不生不生故無滅生滅滅已寂滅為樂是知十一支法皆有所因惟此無明橫從空起今悟無明滅則行滅行滅則識滅乃至老死滅也次喻釋如夢中人夢時非無及至於醒了無所得如衆空華滅於虗空不可説言有定滅處何以故無生處故解曰前説種種過患皆歸無明今云無體道理難見言語路絶故約喻釋謂睡時夢物直見是有故前種種説其行相寤欲求之終不可得故此顯示云無體也問求不得者何處滅去故經答云如衆空華滅於空時不可説言有定滅處問若無滅處即應還在以何義故言空無也經又答云無生處故見幻華時若實是有今不見時即説滅處見時本無生處不見何尋滅處問前云實華生處此復何通答約前妄執之時而言有也悟了始知有時元無以法合之昭然可見故首楞云此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷此正是無生之理若決定忍可於心名無生忍華嚴云一切法無生一切法無滅若能如是解諸佛常現前後斷疑一切衆生於無生中妄見生滅是故説名輪轉生死解曰恐有疑云前説生死輪回只由無明妄執無明既若無體生死復何所依必若生死亦無云何前説生死故此釋云無明及與生死本末一切俱無但以衆生於此無中迷情橫見生死故云於無生中妄見生滅前就橫見故説有此就實論故説無言是故等者指前文説處也大文第三釋成因地上來所説妄空真有者有佛無佛性相本然今明依此通達心意冥符方成本起因地故此釋成正答所問文中三初依真悟妄頓出生死善男子如來因地修圓覺者知是空華即無輪轉亦無身心受彼生死非作故無本性無故解曰如來等者牒前所標即依真也知空華下正釋即悟妄等也既知萬法如空華豈更見有輪轉還丹一粒點鐵成金真理一言點凡成聖亦釋因不異果如斯因地方為真修上皆悟妄此下頓出生死也亦無等者非唯無輪轉之法亦無受輪轉之人我我所亡方成解脫即是照見五蘊皆空度一切苦厄意令修道者外遺世界內脫身心不計身身同虗空不起心心同法界非作等者非我造作觀行故使身心空無本性空寂元來無故故金剛三昧經云若化衆生不生於化不生無化其化大焉次展轉拂迹釋成正因彼知覺者猶如虗空知虗空者即空華相亦不可説無知覺性有無俱遣是則名為淨覺隨順解曰於中初拂迹拂有四重一拂覺妄之智二又泯其拂心三遮其斷滅但不起心分別空有不是無心四總結離過是真無念拂迹之由下自徵釋後成因是則等者有無既不當情斯即心言路絶清淨覺體從此顯彰但不背之合塵即名隨順亦非別有能順故羅什云無心於合合者合焉隨順淨覺故言淨覺隨順如是執盡病除然後興心運行則聚沙畫地合掌低頭皆成佛道如斯修習可謂正因後徵拂所由釋歸圓實何以故虗空性故常不動故如來藏中無起滅故無知見故如法界性究竟圓滿遍十方故解曰先徵意云身心幻妄許可全空知覺稱理因何又拂有無俱絶約何修行釋意云相因相待皆是從緣從緣之法豈實有體生心動念即乖本性失正念故圓覺性體俱無如是等故於中曲分兩節初明諸法二句後顯一心六句虗空性者一切法空不生滅也謂如上相因諸相猶若虗空本自不生今無可滅非謂拂之方令空也故佛藏經云一切法空無毫末相等等取諸文非一常不動者一切法如淨名不來去也為非已去非未來非現起故故法句云諸法從本來寂滅無所動法華亦云常自寂滅相又華嚴有大自在天王得知一切法不生不滅上句不來不去下句無功用非作故無等解脫門淨覺隨順次如來藏下顯一心也略啓二門初唯釋如來藏後總釋經意初中六門分別此是經題義含全部故備釋也一釋名二出體三種類四行相五業用六勸信今初由三義故得名為藏一隱覆義二含攝義三出生義佛性論亦有三義一所攝藏二隱覆藏三能攝藏然局於此至文當示也隱覆者復有二義一者藏如來故名如來藏謂衆生心具諸佛德但以迷倒都不覺故名藏也藏有如來有財釋也理趣般若云一切衆生皆如來藏勝鬘云生死二法是如來藏如來法身不離煩惱藏名如來藏如來藏經云一切衆生貪恚癡諸煩惱中有如來身乃至常無染污德相備足如我無異便以九喻喻之一萎華貪使佛身真法界身二巖蜂嗔使淳蜜説一味法三粳糟癡使粳米説種種法四糞穢增上貪等真金真如不變五貧家根本無明寶藏法身佛性六菴羅見惑內實二身佛性七弊衣修惑金像法身八貧女不淨地垢輪王報身九燋模淨地諸垢鑄像化身二者佛性論如來藏品云如來自隱不現故名為藏隱覆中文含攝者有其三一體含用謂如來法身含攝身相國土神通大用無量功德而為彼等之所依止故名為藏金器二聖含凡佛性論云一切衆生皆在如來智內故名如來藏所攝中文上二皆持業釋三因含果謂因地已攝果地一切功德亦如佛性論説能攝中文出生者論三義中無此謂此法身既含衆德了達證入即能出生故十地證真能成佛果是以十地論釋地義云能生能持又釋金剛藏云藏即名堅其猶樹藏謂如樹心堅密能生長枝葉華實地智亦爾能生無漏因果亦能生成人天道行此以理智合為如來亦持業釋此三義者初約迷時後約悟時中間尅體二出體者即論中一心也論又依此顯二門故楞伽云寂滅者名為一心一心者名如來藏十地經云云勝鬘名為自性清淨心此下經云如來圓覺妙心涅槃即名佛性唯識但就染相名為藏識故密嚴云佛説如來藏以為阿賴耶等楞伽亦云如來藏藏識三種類者佛性論云如來藏有五種一如來藏自性二正法藏因也如前出生義也三法身藏至德四出世藏真實五自性清淨藏祕密勝鬘經云如來藏者是法界藏論中初二華嚴亦云入法界藏智無差別也法身藏出世間上上藏自性清淨藏此之四名初總相次尅體三已證四約迷時客塵不染故次文云此自性清淨如來藏縱為客塵煩惱所染猶是不思議如來境界縱為猶是四字此本缺也流志譯者具矣四行相者然此如來藏心約真妄和合總有二種行相謂此經下云如來藏自性差別論云真如生滅然真妄各有二義真謂不變隨緣妄謂體空成事真中不變妄中體空即真如自性也勝鬘云如來藏離有為相常住不變真中隨緣妄中成事即生滅差別也真如性中復有二種勝鬘云有二種如來藏空智所謂空如來藏若脫若離一切煩惱藏不空如來藏具過河沙不思議佛法論中亦云如實空如實不空義全同此後釋生滅亦有二相謂漏無漏無漏復二有為無為無為亦在生滅門者具如論疏辨也有漏亦二謂善不善五業用者前二行相皆有業用之義初真性者有其二業一能持自體河沙功德從本已來不失不壞二能禦客塵河沙煩惱無始時來不染不污後生滅亦有二業一能起惑造業曠劫長受六趣生死故楞伽云如來藏者是善不善因能遍興造一切趣生乃至若生若滅二能知真達妄發心修行證三乘果如前所引十地論等由後二業故寶性論引經偈云無始世來性作諸法依止依性有諸道及證涅槃果長行引勝鬘釋云性者如來藏唯識釋云界以因義釋隨自宗故依止者如來藏是依是止是建立諸道者有如來藏故説生死是名善説證涅槃者若無如來藏者不得厭苦樂求涅槃六勸信者既諸佛因果終始依之故入道行人先須信解寶性云是一切智者境界何故乃為愚倒凡夫説耶偈答以有怯弱心等云云離此別信信則墮邪故密嚴經呵為惡慧必須了之方知正道故勝鬘云若於無量煩惱所纏如來藏不疑惑者於出纏無量煩惱藏法身亦無疑惑華嚴初會普賢即入如來藏身三昧意在此也然雖此心凡聖等有但果顯易信因隱難明故淺識之流輕因重果願諸道者深信自心應捨難捨之妄緣求見難見之妙理妙理者即自心也故勝鬘經云有二法難可了知謂自性清淨心一也彼心為煩惱所染二也若料揀信解之器者是非各三非器三者一身見執蘊為我二四倒無常苦無我不淨三失空離空如來藏義修空者三類云云具如寶性論説是器三者一自成就甚深法智二成就隨順法智三於諸深法不自了知仰推世尊非我境界如勝鬘説又反三非三是復成三是三非可以意得上來釋義竟釋經意者今此文中約藏自性離有為相常住不變以釋上拂迹之由即二種行相中真如門也言如來藏者總標次二句空藏後三句不空藏無起滅者釋上所知生死等無知見者釋上彼知覺等謂對生死起者即云執情見生死滅者即云知覺今以如來藏中既無可起可滅何有能執能知又迷時生死非起淨心非滅故無迷也悟時淨心非起生死非滅故無悟也無悟故無知見矣此乃非唯不可識識抑亦不可智知識智俱如方為自體真實識知光明遍照為下三句不空藏矣如法界性者界性與藏心體同義別別有其二一者在有情數中名如來藏在非情數中名法界性如智論明佛性法性之異二者謂法界則情器交徹心境不分如來藏則但語諸佛衆生清淨本源心體如云能造善惡能起厭求就法界言則無斯義據此則藏心尅就根源界性混其本末混則普該之義易信尅則遍周之理難明故指藏心如法界性亦乃攝其二義之別歸於一體之同方顯覺妄因依誠非究竟圓實究竟者竪窮三際始終常然圓者體遍十方滿者衆德具足良由如來藏性本自如斯豈須減舊添新滅惑生智是以三重泯絶冥合覺心將此為本修行始得正名因地第四結牒問詞是則名為因地法行菩薩因此於大乘中發清淨心末世衆生依此修行不墮邪見解曰但結前文更無別義此下大文第二偈頌文二一標舉爾時世尊欲重宣此義而説偈言解曰泛論偈頌總有四種一名阿耨窣都婆頌此不問長行與偈但數字滿三十二即為一偈二名伽陀頌此云諷頌或名直頌謂以偈説法非頌長行三名祇夜頌此云應頌四名蘊馱南頌此云集施頌謂以少言攝集多義施他誦持故為何意故經多立頌略有八義一少字攝多義故二諸讚歎者多以偈頌故三為鈍根重説故四為後來之徒故五隨意樂故六易受持故七增明前説故八長行未説故今此經十一段偈於前四中皆是祇夜於後八中正唯三七義兼一五六全非二四八又慈恩説十謂利鈍前後曲直難易真俗取捨標釋智辨解持説行對會可知然長行偈頌相望有五對之例謂有無廣略離合先後隱顯今經問目皆長有偈無答皆長廣偈略餘隨相當對文當指今此段中五偈重諷長行更無別義故如次依前四段科之但經文有少增減故科段名亦少殊二正陳文四初一偈諷了悟本覺文殊汝當知一切諸如來從於本因地皆以智慧覺二五句諷推破無明了達於無明知彼如空華即能免流轉又如夢中人醒時不可得上二段皆長離偈合三七句諷拂迹成因覺者如虗空平等不動轉覺遍十方界即得成佛道衆幻滅無處成道亦無得本性圓滿故幻滅無處及成佛道等言長先偈後四一偈諷結牒問目菩薩於此中能發菩提心末世諸衆生修此免邪見菩提心者長隱偈顯下諸偈頌例此唱經自下大段第二令依解修行隨根證入謂創因法鏡照心頓能信解至於長久修證則節級不同良以障有淺深根有利鈍習氣厚薄心行依違故須處處隨根引令得出然其修證階降雖殊必藉本因故云依解前則信解此則行證故華嚴八十卷文亦唯四字攝盡所謂信初會解其次六會行第八一會證第九一會此乃文雖廣略妙軌攸同綸緒始終唯斯二典文中二初徵釋用心後廣明行相所以然者以悟修之理一異難明意實相符言而似反故須徵釋令解用心然後隨住隨緣廣為明其行相初徵釋文中大科四段不異初門伸請中三亦同前例今初進問威儀於是普賢菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解曰普賢是行中之體故標居首為下所依總別觀門不離此故二聖表法已具前文次正陳中文四一就當根徵起大悲世尊願為此會諸菩薩衆及為末世一切衆生修大乘者聞此圓覺清淨境界云何修行解曰信解圓覺即是當根雖達天真未明緣起下云曾不了知如幻境界大士悲愍接下垂方反覆徵問用心解行如何契合二問解行相違於中復二一幻幻何修問難以幻修幻也世尊若彼衆生知如幻者身心亦幻云何以幻還修於幻解曰初二句解後二句行謂一切如幻正解方成幻法非真復何修習故解與行進退相違徵釋用心實由斯矣此問從前知是空華即無輪轉等文而來意云身心既如幻能知亦是幻將幻還除幻幻幻何窮盡幻者謂世有幻法依草木等幻作人畜宛似往來動作之相須臾法謝還成草木然諸經教幻喻偏多良以五天此術頗衆見聞既審法理易明及傳此方翻成難曉今依古師解華嚴如幻之文法喻各開五法喻中五者如結一巾幻作一馬一所依巾二幻師術法三所幻馬四馬有即無五癡執為馬法中五者一真性二心識三依他起法四我法即空五迷執我法下諸幻喻皆倣此知二斷滅誰修問若諸幻性一切盡滅則無有心誰為修行云何復説修行如幻解曰此問亦從前拂迹中來謂若以幻故一切皆空能所總無遣誰修習云何復説修行如幻金剛三昧經亦云衆生之心性本空寂空寂之心體無色相云何修習得本空心三遮不修之失若諸衆生本不修行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫解曰意恐惑者又云一切如幻無不是覺覺性無生本來清淨知之即已何有修行故此遮云本空本不修多生生死苦今空今不修云何得脫苦不了如幻境界者未達緣起事相也從來不達事妄想不解脫今還不了知如何得解脫溺斯意者近代尤多但恃真如不觀力用四請修之方便願為末世一切衆生作何方便漸次修習令諸衆生永離諸幻解曰上遮不修之失已知決定應修故問對治之門如何永離諸幻論云若人唯念真如不以方便種種熏修終無得淨首楞云理則頓悟乘悟併消事非頓除因次第盡對於暫離故言永離謂初觀一體雖覺全真後遇八風紛然起妄行如窮子解似電光何法修治永除病本然經云一切衆生作何方便兩句之間文意斷絶譯之太略應添分別演説等言意則連續達者詳焉後亦頻爾正陳詞句竟後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告普賢菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生修習菩薩如幻三昧方便漸次令諸衆生得離諸幻汝今諦聽當為汝説解曰如幻三昧者由達身心如幻則冥本覺真如如鏡受影非受非拒故名正受三佇聽時普賢菩薩奉教歡喜及諸大衆默然而聽四正説二初長行四一標幻從覺生以為義本二明幻盡覺滿以釋前疑三令離幻顯覺正示用心四辨幻覺不俱結酬其請今初善男子一切衆生種種幻化皆生如來圓覺妙心解曰云義本者以普賢但徵修幻不問幻之所生佛説生於覺心未為正答所問且要標之為本憑之顯幻盡覺圓故得修幻義成幻盡元非斷滅故論云自性清淨心因無明風動乃至無明滅智性不壞如風止動滅濕性不壞等文中言種種幻化者有漏心心所法蘊處界等故偈云無始幻無明皆從諸如來圓覺心建立如來圓覺妙心者即性淨真心離相故圓非空故覺染而不染故妙中實名心如勝鬘等或名一心如華嚴起信也泛言心者總有四種梵語各異翻譯亦殊一紇栗陀謂肉團心二緣慮名心謂八識俱能緣慮自分境故或名為意等無間故或名為識能了別故三質多謂集起心即第八識集諸種子起現行故故楞伽云藏識説名心也四乾栗馱謂堅實心堅實心者即此所辨雖凡聖同依唯佛圓證故標如來皆生者謂本覺心體為因根本不覺為緣生三細業識為因境界為緣生六粗故楞伽云大慧不思議熏無明不思議變真如是現識因取種種塵及無明妄想熏是分別事識因是知此無明等皆無自體無自體故必假所依依圓覺心而生起也如幻馬無體必依於巾巾喻真心馬即蘊界配前五法本末應知問真能生妄真是妄源何故云無明無體答妄託真起説真為源現且迷真真本無妄如第二月託本月而起説本月為起二之依本月實無二輪即是二無其體故經説種種生於覺心不是心生種種然諸經論俱説萬法一心三界唯識宗途有異學者罕知違於己解則拒而不受若無備述曷究指歸今約五教對彰權實皎然斯得第一愚法聲聞教假説一心謂實有外境但由心造諸業之所感招故曰唯心不即是心此即有宗依十二處教執心境俱有故唯識破云復有迷謬唯識理者或執外境如識非無第二大乘權教明異熟賴耶名為一心揀無外境故唯心心所別相見不同但皆是心即名一義於中曲分三門一相見俱存以説一心此通八識及諸心所并所變相分本影具足由有支等熏習力故變起三界依正等報如成唯識説二攝相歸見故説一心亦通王所即安慧所立也但所變相無別種生能見識生帶彼影起故二十唯識論云唯識無境界以無塵妄見如人目有翳見毛月等事解深密經亦作是説三攝所歸王故説一心唯通八識以彼心所依王無體亦心變故大乘莊嚴論云能取及所取此二唯心光貪光及信光二光無二法第三大乘實教明如來藏藏識入楞伽文唯是一心理無二體於中二門一攝前七識歸於藏識故説一心謂七轉識皆是本識差別功能無有別體故楞伽云藏識海常住境界風所動種種諸識浪騰躍而轉生又云譬如巨海浪無有若干相諸識心如是異亦不可得然此上二門既是經文及無著論雖義當護法所破豈遵枝末而背本耶故列為其次轉深也二總攝染淨歸如來藏故説一心謂如來藏舉體隨緣成辦諸事而其自性本不生滅是故一心二門皆無障礙故密嚴云佛説如來藏以為阿賴耶此明性淨隨染舉體成俗即生滅門染性常淨即真如門二門唯一心也第四大乘頓教泯絶染淨故説一心謂清淨本心元無染淨對妄想垢假説名淨妄既本空淨亦相盡唯本覺心清淨顯現為破諸數假言一也故此文云種種生於圓覺妙心楞伽亦云不壞相有八識無相亦無相其文非一第五一乘圓教總該萬有即是一心謂未知心絶諸相令悟相盡唯心然見觸事皆心方了究竟心性如華嚴説良由皆即真心故成三義一融事相入義謂一切事法既全是真心而現故全心之一事隨心遍一切中全心之一切隨心入一事中隨心回轉相入無礙二融事相即義謂以一事即真心故心即一切時此一事隨心亦一即一切一切即一亦然三重重無盡義謂一切全是心故能含一切所含一切亦唯心故復含一切無盡無盡也皆由一一全具真心隨心無礙故此上五教總有八門後後轉深門門義別前不攝後後必收前覽者細詳令分菽麥然皆説一心有斯異者蓋以經隨機説論逐經通人隨論執致令末代固守淺權今本末會通令八門皆顯詮旨相對復為三門初約所詮逆次順法從七至一展轉起末謂本唯非染非淨一法界心七也由不覺之名如來藏六也與生滅合成阿黎耶識五也復由執此為我法故轉起餘七成八種識四也各由識體起能見分三也由能見故似外境現二也執取此境為定實故造種種別業共業故內感自身外感器界一切諸法一也二約能詮順文逆法從一至七展轉窮本謂佛對下劣根性未能頓達所起根本者且言從業所感此則初聲聞教一也次為機稍勝者説能所感一切唯識二三四也展轉乃至五六唯一真心名頓教七也等備如上説皆由根有勝劣故令説有淺深若執前前即迷後後始終通會方盡其源三能詮所詮逆順本末皆無障礙由稱法性直談不逐機宜異説故八也亦如上説唯心之義經論所宗迷之則觸向面墻解之則萬法臨鏡況此標為義本如何不盡源流達者審之勿嫌繁廣此下第二明幻盡覺滿以釋前疑前疑幻盡斷滅然上説幻從覺生染緣起也此明幻盡覺滿淨緣起也故論云有四種法一真如二無明三妄心四妄境界也熏習義故染法淨法起不斷絶云云染法者以依真如法故有於無明無明熏習真如故則有妄心妄心熏習無明不了真如法故不覺念起現妄境界妄境界染法緣故即熏習妄心令其念著造種種業能造有三謂身口意所造亦三善惡不動受於一切身心等苦謂三途四洲六欲三界也故勝鬘云不染而染法身不增不減經云法身流轉五道名曰衆生華嚴云心如工畫師等淨緣起者論云以有真如法故熏習無明則令妄心厭生死苦樂求涅槃以厭求故即熏習真如自信己性知心妄動無前境界修遠離法種種方便起隨順行順本性故修檀度等不取不念乃至久遠熏力故無明即滅無明滅故心無有起境界隨滅心相皆盡名得涅槃成自然業衆生雖等有真如而未有熏習力者因緣缺故然淨緣起據諸教説有分有圓分淨者謂二乘教於二執等各唯説一權教大乘則竪論往昔橫説餘凡及娑婆等皆云非淨故名分也言圓淨者謂有宿機聞佛圓教悟自身心本來常樂我淨故不執有五蘊之我貪瞋漸息業報隨亡稱性修行顯發性上過於河沙功德妙用盡未來際無有斷盡不同染法成佛則斷以真如法常熏習故成唯識論能所熏中皆揀真如者約一類教且説一分可思議義今此論者約楞伽等實教具不變隨緣二義如前所引不思議熏變等然淨緣起翻前染緣緣無自性染淨俱融合法界性起唯性起故無斷盡如華嚴説依此方名幻盡覺滿悟修行相如普眼章文中分三一舉喻該釋前文該前義本二法合唯談本義答難釋疑即本義也三兼拂同幻之覺今初猶如空華從空而有幻華雖滅空性不壞解曰前兩句喻前義本謂空中畢竟實無起滅但以眼翳空裏見華既翳時華依空現故言從空而有如圓覺妙性畢竟無生但以心迷性中現妄既迷時妄依覺現故言生於覺也後兩句正喻此段釋疑之文謂翳差則見華滅於空中華雖滅而空常在然華生時不生滅時不滅有翳有差見生見滅二法合唯談本義衆生幻心還依幻滅諸幻盡滅覺心不動解曰幻心因幻滅者謂此幻心由智了達方得除滅所了是幻能了亦幻則前疑云幻幻何修今答意云不妨以幻除幻前疑幻盡斷滅今答意云能所雙亡即契圓覺故云諸幻盡滅覺心不動其猶波因水起波滅水存幻從覺生幻滅覺滿三兼拂同幻之覺依幻説覺亦名為幻若説有覺猶未離幻説無覺者亦復如是是故幻滅名為不動解曰有三重拂一拂覺妄之覺對緣而起故亦是幻二恐云對妄之覺是幻不對妄者本有之覺即應非幻若起此心起即如幻三若云覺妄之覺本有之覺總無即名為真者此意亦如幻也舉要而言起心動念云妄云真無非幻也相躡起念勢極三重矣幻滅名不動者若依泯絶無寄分別不生圓覺真心自然顯現元無幻化故言不動三令離幻顯覺正示用心即正答前請問修習之意也前不疑合修不修但於修中疑用心違妨一向但請如何修行離幻兼已自遮不修之失故前段釋疑了此段正示用心後段即會通方便漸次之語既令離幻修行便已通得不修之失疑也故無別答之文文中三謂法喻合法中二初展轉離幻善男子一切菩薩及末世衆生應當遠離一切幻化虗妄境界猶堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離解曰此之展轉有其四重一離諸幻境二離離幻之心言如幻者揀非幻心三遣離幻之離四遣離離之離亦可一離妄二離覺三遣離四遣遣皆言遠離者有二一止二觀止離者休心息意永不追攀如人遇怨不應共處觀離者虗妄之法體性皆空如夢枷鎖寤則已離故下文云知幻即離又入佛境界經云諸法猶如幻如幻不可得離諸幻法故略而言之不繫之為止不計之為觀俱以止觀離之則定慧平等後密顯真覺文無覺字得無所離即除諸幻解曰夢中見夢轉轉覺於前非直到寤時所見方實故云得無所離即除諸幻無所離者有其二意一則冥於真覺真覺則不可離二則到真覺之中自然無如上節節之幻可離故故荷澤云妄起即覺妄滅覺滅覺妄俱滅即是真如二喻譬如鑽火兩木相因火出木盡灰飛煙滅解曰如有一段乾木以一木燧鑽之火出還將却燒二木木火既盡煙自然滅既成灰燼任運飛散不同二木形質為礙如次四節以配於法木段喻所修幻妄木燧喻能修幻智煙喻離灰喻遣經文先云灰飛譯之倒也定合是煙先滅餘灰飛散喻中缺於顯覺蓋文略也前法後合悉皆具有若欲具之應以地喻圓覺由前木等本從地出燒滅總盡唯有地存如種種幻化生於圓覺妙心幻化數重遣盡圓覺元來不動三合以幻修幻亦復如是諸幻雖盡不入斷滅解曰上三句正合喻之現文下一句兼前密顯真覺第四辨幻覺不俱結酬其請善男子知幻即離不作方便離幻即覺亦無漸次一切菩薩及末世衆生依此修行如是乃能永離諸幻解曰前云作何方便漸次修習令諸衆生永離諸幻故佛示用心竟結答不作方便亦無漸次如是乃能永離諸幻會通問中之文也但能知之是幻已名為離但得離幻即元是覺更無階級漸變為覺如人夢見身病問醫求藥寤來既知是夢更欲作何方便若待方便修之漸離即是實法何名幻化若執實有還是偏計何名修行故云爾也一切菩薩下結真成離亦是通結前用心之文第二偈諷亦為四段初五句諷幻從覺生爾時世尊欲重宣此義而説偈言普賢汝當知一切諸衆生無始幻無明皆從諸如來圓覺心建立標指生無明之言長無偈有次七句諷幻盡覺滿猶如虗空華依空而有相空華若復滅虗空本不動幻從諸覺生幻滅覺圓滿覺心不動故展轉拂迹長有偈無次一偈半諷展轉離幻若彼諸菩薩及末世衆生當應遠離幻諸幻悉皆離如木中生火木盡火還滅長離偈合又法及密顯真覺長有偈無後半偈諷幻覺不俱覺則無漸次方便亦如是其結酬之文長有偈無徵釋用心竟音釋㲉克角切音榷卵孚也糩苦會切音翽粳也窣蘇骨切音捽
