body:
  text: 終南山草堂寺沙門宗密述自下大文第二廣明行相有九問答類束為三初四問答通明觀行上根修證次四問答別明觀行中根修證後一問答道場加行下根修證然此三門前前不假後後後後必躡前前初門者大乘學人盡須聞此觀行故云通明然得益則有深淺故修證者唯指上根上根者但約能入之人非配法門局定如法華第一周聞則普聞悟唯鶖子文中四一開示觀門同佛二徵釋迷悟始終三深究輪回之根四略分修證之位若約四分科經則從徵釋用心兼此四段總當其解雖有觀成愛斷修證之相但為成其圓解正同華嚴修因契果生解分也然且依前初中開示身心無性二空理顯根塵諸法普淨普遍見境用心頓同諸佛故文四文三皆如前也今初之初於是普眼菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解同前也次陳詞句中三一舉法請大悲世尊願為此會諸菩薩衆及為末世一切衆生演説菩薩修行漸次云何思惟云何住持衆生未悟作何方便普令開悟解曰標請修行漸次者由普賢所問幽深如來稱理而答先欲消除心病然後萬行俱修或有聞前説云知幻即離不作方便亦無漸次謂言知之即已都不假修普眼智輔如來悲接群品欲使教法圓足請問起行之門如來大悲示其普觀身心根境一一推窮既見塵淨智圓觸向恆作是念習氣損之又損覺智百鍊百精若能如是思修剋取因圓果滿菩薩發起意在茲焉故慤云大士張教綺互相承若一人請周餘當杜述云何下別列於中先智後悲大乘之人必須具二無悲之智即墮二乘初中思惟者觀察真妄即思慧也住持者悟得妙境安住其中持之不失即修慧也下佇聽佛説生聞慧也從凡入聖必假三慧故普眼為衆咨求衆生未悟下問悲也請度生方便云普令開悟者即同法華欲令衆生開示悟入以開攝示以悟攝入故次下反顯云不能悟入謂大開之與曲示始悟之與終入彼論云開者無上義謂除一切智智更無餘事即雙開菩提涅槃謂知見之性為涅槃智見之相為菩提衆生本有翳障不見佛為開除即本智顯現故示者同義三乘同法身故悟者不知義不知唯一事實今令知報身菩提故入者令證不退轉地故即是因義謂證初地已上為菩提涅槃因故此後佛答全用先所顯示如來淨圓覺心為本以觀人法二空及滅影像無邊虗空覺所顯發覺圓明故顯心清淨乃至等同諸佛即普令開悟也二反顯請世尊若彼衆生無正方便及正思惟聞佛如來説此三昧心生迷悶即於圓覺不能悟入解曰言無方便思惟則迷悶者意是反明得聞佛説方便思惟即開悟也言聞此三昧者是前離幻法門也故佛歎普賢汝能為諸衆生修習菩薩如幻三昧普眼恐末世衆生聞前知幻即離等言迷悶不能悟入圓覺故請開悟之方便也迷則不悟悶則不入三結牒請願興慈悲為我等輩及末世衆生假説方便解曰假説方便者若以實理而言覺性本來圓滿幻妄本來空無但以不知則謂言定有知之即離離幻即覺實無所修然衆生煩惱習重難可頓除雖知本空未免繫縛是以普眼請佛於無修之中強説修習故云假也然大品經修諸行門皆以無所得而為方便今即以離幻為方便後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告普眼菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來修行漸次思惟住持乃至假説種種方便汝今諦聽當為汝説三佇聽時普眼菩薩奉教歡喜及諸大衆默然而聽如前可知第四正説長行中四一起行方便二觀行成就三頓同佛境四結牒問詞今初善男子彼新學菩薩及末世衆生欲求如來淨圓覺心應當正念遠離諸幻解曰謂即指前段中徵釋離幻用心以為起行之本若執法定實則觀行不成故須躡前為方便矣言正念者則無念也故智論云有念是魔業無念是法印論云離念相者等虗空界又云一切衆生不名為覺以從本已來念念相續未曾離念故知無念是正念也然正念與離幻反覆相成由離幻故正念正念故離幻何以故外存有法則內起緣念內有緣念則外見有法心生法生等云云由此雙指在諸行初第二觀行成就文二初戒定先依如來奢摩他行堅持禁戒安處徒衆宴坐靜室解曰奢摩他此云止止是定義下文釋云至靜為行定有深淺故標如來揀非粗淺邪小之定若亂心持戒不堪入此觀門故先定後戒亦可文雖先後修無先後堅持禁戒者一向絶緣的不擬犯名曰堅持防禁根門誡約身口故名禁戒戒品雖多統為三聚一攝律儀二攝善法三攝衆生今意説律儀義通餘二律儀戒者謂十無盡取要而言即唯四重此四清淨則一切枝葉不生佛頂云若不斷淫及與殺等出三界無有是處安處徒衆者即同行同見人也行業既同互相雕琢迭共商量為長道緣故須安處故寶積經七十二云得人身者彼應依善知識聽三世佛平等法聞已應發勤精進依城邑聚落與大衆共居具四部處更互相與論量佛法學問難答三世佛法平等得現在前解一切法無有自性修此解故煩惱漸除宴坐靜室者宴默也安也坐為攝身身住則心安心間境寂欲住身心故須靜室靜室處衆豈不相違此有二釋一根性不同故或多昏沉藉衆策發或多掉舉宜自息緣非為一人而行二事二定慧等學故謂圓通觀行要止觀相資須依善友或同見同行終日議論法門無令用心差錯差之毫釐失之千里故淨名云不必是坐為宴坐也雖同衆住不妨在自房室初中後夜或除論法轉讀便須靜坐思惟聞思修慧圓明豈但申申夭夭故無違也此依定持戒處衆靜坐答住持問二觀慧文二初明二空觀始教後明法界觀圓教初者衆生曠劫漂沉或墮邪小不成種智者良由二障二障不斷由於二執欲除二執必假二空故於法界文前先作二空觀智金剛三昧亦然執亡障盡即聖性現前應用塵沙名之為佛故成唯識敘造論意云為於我法二空有迷謬者生正解故生解為斷煩惱所知二重障故斷障為得菩提涅槃二勝果故文中二初破執後顯理執即我法理即真如能破能顯即二空智品初中我謂主宰如國之主有自在故及如輔宰能割斷故主是我體俱生宰是我用分別所謂有情者意生者摩納縛迦者養育者數取趣者命者生者士夫者作受知見者依蘊計此名為我執於中三類一即蘊計我此見差別有二十句色是我我有色色屬我我在色中受等亦然六十五句以色為我餘四一一是我瓔珞僮僕窟宅受等亦然復有九種一通二的三生四不五色六無七想八無九非非皆分別起此依一切異生而論非依一人具有此計矣二離蘊計我謂西國外道計我體常而量周遍或雖常而量不定或體常細如極微三俱非即離謂小乘宗犢子部等五種藏中第五不可説藏也法謂軌持能生物解任持自性故謂凡夫及外道小乘皆執離心有定實法通明我法二皆空者但依識所變故變謂識體轉似二分相見俱依自證起故依斯二分施設我法彼二離此無所依故或復內識轉似外境我法分別熏習力故諸識生時變似我法諸有情類無始時來緣此為實我實法如幻夢者幻夢力故心似種種外境相現緣此執為實有外境問云何應知實無外境唯有內識似外境生答實我實法不可得故釋此二空即分兩段一我空二法空初我空者即蘊離蘊非即非離皆非理故即蘊我者我應如蘊非常一故又內諸色定非實我如外諸色有質礙故心心所法亦非實我不恆相續待衆緣故餘行餘色亦非實我如虗空等非覺性故離蘊我者應如虗空不隨身作受故應非常住如槖籥風有卷舒故應非常一如旋火輪有往來故俱非我者計依蘊立非即離蘊應如瓶等非實我故又所執我為有思慮為無思慮若有思慮應是無常非一切時有思慮故若無思慮應如虗空不能作受故所執我理俱不成即我空也今此文中破即蘊我一切異生多計此故文又分二一觀身無我二觀心無我夫計我者既皆因五蘊五蘊自相唯身與心今且大段開之然始別別分析如此馳逐妄計何逃然約我為總則身心為別若約身為總則色心為別故説蘊者總有其三謂廣中略廣者八蘊謂色四地水火風心四受想行識中者五蘊略者二蘊所謂色心故有經云如擎重擔三科開合如下所明今初觀身身為諸愛根本了之虗妄則一切煩惱自除如其耽著則起無量過患故淨名因病廣説無常無強力堅等速朽不可信苦謂苦惱病集等智者不怙空如聚沫泡焰蕉幻夢影響雲電無我無主我壽人如地火風水又空無知無作穢滿必滅病惱老逼如毒蛇等勸令患厭涅槃亦云寧丸大地如葶藶子不能具説此身過患又云第三十二因説有智慧者重造輕受廣述修集身戒心慧名為有慧反此愚癡不修身者不能觀身及觀色相於非身中而生身相貪著我身不斷我見不能深觀是身無常無主危脆念念滅壞是魔境界不能觀身雖無過咎而常是怨如所事火如所養蛇遇緣滅壞都不憶念往日供給衣食之恩譬如壞缶如臃未熟金光明亦云我從久遠持此身臭穢膿流不可愛供給敷具并衣食象馬車乘及珍財變壞之法體無常恆求難滿難保守雖常供養懷怨害終歸棄我不知恩智論亦云難御無反復背恩如小兒文中二初尋伺觀後如實觀先因尋求伺察方見如實之理故今初恆作是念我今此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處解曰恆作是念者行住坐臥一切時中常如是觀也我今此身者執受既堅故偏觀也四大和合者堅濕暖動假合為身髮毛等者自外之內次第觀也精氣者氣即是精故屬水大然氣是四大之本不唯是風故水火中亦云氣也動轉者淨名云是身無作風力所轉謂迷性起心心運風力轉餘三大而有動作作無自性故云無也暖氣可知如是歷觀每大之中又衆多假合即知無我淨名云四大合故假名為身四大無主身亦無我又此病起皆由著我既知病本即除我想及衆生想今此經文還分四大各歸來處四大皆言歸者此身本合四大成故故寶積經云此身生時與其父母四大種性一類歌羅邏身若唯地大無水界者譬如有人握乾灰終不和合若唯水界無地界者譬如油水無有堅實即便流散若唯地水無火界者譬如夏月陰處肉團無日光照則便爛壞若唯地水火無風界者則不增長四大各離者正觀之時各有所歸即名為離不説命終方名為離故菴提遮女了義經説生死義云若能明知地水火風四緣畢竟不自得有所和合而能隨其所宜有所説者以為生義若知地水火風畢竟不自得有所散而能隨其所宜有所説者是為死義此意正明即合而散即散而合故合散之文皆云不自得妄身當在何處者且地有形礙而沉滯風無形礙而輕舉敵體相違水火亦互相凌奪金光明經亦云地水二蛇性沉下風火二蛇性輕舉故知四大相違各各差別未審我身屬於何大若總相屬即是四我若總不屬即應離四別有我身故云爾也後如實觀即知此身畢竟無體和合為相實同幻化解曰謂因前尋伺見如實之理定知四大非我但約和合假名為身亦無實體智論十四問云若自身無我而計我者他身無我亦應執我答此俱有難若於他身計我復當難云何不於自身中生計復次亦有人於他物中計我如外道坐禪入地觀時見地即是我水火風空亦如是復次有人遠行獨宿空舍夜見一鬼擎一死尸來復有一鬼來諍云云即假和合事也又只緣計我而為自身即以餘身為他故生難也後觀心無我夫心無自相託境方生境性本空由心故現根塵和合似有緣心內外推之何是其體長淪生死由不了心苟能了之圓覺自現故首楞云狂性自歇歇即菩提勝淨明心不從人得文中二一尋伺觀四緣假合妄有六根六根四大中外合成妄有緣氣於中積聚似有緣相假名為心解曰四緣等者謂四大和合成於一色初七薄酪於此色上方有六根六七六情開離此色身根元無體各分四大色尚不存竅穴六根更何依附六根四大中外合成者四大名中六根為外和合假成此身妄有緣氣等者由依四大六根和合成身即有六塵妄現也由此內外根塵引起妄心緣慮不絶念念生滅剎那不停緣合即有緣散即無推其自體了不可得故曰假名為心此虗妄心雖假緣生不離真心氣分故曰緣氣言似有者明非實有緣相者緣慮之相肇公云如有魍魎似有思想鞠兮推兮亦無指掌後如實觀善男子此虗妄心若無六塵則不能有四大分解無塵可得於中緣塵各歸散滅畢竟無有緣心可見解曰心託六塵塵依四大四大無體六塵即空故云緣塵各歸散滅緣即四緣塵即六塵緣塵既滅心體即空故決判云畢竟無有言緣心者則前緣氣之心也問無塵可得下三句亦説法空何得一向判屬人空答此指緣塵各散正顯心空故結云無心可見身之與心總屬我執金剛三昧亦云令彼衆生皆離心我一切心我本來空寂問實我若無云何得有憶識誦習恩怨等事答諸有情等各有本識一類相續任持種子與一切法更互為因熏習力故得有如是憶識等事問誰能造業誰能受果耶答諸有情等心心所法因緣力故相續無斷造業受果於理無違問誰趣涅槃答修習無我因緣力故相續相滅故名涅槃由此故知定無實我但有諸識無始時來前滅後生因果相續由妄熏習似我相現愚夫於中妄執為我第二法空者善男子彼之衆生幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅解曰前於身心之中推求無我故名我空此則身心及境一一自空故名法空然身等本空非今始滅故經云色即是空非色滅空但以迷時執有今執盡始無義言滅也幻滅亦滅者情計即見幻生智觀即見幻滅滅對於生智對於情對待之法皆屬緣生緣生即空故皆滅也般若心經云無眼界乃至無智亦無得楞伽云一切法如幻遠離於心識智不得有三重幻滅無幻滅亦滅而興大悲心然法空義是大乘初門欲使悟之事須委釋所言空者一切凡夫及諸宗計所執外法理非有故凡夫者四生六趣凡厥有情皆為離心有定實法不由稟學未必師承無始俱生觸境皆執所執之法情有理無由是定知皆不可得情有者唯識云彼依識所變起信云唯依妄念心生滅法生滅二十唯識云唯識無境界以無塵妄見如人目有翳見毛月等事問若無外塵但妄見者應一切時處皆見有色或皆不見何故於有色時處眼即見色餘無色時處則不見色又多人同處同時皆同有見不見彼論偈答處時等諸事無色等外法如夢及餓鬼依業虗妄見問翳見毛月夢見諸物皆悉無用淨眼寤時所見物等皆悉有用云何言如翳夢所見偈答如夢中無女動失身不淨問世夢寤已即無今了色如夢未免見色云何如夢答若得出世對治實智無有分別如實覺知一切世間色等外法皆是虗妄如是義者與夢不異由斯多義故云情有言理無者有三一析色明空謂以假想慧析至極微則色等空又推極微有方分及無方分皆不可得則極微空如唯識論徵釋二體色明空謂緣生無性故謂自他共及無因皆無生理故中論云未曾有一法不從因緣生是故一切法無不是空者三空中必無色故謂虗空無有邊際無壞無雜則空中必無色若有色體空則壞雜以色必不能壞空雜空故色等皆空也兼上情有有四門空義也故諸凡夫所執實法情雖似有理究則無智者應當違情順理諸宗計者謂外道餘乘及儒教道教也外道小乘所執諸法異心心所非實有性是所取故如心心所能取彼覺亦不緣彼是能取故如緣此覺然西域小乘外道宗計甚多此方既無不煩敘破儒道二教此國攸遵法執異途理宜詳斥雖二宗主設教不同而皆以虗無自然為三才萬物之本老云有物混成先天地生又云道生一一生二二生三三生萬物又云人法地地法天天法道道法自然易云易有大極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業若以自然常遍之道為因能生萬物此是邪因若法能生必非常故諸非常者必不遍故諸不遍者非真實故本來既是無異一因由何能生別異多果若能生者應頓遍生若待時及緣方能生者則自違一因或時及緣亦應頓起因常有故若謂萬物自然而生即是無因亦一切時處應常生故若謂一陰一陽之謂道變易能生萬物亦不出邪因無因皆同前破然但破謬執萬物生因不責勤行五常道德由上所計皆無理趣故自心外無法可得諸心心所依他起故亦如幻事非真實有為遣執心心所實有外境故説唯有識若執唯識真實有者如執外境亦是法執故金剛三昧經云一切心相八識并心所本來本無種子本無本處空寂無生若心無生即入空寂空寂心地即次下所顯心真如即得心空如上執情既盡心境皆空名法空也破二執竟大文第二顯理即二空所顯真如理也由前執盡故此理現如雲散月出塵盡鏡明非謂無雲便名為月但於無雲之處而見月矣非謂無幻便是真如但於無幻之處見真理矣文中二初法幻滅滅故非幻不滅解曰上句躡前下句正顯顯圓覺性本淨圓明獨體全真不因修得衆幻雖滅自性常存不假緣生故云非幻金剛三昧亦云若得空心心不幻化然對前妄盡釋云真如若以本宗但名圓覺後喻譬如磨鏡垢盡明現解曰雖云磨鏡却是磨塵所言修道只是遣妄夫鏡性本明非從外得塵覆即隱磨之則顯隱顯雖殊明性不異今謂人執法執是垢尋伺如實是磨真心本覺是明人法二空是現二空觀竟自下大文第二明法界觀也文三初印前顯後二拂迹入玄三圓彰法界初中謂印前二空顯後圓通法界文中又二初標善男子當知身心皆為幻垢垢相永滅十方清淨解曰上兩句印前下兩句顯後初言幻垢者幻謂虗幻無有實體垢謂塵垢坌污為名由迷幻相執取繫著坌污淨心故云幻垢諸佛菩薩雖有身心由了如幻不取於相無坌污義故非垢由了幻空故非幻顯後者根塵諸法十方法界普清淨也此由身心垢翳妄執自他故成局礙今既我空法寂何所不通後釋文二初喻善男子譬如清淨摩尼寶珠映於五色隨方各現諸愚癡者見彼摩尼實有五色解曰由鏡珠二事所喻不同故復標告善男子矣謂摩尼體性瑩淨絶瑕都無色相由性淨故一切衆色對則現中青黃赤白黑五色各各隨方而現然此一喻亦喻印前亦喻顯後言印前者五色喻五道隨方喻隨業愚人不了珠體但見全是青黃既見青黃則不見珠體故華嚴云凡夫見諸法但隨諸相轉不了法無性以是不見佛若以三性配者摩尼喻圓成實性即前所顯之理也現色喻依他起性即前幻也愚人見定是青黃喻遍計所執性即前塵垢也若遠取即前身心等相以此文印定前文之義故指前也言顯後者然此圓珠由彼愚人執其定色所以破色因配三性以印前文若無計執之人即此珠種種色一一清淨一一同體悉是圓珠妙用應現無體可破以喻後文十方法界一切清淨圓滿不動交參無礙故言顯後然前之鏡喻但一面明又云因磨而現表二空之理破執方顯對執得名今摩尼珠本淨本明十方俱照故以顯後法界之宗也後法善男子圓覺淨性現於身心隨類各應彼愚癡者説淨圓覺實有如是身心自相亦復如是解曰愚癡説有實身心者是顯圓覺雖現非其定實故論云一切染法所不能染智體不動具足無漏熏衆生故餘義喻中已具對釋詳之可知故云亦復如是第二拂迹入玄由此不能遠於幻化是故我説身心幻垢對離幻垢説名菩薩垢盡對除即無對垢及説名者解曰於中曲有二節先説迹之所以後從垢盡對除下正拂其迹今聯綿釋之然其迹也相躡而起亦相躡而拂本以衆生妄執幻化故佛説云幻垢衆生依教離垢故復説名菩薩幻垢既如珠中之色當知本無故云垢盡所離之垢既無對離之智何立故云對除既無對離之智何有起智之人深淺之執本無何有説教之者故云即無對垢及説名者對垢者菩薩説名者佛對機之佛亦不可得方見法身法身説經義在斯矣然上人法各三三對六隻盡是所拂之迹也謂法有執垢離垢及與名數人有衆生菩薩及佛問曰人自有差法本無異何説三名答尅體雖無義説即有為對人法各分能所故也第三圓彰法界文二初一真法界後三重法界言一真者未明理事不説有空直指本覺靈源也下對諸法圓泯圓收方説三重等別今初善男子此菩薩及末世衆生證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發解曰標告及指當根所證者為欲進顯不思議境界境界殊前故却躡前功用明其得入所以發起後之文勢言證得者觀行成就滅影像者依他亦泯無方清淨者約身為主外見東西肇公云云我相既無更何方所虗空覺顯者然虗空離識亦非實有若言有者為一為多若體是一遍一切處隨能合法體應成多一所合處餘不合故不爾諸法應互相遍若謂虗空不與法合應非容受又色等中有虗空不有應相雜無應不遍若體是多便有品類應如色等非遍容受故知虗空亦唯識現故首楞云若有一人發真歸源十方虗空一時消殞謂迷情所覆覺處見空塵影既銷空元是覺魚人迷悟水風性空顯謂空銷覺現發謂妄盡心開翻覆觀之俱無邊際故首楞又云聞復翳根除塵銷覺圓淨淨極光通達寂照含虗空却來觀世間由如夢中事空生覺中云云是知空有雙絶但是覺心獨鑒明明靈知不昧後三重法界者一真空絶相觀二理事無礙觀三周遍含容觀此中義意全同華嚴法界觀門三重行相故依彼科之仍每重先示觀門後釋經義今初第一真空觀者觀門中有四句前二各四為八兼後二為十第一會色歸空觀復四一色不即是斷空舉體即是真空故二青等非是真空之理無體莫不皆空故三色不即空空中必無色故又即是空會色無體故上三句以法揀情四凡是色法必不異真空以必無性故色空既爾一切皆然第二明空即色觀亦四一斷空不即色真空即色故二空理非青等非青等之真空必不異青等故三空是所依不即色必作所依即色故上三句亦以法揀情四空即是色以是法無我理非斷滅故空色既爾一切皆然第三空色無礙觀謂色舉體全是真空則色盡而空現空舉體不異色全是盡空之色而空不隱為一味法第四泯絶無寄觀謂此所觀真空不可言即色不即色即空不即空一切法皆不可不可亦不可此語亦不受逈絶無寄非言所及非解所到是為行境以生心動念即乖法體失正念故初二句入門揀情顯解第三句解終趣行第四句正成行體行由解成行起解絶也示觀門竟後釋經義者文中二一色相空淨二空色同如一中又七一內身根識二外境六塵三內外四大四世間諸法五出世諸法六自他正報七一多依報然觀門云一切法亦然即此七段是也應云根識即空不即空等七中初者覺圓明故顯心清淨心清淨故見塵清淨見清淨故眼根清淨根清淨故眼識清淨識清淨故聞塵清淨聞清淨故耳根清淨根清淨故耳識清淨識清淨故覺塵清淨如是乃至鼻舌身意亦復如是解曰此下皆云清淨者謂由前二空觀門揀情顯解次拂迹滅影同於行起解絶故皆清淨為真空矣故智論云畢竟空即是畢竟清淨以人畏空故言清淨意言人乍聞空畏其斷滅故餘處説云清淨如大般若一切皆云清淨大品即直云空空與清淨皆絶相義若就心説即如淨名經妄想是垢無妄想是淨無妄想即是空義故此説空云清淨矣由前幻垢已盡能觀之智又亡既合覺心故皆清淨故智論云菩薩於色等法中觀行斷故得如是清淨故名色清淨是淨能破一切法中戲論等覺圓明故者躡前顯清淨之因也由拂泯等故得圓明顯心清淨等者比迷覺心心中執法今見法性即法皆空故云清淨如人不識珠體但執青黃若見摩尼即色清淨七段之中文皆同此也然展轉躡前以顯清淨者義如後釋今且銷釋法數名體心者總相明其我心即賴耶自體成唯識論説第八識種種別名於中有四種名通一切位心即一也餘三即阿陀那所知依種子識迷時由執藏及能所藏故名賴耶今觀智成就覺性圓明故但云心沒賴耶名矣心既清淨同無垢識故此下文頓同佛境見塵者由我心計執故見一切色相由執相故即見聞等是塵不單説外色名塵亦不獨説根識名塵根塵識三自有文故尋此見塵之體還是我執之心但以就取色等生過之處而別立名又亦不離根境識三而別有體如五蘊之法與蘊中之我非別非同此亦如是若以意義配屬即賴耶中轉相及第七識合為此見等瑜伽論云賴耶識起必二識相應故又以六七合為此見意識緣外境時必內依末那為染污根方得生起故梵云紇利瑟吒耶末那此云染污意與四惑俱名為染污恆審思量名之為意思量即意持業釋也故此所列心法無別末那起信亦於説梨耶次便説意識無別第七楞伽亦爾故彼經云略説有三種識謂真識現識分別事識初即自性清淨心次即第八現相後即前六故彼經自釋云攀外境界起前事識即知事識不是末那然此彼經及起信論皆不別出末那體者據賢首説有二意故一如前説六八必俱二謂無明動真心成阿賴耶外境牽心起執染淨第七俱無此義故不別説又説計我則合於轉相計我所合於事識此亦不乖思量行相若不連前帶後則顯示心數相躡生起義不便故眼等根者識所依故能發識故前五各從自種生自現行四大所造淨色為體意根即第七識由此攀外起意識故眼等識者隨六根境種類異故由具五義隨根立名一依根之識非由境色識定生故如盲不見等二根所發識由根變異識必變異如眼根損見青為黃非色壞時而識壞也三屬根之識由識種子隨逐於根而得生故非色種子識種隨也四助根之識由根合識識所領受令根損益非境界也五如根之識根識二法俱有情數非彼色法定是無情根五義勝故説依根雖六識身皆依意轉然隨不共立意識名或名色識乃至法識隨境立名順識義故依未自在位説若依起信皆名意識此六皆依意所起故意之識故故論釋生滅因緣云所謂衆生依心意意識轉故心即梨耶自體意即五意以梨耶二義中有不覺義故不覺而起業識能見轉識能現現識能取境界智識起念相續相續識意識者即此相續識此生起識粗細雖殊同是一識更無別體故即指前第五識也依諸凡夫取著轉深計我我所非直心外計境為塵亦復於身計我於塵計所種種妄執計我之相即蘊離蘊隨事攀緣分別六塵名為意識亦名分離識依於六識別別取六塵故故經云分為六和合又復説名分別事識又能分別去來現在種種事相釋曰此五前三合八後二合六由斯前釋體不孤生然八識義相復有多門今略指十五一者通論八皆名心意識別則八心七意前六皆識二者隨相各以自名為體三科則識蘊意處七心是體也就實統歸藏性三者五緣五塵現量是實六緣一切三量此假實七緣賴耶非量是假八緣根身種子器界現實四者皆具四三二分五者八遍非計七計非遍第六俱是前五俱非六者根本煩惱俱生四鈍二利分別具十第八全無第六皆具第七俱生四惑前五俱生三毒其所知障數同用別二障下自有文至彼當釋七業障者第七全無八有種子餘六現行八者報障則八唯總報前六別報九者心所恆依心起故與心相應故繫屬於心故心緣總相心所緣總別如畫師資作模填彩等故第八有五所謂遍行觸作意受想思七有十八謂五遍四惑癡見愛慢八隨沉掉懈逸念亂不信不正知并慧第六皆具五有三十四謂遍別善全根本三惑中無慚無愧大隨同上十者八七無記六通三性十一者八皆實有就性皆假十二者眼耳身三二界不全二地地全鼻舌兩識一界一地六七八識通遍界地十三者皆通有漏無漏十四者依因緣增上五依五根及六七八六依七八七八互依及等無間十五者眼識九緣生空明根境作意根本染淨分別種子耳識唯從八除明鼻舌身三七除空後三六七八也五更除染淨分別三更除根境四更除根本却取根境二外境六塵善男子根清淨故色塵清淨色清淨故聲塵清淨香味觸法亦復如是解曰略啓三門初釋名義次辨體性後顯種類初有通別通即塵也復更有名所謂六衰及六無義皆約凡位亦云六境此通凡聖別者眼等所取故名色等對根明境名色等故次出體者如前六根各自為體後顯類者色有通別通謂五根五塵及法處色俱名為色此等皆有質礙義故今則別也謂唯眼所取名之為色有見有對質礙之相最粗顯故法處之色無見無對餘四及根無見有對略有三種謂顯形表顯謂青黃等赤白光影明暗煙雲塵霧空形謂長短等方圓粗細高下正不正也表謂行坐等住臥屈伸取捨聲謂因執受等及邪正教并可意等香謂好約境約心惡準上平等非上二俱生沉等與質俱起和合衆成變易未熟不香味謂苦醋甘辛鹹淡及俱生等觸謂地水火風冷熱澀滑痛癢飢飽等法者一百數中唯除五塵已自標列餘皆是法也三內外四大善男子六塵清淨故地大清淨地清淨故水大清淨火大風大亦復如是解曰即於根塵不取發識牽心之義直取四大之體也寶積經説四大各二謂內及外皆無所從來亦無所去也地界二者內謂自他身內所有堅者強者所謂髮毛爪齒等外謂身外所有堅者強者所謂土石草木等水界二者身內潤性淚汗等身外潤性雨露等火界二者身內熱體熱相能消飲食等身外熱體熱相能成熟等風界二者身內風體風名速疾住四支等身外體等而此四大從本已來生時住時體性俱空體性自離滅性亦離釋曰彼云皆空此云清淨蓋一義耳然內外四大雖各有種外起現行必由內變四世間諸法善男子四大清淨故十二處十八界二十五有清淨解曰十二處者六根六塵是生識處處是生門義故亦名為入意識常昏根塵相入故或唯六數相對説故十八界者一根門中根識塵三各有界分故眼與識為界識與色為界等故亦是因義種族義故前為六二解者息於業因此是六三觀之治於我執兼之五蘊即具三科大小乘宗無不約此以明諸義前説妄認四大身心及云中外合成等即五蘊義故此略之然此三科非各別體開合説者有其三解一根有三品謂上中下或下中上二樂有三品略及中廣三迷有三類一迷心所不迷心色故説五蘊二迷色法不迷心心所法故説十二處三迷色心不迷心所説十八界然將此三科攝百法者蘊則色攝十一受想各一行七十三識有其八唯六無為非蘊所攝處則五根五塵各一意當八識法八十二界者五根五塵六識各一意攝二識法八十二二十五有者四洲四趣四禪四空無想淨居梵王六欲為二十五此皆是有各約實報非正智攝故然梵王在初禪無想淨居在第四禪四禪位中別舉此者梵王有見外道無想淨居唯聖異餘天故章門二十有四我空章法空章法界章八識章色章三科章十力章四無畏章四辨章不共法章三十七品章成佛章四果章不生滅章緣生章業報章三途章人天章四禪入定章上二界章二障章地位章四相章證道章除釋本經外旁通餘義二十有四開示悟入義定慧等學四大成身覺二執過患識變義識三義遣顯法喻摩尼五道佛三寶破空藏識夢義恩愛義染淨平等八萬四千義恆沙義三覺義五品修十善義不思議義四生義三報義五道實義智無所得義設象指月義右附録中音釋槖籥槖音托籥音藥葶藶葶音亭藶音歷草名臃臃音雍腫也邏郎佐切羅去聲巡也魍魎魍音罔魎音兩木石之怪也
