body:
  text: 終南山草堂寺沙門宗密述次後有二問答兩重除障初淨業章除我入覺後普覺章依師離病此皆觀行中障故同大科初中雖約計執淺深說有四相差別然統之唯是我故經文除別列四名之外節節但有我字若除此執便是圓覺故云入覺文四初三之初於是淨諸業障菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解之同上次陳詞句中二一慶前大悲世尊為我等輩廣說如是不思議事一切如來因地行相令諸大衆得未曾有覩見調御歷恆沙劫勤苦境界一切功用猶如一念我等菩薩深自慶慰解曰不思議事者前總明觀行一向稱理而修猶可領解今於一味之中廣張諸輪屈曲差別差別不乖一味尤為難見故云不思議一切下遠承所答文殊之問覩見下悟因行也夫果德稱真約理可照因行治染體解實難今一念備知炳然齊現如琉璃瓶盛多芥子故深慶矣二問後三一正問世尊若此覺心本性清淨因何染污使諸衆生迷悶不入解曰此中問意不說本來起迷意明已知覺性圓明諸法清淨何得凡心宛在不合覺源所作所為情猶憎愛自他全別難自渾融比對果人天地之遠覺心本淨悟即應同更有何法染污令我用心異佛故云因何迷悶不入二請後唯願如來廣為我等開悟法性解曰法性者諸法之性若直談本體則名覺性若推窮差別之法皆無自體同於一性即名法性今推破四相豁融諸法令同覺性故云開悟法性從前經文但云覺性唯此段云法性意在此矣三結意令此大衆及末世衆生作將來眼可知後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告淨諸業障菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生咨問如來如是方便汝今諦聽當為汝說三佇聽時淨諸業障菩薩奉教歡喜及諸大衆默然而聽四正說長行中四一總敘過由二別釋四相三存我失道四斷惑成因初中總敘四相為過患之因由又二一明過患本起善男子一切衆生從無始來妄想執有我人衆生及與壽命認四顛倒為實我體解曰從無始來者未曾悟故故下有生盲之喻妄想等者無中橫計我等四者統唯我相廣釋如上但由展轉約義故有四名四名復有二相一迷識境二迷智境初者謂取自體為我計我展轉趣於餘趣為人計我盛衰苦樂種種變異相續為衆生計我一報命根不斷而住為壽者如金剛兩論所說迷智境者即此經說至文當知顛倒者真我本有迷之謂無妄我本空執之為有四皆橫計故云認四顛倒故淨名云法無有我離我垢故法無有人前後際斷故法無衆生離衆生垢故法無壽命離生死故慤云心自取心自成心病演若愛影背本瞋頭從此妄滋莫能蠲拂二明過患滋多文四一展轉生妄二違拒覺心三動息俱迷四結成障道今初由此便生憎愛二境於虗妄體重執虗妄二妄相依生妄業道有妄業故妄見流轉厭流轉者妄見涅槃解曰文有十句言展轉者初四句由迷起惑次二句由惑造業次二句由業招報後二句反於三道墮於二乘然此十句總當二乘宗中生滅四諦謂初六句集諦次二句苦諦次一句道諦後一句滅諦言生滅者准天台教權實通論總有四重四諦實審一生滅逼迫名苦即有漏色心增長名集即業煩惱寂靜為滅謂即涅槃出離名道謂止觀等故二無生涅槃云解苦無苦名苦諦等故三無量涅槃云苦即無量相非謂二乘所知等又云所未說者如林樹葉故華嚴一剎已有四百億十千也四無作陰入皆如無苦可捨煩惱即菩提無集可斷生死即涅槃無滅可證邊邪皆中正無道可修理盡於斯方名聖諦矣如次是彼四教所詮法矣如懸談說然彼唯約四諦顯義分齊者具世出世因果故通權實故今此文中約其過患故當生滅初集諦中復有其二謂惑與業且初四句出迷起惑謂由執四相為實我體所以於自生愛於他生憎順我者愛違我者憎如是愛憎皆由執我故曰由此然四大五蘊迷性妄生衆緣合成已是虗妄更於其上重執我人故云於虗妄等次二句由惑起業謂由前二妄故生起造作種種妄業業能引至苦樂之果故名為道慤云然空華一揆美惡情分就妄之中又分諸異言二妄相依者則憎愛二境更相顯對生妄業道者舉心耽染可意業生不可相馳尤增恚恨次苦諦者謂由造業成就則受生死流轉生死流轉即是所至善惡之果慤云言妄業道者一念貪染地獄門開瞥起瞋心刀鋒聳立言妄見流轉者愛色臨終親瞻猛火亡魂飛墜起伏乘煙業本自心心還自見後滅道二諦者慤云厭識流轉伏念澄神趣寂纏空化城非實二違拒覺心由此不能入清淨覺非覺違拒諸能入者有諸能入非覺入故解曰此文正是結答前問前問因何迷悶不入今答云由認四相展轉生過縱離六道復墮二乘是故不入次云非覺違拒等者由前問云因何使諸衆生不入故此答云非覺違拒使之不入但由認我故不入也如夢身未忘必不能合於本身非本身違拒有諸等者釋成非覺違拒意云入時若是覺入不入則是覺拒既入者自是能證之智覺體元無出入入與不入何責於覺又解見覺能入覺亦成非故知必在忘情無念方名真入故慤云帶能非證示過彰非三動息俱迷文二一正明是故動念及與息念皆歸迷悶解曰動念即前苦集息念即前滅道二徵釋二初徵何以故解曰動念任許背覺息念即合契真何故動息俱稱迷悶二釋分二一直釋由有無始本起無明為己主宰解曰由將無始住地根本無明以為我主故動是我動息是我息我相既有動息俱迷然本起無明者最初根本而起又從本源而起經云獨頭無明為煩惱種亦同此矣不待因境名為獨頭故前先標我體然後展轉生惑業苦等二轉釋一切衆生生無慧目身心等性皆是無明譬如有人不自斷命解曰前是對徵之釋此又委細釋於前文本起之義於中二先法說意云衆生無始來未曾開悟故云生無慧目如人若十歲二十方始眼盲則眼前雖不見青黃等色說之則能了知若胎中無目生來便盲則對色之時種種為說終無所益則先須金錍抉瞙然後為說是非故涅槃經說如生盲人不識乳色他人為說展轉譬喻貝聲常米軟樂雪冷淨鶴動我竟不能得識其乳色故云身心等性皆是無明若宜契覺心以覺為本則一切皆覺故前根塵普淨段中最後結云一切覺故又前得本起因地既所修皆是佛因此用本起無明則一切皆是魔業前如金為千器器器皆金此如土為千器器器皆瓦後喻說本因愛故得身若斷身則違愛如人身縱卑陋病苦亦自保命終不能斷斷餘或可自斷誠難認我亦爾斷一切煩惱惡業容有得者欲令斷我其可得乎何以故我終不能還斷我故又有我故必不覺我如眼不自見故必情忘想盡與覺一體覺是真我則妄我本無方名為斷如夢身縱令至劣至苦夢時終不肯斷必須覺來合於本身方嫌夢苦復無可斷又此喻亦可喻於後段愛我之言及養育無明之語前段後段血脉連環故此一喻通於前後四結成障道是故當知有愛我者我與隨順非隨順者便生憎怨為憎愛心養無明故相續求道皆不成就解曰是故當知者指前意勢直從我體起憎愛已來乃至不斷命等此都結之以成障道所以次二句對順生愛以明我次二句對違起憎以明我次二句雙指上二唯滋無明故知迷心修道縱令勤苦種種行門但助無明何成佛果後二句正明障道言相續者本從無明而生憎愛憎愛還熏無明種子現行相續不斷將此求道畢竟不成寶積經云於身生寶愛不離於我人彼作是修行由斯墮惡趣二別釋四相然此我等行相殊常常者但約迷執初果已除此乃直就修證羅漢未曉文中即為四段一約事驗我二悟我成人三了跡跡生四潛續如命初謂驗其任運分自他者是其我相文中二一標釋粗相二結指細相初中二一徵起標示善男子云何我相謂諸衆生心所證者解曰心謂第七識所證者即第八識見分一切衆生任運執為內我故此相難可自見約事證知但驗自他各殊即證自中有我設令修道捨妄證真但覺有心總名我相二約喻以釋善男子譬如有人百骸調適忽忘我身四肢弦緩攝養乖方微加針艾則知有我是故證取方現我體解曰弦緩者緊急緩慢也即四肢不調手足失度之狀也餘皆可知以況道者燕居靜室或隱深山心絶經營境無違順習間成性暫得忘情不覺自他謂證無我若違順所逼宛有心生心既未平方知我在故下云若復有人歎謗其法即喜恨等慤云調適即稱理虗凝忽忘則比融真宰弦緩況違真負疾乖方明理性違常針艾乃觀照除遣方現表能心卓爾二結指細相善男子其心乃至證於如來畢竟了知清淨涅槃皆是我相解曰證於已上是能如來已下是所所中又如來是能涅槃是所謂非但了知二乘涅槃為我相設使了知如來涅槃亦是我相然涅槃但是覺體非別有可證今既證得涅槃不忘能所即是我相二悟我成人悟前非者是此相矣文二一粗相善男子云何人相謂諸衆生心悟證者善男子悟有我者不復認我所悟非我悟亦如是悟已超過一切證者悉為人相解曰言心悟證是覺前非者字正明人相不復認者不作證心悟亦如是同前非也二細相善男子其心乃至圓悟涅槃俱是我者心存少悟備殫證理皆名人相解曰不取能所故名圓悟無非不盡故曰備殫殫盡此智不袪為存悟矣非諸差別故云少也亦如唯識加行偈云現前立少物但彼空此智為異耳三了跡跡生謂了前二相俱是心跡總不執之故免我人然此了心又亦是跡故云了跡跡生文三一徵起標示善男子云何衆生相謂諸衆生心自證悟所不及者解曰覺前能悟悟是所覺悟既成所覺又名能展轉無窮皆成能所能所及處皆是相待了此無定故離前非計所不及謂免諸過不覺此計又是衆生衆生者不定執一之謂也二舉喻徵釋善男子譬如有人作如是言我是衆生則知彼人說衆生者非我非彼云何非我我是衆生則非是我云何非彼我是衆生非彼我故解曰借世人語詞以為義勢顯衆生相言非我者以自是衆生故非彼者以云我是衆生不云彼是衆生故此顯於自於彼不計我人故非彼我後云非彼我者非彼人之我也三指前對辨善男子但諸衆生了證了悟皆為我人而我人相所不及者存有所了名衆生相解曰初指前二相後而我下對之以辨衆生之相了證者空則我不及了悟者空則人不及不執主宰故離我人心又不忘是衆生相四潛續如命謂都無所執但擬修行由不起心免前三過即此無執之業智相續未忘非是故意生心故言潛續文二一徵起標示善男子云何壽命相謂諸衆生心照清淨覺所了者一切業智所不自見猶如命根解曰即心之照故云清淨即自覺也覺前了跡故云所了即覺他也證悟等盡徹於真源更無別能故直言心照擬將此智修習一切無漏之業故名一切業智又業是業用一切作用之智名為業智但覺潛續之心故名不自不自同於幻化一念不生即是論中世間自然業智及不思議業相今以雖能除妄而不自除故名所不自見不自見故猶如命根如命根者兼取相續不斷之義二展轉細釋文三一以義正釋善男子若心照見一切覺者皆為塵垢覺所覺者不離塵故解曰心照見是此門之相一切覺總指前三相由將此心見他諸覺故皆塵垢心未忘故結云覺所覺者不離塵故二以喻返釋如湯銷冰無別有冰知冰銷者解曰湯銷冰盡同成一水更無能知盡者反明此業智既照前三相皆盡則是我病未盡如冰若言我盡即此言盡之冰便是不盡若本末配合則水喻真心冰喻四相湯喻智慧煎水名湯悟心名智故謂水凍成冰還煎水以銷之冰湯俱盡濕性獨存以喻真心迷心成我還悟心以銷之我智俱盡照體獨立三以法正合存我覺我亦復如是解曰若依喻反合應云無別有我知我盡者今翻喻勢順前正釋故云正合三存我失道文二一總標失道善男子末世衆生不了四相雖經多劫勤苦修道但名有為終不能成一切聖果是故名為正法末世解曰但名有為者由前四相皆有所證既將此心修行則行行皆帶能所故不成聖正同華嚴多劫六度不名菩薩正法末世者正宗佛法之末世夫正法之時修則皆證末世之時人多取相今既取證之相則正法亦同末世若遇此教了達病源則雖末世還同正法後展轉廣釋文四一認我為真二說病為法三將凡濫聖四趣果迷因初中二一徵釋其過二結成障覺初中六一久修如何不證徵二認我取證非真釋三取證云何妨道徵四愛寂憎喧非脫釋五云何定知非脫徵六讚喜謗瞋驗我釋今初何以故解曰劫數既多行又勤苦以何義故不證聖果釋中二一法認一切我為涅槃故有證有悟名成就故解曰良由認我以為涅槃故雖多劫勤修終無所益如認夢身以為自己勤為家業種種疲勞終無一事益於資産二喻譬如有人認賊為子其家財寶終不成就解曰賊若在外猶可隄防養之為兒如何撿慎又知賊是賊賊無能為養之為兒寧無損敗以喻六根取境猶可制御藏識妄我難以辨明故如來藏中功德之寶念念衰耗由此貧窮難集福慧三取證云何妨道徵何以故解曰前徵何以多劫不證釋云由認我取證故此又徵云縱使認我取證何以便妨於道四愛寂憎喧非脫釋有愛我者亦愛涅槃伏我愛根為涅槃相有憎我者亦憎生死不知愛者真生死故別憎生死名不解脫解曰夫生死輪回本由憎愛欲求解脫須盡二源今愛涅槃還是本愛今憎生死亦是本憎棄苦欣樂雖殊憎愛元是本習帶之修道佛果豈成伏我愛根為涅槃相者由伏之故不起不起之相似涅槃相以似為真故云爾也不知愛等者本愛涅槃擬除生死愛心既在即生死根愛根憎苗豈名解脫故曰不知愛等五云何定知非脫徵云何當知法不解脫解曰法者涅槃由前釋云愛涅槃者名不解脫故此徵云若愛生死許是繫縛今悟涅槃是寂滅法以何相知還同本愛而不解脫六讚喜謗瞋驗我釋謂實證者必無我無我故即無瞋喜今為法瞋喜即知證法非真也我未盡故文中二一標我未盡善男子彼末世衆生習菩提者以己微證為自清淨猶未能盡我相根本解曰微證者外知根塵假合內覺性體寂然猶未下正標未盡二以境驗知若復有人讚歎彼法即生歡喜便欲濟度若復誹謗彼所得者便生瞋恨則知我相堅固執持潛伏藏識遊戲諸根曾不間斷解曰讚毀等者然世境違順粗重易明唯就法門最難覺察但言為法瞋彼度此不知此心元是我相則知下因對外境驗得內心我執猶堅潛藏相續雖慧軍數舉上云多劫勤修又聞前三觀也魔衆頻摧上云憎生死伏我愛及微證也且阿賴耶城難攻主宰偈云覺城義當翻此城也末那常侍防護牢強意識謀臣經營內外傍監五識之將以鎮六賊之門由是賊王我相頻通遊戲時時偷號貪號慈悲瞋號降魔惑我法王化主往往侵疆無漏慧也擾我觀境學人雖外怯般若晝伏觀照時也夜行妄起時也而內挾無明晝夜不斷種子二結成障覺善男子彼修道者不除我相是故不能入清淨覺可知二說病為法文二一正釋其非二結成障覺初中二一覆推善男子若知我空無毀我者有我說法我未斷故衆生壽命亦復如是解曰覆推者躡前為法瞋喜之次推窮以成說病為法之過恐聞瞋喜是我便擬忍受不瞋用為無我故推徵云若見彼是毀人我被彼毀而不瞋者此亦是我故云若知我空無毀我者既見有毀我者則未得我空亦應云若知我空無我說法故次云有我說法我未斷故然毀者是彼說者是我經文於毀者言無返明過也於說法言有順明過也餘三相亦爾經略人字為成句故翻覆推過者下擬決斷為病故二決斷善男子末世衆生說病為法是故名為可憐愍者雖勤精進增益諸病解曰說病為法者指前所推之過即是四相四相若存總名為病衆生不了但謂為法是故名為可憐愍者增益諸病者帶病修行故增諸病反此而言則稱實修行唯益實德如藥草等種有甘苦水土所滋各唯增益苦喻我相為本甘喻淨覺為本水土則喻萬行二結成障覺是故不能入清淨覺可知三將凡濫聖文二一正明相濫二結成障覺初中二一抑聖同己善男子末世衆生不了四相以如來解及所行處為自修行終不成就解曰佛說了義稱理法門皆言心境本空惑業本淨凡聖不異因果圓明就佛見之理實如此且衆生迷倒已久種習根深縱令信解法門現用元來隨念但以分別心識解他無礙言教謂言佛意亦祇如然心既是念故不覺念不知冥通證入異於信解之心認佛平等之談不能斷惑求證故經印言終不成就華嚴亦云如貧數他寶等二騁已齊聖前則抑高就下此乃騁下齊高文二一認其聖智或有衆生未得謂得未證謂證解曰得者是理乃至聖人所具功德證即是智則聖人冥證之智身今謂證者增上慢人若自知不證而言證者則根本戒中大妄語戒非此文意二驗出凡情見勝進者心生嫉妬解曰然諸聖人形類不定得與不得內證在心何以辨他未得未證故觀徵所見以驗真虗夫聖人用心他己無二見他勝進或法教流行念念歡喜必能隨順自驗內心如此或即證悟不虗若自覺己衰他盛則嫉己盛他衰則喜縱令深解妙境但是心之所緣勿錯認之謂得謂證二結成障覺由彼衆生未斷我愛是故不能入清淨覺解曰未斷我愛者雙指前兩類之人前段解凡聖平等境界而未許以佛解同己乃云終不成就者以佛無我愛凡有我愛故後段見勝進嫉妬亦由我愛故畢竟不能入清淨覺四趣果迷因善男子末世衆生希望成道無令求悟唯益多聞增長我見解曰希望成道者趣果也次兩句迷因也故經說聲聞唯觀於果不觀於因如狗逐塊不逐於人夫欲修學先須悟心心既洞明然求廣解末世之人多迷此意唯宗名數不務了心心既不通解唯增我故云增長我見華嚴亦說不了自心增長諸惡又智論云多聞無智慧是不知實相譬如大暗中有燈而無目等四斷惑但當下成因佛說下由前數段經文說修行中有多過患皆結云不入淨覺故此勸誡令離過用心方成正因文中二一順釋但當精勤降伏煩惱起大勇猛未得令得未斷令斷貪瞋愛慢諂曲嫉妬對境不生彼我恩愛一切寂滅佛說是人漸次成就求善知識不墮邪見解曰先斷惑中言但當者正標勸誡之詞精勤及起大勇猛者通於修斷未得令得者真實境中一切功德妙用未斷者顛倒境中一切障礙之法即貪等也然斷惑之文前後頻有今通收就此略啓三門一所斷惑障二斷之行相三斷之位次初所斷者有通有別通謂此經唯識起信各說二種五性文初已會釋訖別者有其本末本有二種一是論中根本不覺由此方成阿黎耶故即文殊章中無明是也二者彌勒章初廣明愛是輪回根本各已釋訖一是所知障本二是煩惱障本末者起信寶性二論各說九種皆如前釋唯識本頌總說六種論第九約障十地復說十種十種已如前說六種者頌曰煩惱謂貪瞋癡慢疑惡見長行釋云性是根本煩惱攝故得煩惱名雖對隨惑稱本望上迷真為末八識章已略辨今更具釋以銷經文文云貪瞋愛慢者彼論愛非其數以無別性貪所攝故此唯三法是彼論也貪者於有有具染著為性能障無貪生苦為業謂由愛力取蘊生故瞋者於苦苦具憎恚為性能障無瞋不安惡行所依為業謂瞋必令身心熱惱起諸惡業不善性故慢者恃己於他高舉為性能障不慢生苦為業謂若有慢於勝德法及有德者心不謙下由此生死輪轉無窮受諸苦故此慢差別有七九種謂依三品我德處生七謂慢於劣計己勝於等計己等過慢等計勝勝計等慢過慢於勝計勝我慢自恃高舉增上慢得少謂多卑慢多勝計己少劣邪慢無得謂得九者謂我勝過我等慢我劣卑有勝卑有等慢有劣過無勝慢無等過無劣卑然七寬九狹九唯七中三故慢卑慢過慢各三為九合如注配也諂曲嫉妬即小隨煩惱各別起故名小但是貪等分位差別等流性故名隨諂者為罔他故矯設異儀險曲為性能障不諂教誨為業貪癡一分為體嫉者徇自名利不耐他榮妬忌為性能障不嫉憂戚為業瞋一分為體然根本六中今闕癡疑及惡見者癡在偈故三翻徵釋已決疑故偈云我身即是身見身見斷則餘見自除故餘謂邊邪二取此等皆依身見起故又重言彼我愛者愛與我相長相應故此章正為除我別明於己及他相憐愛故故云恩愛生死根本最難拔故念盡即自他寂故又諸經教煩惱名數增減取捨隨何意趣不可一準且依此開十數見修所斷三界總有一百二十八也二斷之行相者五教不同初小乘者剛藏章中已釋二始教者聖道斷惑不從三世但智起時即無其惑猶明與暗定不俱生如稱兩頭低昂時等故智與障理必不俱三終教者自有二義一約相翻二約相續相翻者意不異前但前義不盡謂無間道正斷惑時為智先起惑後滅耶為惑先滅智後起耶為同時耶此中惑智若先後者各有兩失不成斷義謂若智先起智有自成無漏過不能滅惑過惑有自滅過不障聖道過若惑先滅亦有此四四名亦同但相望時義別總成八過也前說明暗乃是同時正當中百二論燈不破暗之義謂明於暗到與不到俱不能破以此二相互相無故同時則相乖異時不相預故以法合之不成斷惑涅槃亦以此喻喻毗婆舍那不斷煩惱又稱衡是一低昂同時智惑不然豈離前過若此宗斷惑必須了惑非無性相無礙謂若定有則墮於常常不可斷若定無者復無可斷今以真理隨緣故智即無起而起惑則無斷而斷隨緣自性故智起而無起惑斷而無斷言相續者不約惑智相對但就能斷之智自有三時三時有二一約初心究竟通分三時二約無間道中剎那三時今依十地經論並通此二論云此智盡漏為初智斷為中為後答云非初智斷亦非中後偈云論指經偈非初中後故若三時無斷云何斷耶論云如燈焰非唯初中後前中後取故此舉喻釋成大品經亦云譬如燃燈非初焰燋炷亦不離初焰後焰亦爾而炷實燋也謂實教斷惑必性相雙明經文正顯證智唯據甚深緣性不可說義論主兼明斷惑故性相雙辨非初非中後辨因緣無性是斷之不斷前中後取即不壞緣相是不斷之斷謂若一念能斷何假三心既並取方成明知無性無性故無初中後方成後故初中後斷此則從緣故無性無性故從緣也四頓教者此有三門一唯斷本本斷則末除本末如上故上文云永斷無明又云先斷無始輪回根本二悟其空方名為斷如夢桎梏寤即解脫故文云此無明者非實有體乃至知是空華則無輪轉等論云覺於念異念無異相等三見其性非斷非不斷謂此惑性是真覺故論云依覺故迷若離覺性則無不覺等經云一切障礙即究竟覺又云一切覺故故文殊教衆生發我見心以我見即菩提故不應斷覺故云非斷文云知幻即離不作方便等又云於諸妄心亦不息滅淨名云不斷煩惱等故是真覺故不應認惑故非不斷文云諸幻盡滅覺心不動又云幻滅滅故非幻不滅又云由澄諸念客塵永滅此意如寤時非除却夢中物故云非斷又非留此物故非不斷非斷非不斷是真斷惑五圓教者即華嚴宗一切煩惱不可說其體性以所障法必窮三際徹十方一即一切主伴無盡具四法界唯非真如皆如前釋故能障之惑一障一切障故普賢行品起一念嗔具百萬障門也能斷之智一斷一切斷故隨好品阿鼻獄人頓證十地證於法界一證一切證已如前證位中說也成就佛果一成一切成出現品如來成正覺時普見一切衆生成正覺般涅槃也三斷之位次者小乘如前次始教者二障各有分別俱生現行種子二分別種見道初斷彼二現行地前已伏煩惱俱生種者初地已去自在能斷留故不斷對法論云菩薩十地唯修所知障對治道不修煩惱障對治道以潤生攝化故不墮二乘故為斷所知障故為得大菩提故故攝論云留惑待惑盡證佛一切智謂以智御用不起過患而成勝行猶如禁蛇如攝論說直至金剛喻定現在前時一時頓斷其現行者地前漸伏初地已上頓伏八地已上不行所知俱生者種則地地漸斷金剛永盡現則地前乃至十地方永伏盡八地已上六識俱者不行第七俱者猶起前五雖未轉依無漏伏故障不現起終教者二障不分俱生分別但有正使及習氣謂地前伏現行初地斷使種地上除習氣佛地究竟淨然於三賢中已不墮二乘地故於煩惱自在能斷為除智障留故不斷梁攝論云十解已去得出世淨心又云得出世名聖人不墮二乘地仁王云地前得人空而不取證起信亦說少分見於法身能現八相等故以此菩薩唯怖智障故修唯識真如等觀伏斷於彼初地已上斷此一分粗故於煩惱障不復更留故二障不分見修至初地時正使俱盡彌勒問經云菩薩見修道中一切煩惱能障利益衆生行故即見道中一切俱斷故其末那煩惱亦初地斷粗後除習氣攝論云轉染污末那得平等性智初現觀時先已證得修道位中轉伏清淨此明除習氣也正使先斷故但云轉淨不言斷也寶性論亦說地上依彼二種習氣障又始教中為引二乘故以上就下說煩惱障同二乘教佛地方盡又以下同上許二乘全斷煩惱分斷所知今就終教實論愚法聲聞無廣大心尚不能究竟拔煩惱障但能折伏何況能斷彼所知障如彌勒問經釋論及楞伽說頓教者若約悟理合覺誓志背塵則不作漸次文云居一切時不起妄念又云心不生虗妄故信位便云勞慮永斷得法界淨然惑雖虗妄橫執即生不能頓除任運漸盡如風頓止波浪漸停文云於滅未滅妄功用中便顯差別即當論中四重覺妄已如地位中引釋華嚴圓教者五十二位中位位圓斷故位位成佛具有其文略如前明廣如彼說斷惑義竟次釋餘文對境不生及一切寂滅者觀行成就煩惱已伏也然約此宗亦名為斷初發心住同初地故佛說下四句佛印成因於中云漸次者由前說除我用心當時雖悟仍慮長時難離我習故佛誡云但得頓悟我空勤斷煩惱我見習氣漸盡無上佛果自然漸成求善知識等者商人入海須假導師學者修行必資善友二反釋若於所求別生憎愛則不能入清淨覺海解曰言別生憎愛不入覺者反明不生憎愛則入覺也故云反釋不生憎愛則是斷惑入覺即是成因故就此門曲分此段慤云嗟時行者畜病為功枉敘虗勞必招沉墜明明佛誡請審鑒心無使一代空行虗游義海偈讚中四如次頌前初中一偈總敘過由爾時世尊欲重宣此義而說偈言淨業汝當知一切諸衆生皆由執我愛無始妄流轉二中二句別釋四相未除四種相不得成菩提三中一偈存我失道愛憎生於心諂曲存諸念是故多迷悶不能入覺城解曰城喻覺者城有三義一防外歒二養人衆三開門引攝今以不入覺城故愛憎諸念侵逼若了心性空則衆惑不入見恆沙功德即萬行圓增道無不通則自他引攝便能契果絶百非以成解脫養衆德以全法身開般若而無不通矣上三段皆長廣偈略四中二偈半斷惑成因若能歸悟剎先去貪瞋癡法愛不存心漸次可成就我身本不有憎愛何由生此人求善友終不墮邪見所求別生心究竟非成就解曰悟剎者剎是世界如入唐國率土屬唐蕃境亦爾故知若到悟境即法法屬悟迷境亦然法愛者憎生死愛涅槃也我身本不有者我身即憎愛之本欲除憎愛莫執妄身所依既空能依何有又愛彼潤身憎彼違我我身不有憎愛無生悟剎我身皆長無偈有
