body:
  text: 終南山草堂寺沙門宗密述五出世諸法彼清淨故十力四無所畏四無礙智佛十八不共法三十七助道品清淨如是乃至八萬四千陀羅尼門一切清淨解曰問世間之法從妄情所變妄盡許萬法全空出世間法真實如何亦言空耶答若凡聖對待即勝劣全殊若稱法界觀一種總是幻化皆從緣起無自體故如有一鏡現種種雜穢瓦礫復有一鏡現種種勝妙珍寶癡孩不了貴賤懸殊智者達之一無差異觀智圓明心識淨者亦復如是見世出世若聖若凡一切皆空全是覺體故下文云見佛世界如空華等祇緣稱理平等所以名曰聖人如其重聖輕凡欣真厭妄縱令修習豈證真源文中三節一諸佛果法二三乘因法三總結初十力者然如來唯一諸法實相智力此力有十種用故說為十總名力者能摧怨歒故不可屈伏故一總知一切諸法因緣果報是處因果相當非處反上謂女輪王二王惡業樂報五蓋修七覺佛過聖斷結生云云則降伏無因惡因知人可度說法不可作緣二知過現未來過去業報在過現未單復云云現未亦爾善等三種業三性心中互受三性業報及順現等三報報與時互有定不定知所度有障無障前明所造業處業非處今約能造人受報唯明是處又前總此別也三知諸禪解脫三昧垢愛見慢等淨不雜愛等及知依此所得諸果前通定散唯有漏此唯定無漏四知信等五根上中下今世但得初二三四果及禪定后至無上菩提為略廣出苦說等五知種種欲樂難陀五欲提婆名聞迦棄頭陀阿難多聞等凡聖各別云云令捨不淨增清前知宿惑多少此知現起好樂六知一三五乘貪瞋癡等種種性欲性即種子欲即現行從性生欲習欲成性性通善惡根唯信等知即時異時誰可度不等必示略廣讚所迎棄云云七知一切道善惡無漏等行至處五道涅槃八知宿住過去本生本事住宿世故凡但有通聲聞亦明佛即兼力百千世劫悉遍知故前知前際名隨念趣因此知前際名性苦樂等九知死此生彼即天眼智也獨此從所依得名通明力例上說十知自解脫無疑亦知衆生漏盡涅槃然佛力無量今約度人因緣故但說十足辨其事初知可度不可二知有障無障三知著味不著四知勝劣五知所樂六知所趣七知解脫門八知先所從來九知生處好醜十知得涅槃又初力總攝為度生故於中分別九力四無畏者一正知一切法諸佛誠言我是一切正智人等成實云說二諦故不與世諍故真實論故皆心知故故不可壞二盡諸漏及習言我漏盡等三說一切障道法成實云不善及漏善障解脫故四說出苦道聖道能出世間能盡諸苦佛作誠言說此四法決定無畏若有沙婆魔梵若復餘衆如實言不知乃至不見是微畏相故我安隱得無所畏初二顯自功德後二利益衆生又一三說智二四說斷又初示藥法二示病滅三知禁忌四示應食也此望十力廣略說故又能有所作無所疑難自有智慧無能壞者智慧猛利堪受問難等故皆上句十力下句無畏四無礙智者智緣四境無拘礙故一法即真之俗如說地水火風等是名字也二義真諦之境如堅濕暖動等正顯地等三詞謂得彼方言以說地等四於三種智中樂說然華嚴九地初地分得此地任運經云無暫捨離佛地究竟說有十種自相同相行相說相智相無我相乘相因相果相住持相皆前二境別一中法者知諸法自相謂色變礙等義者知諸法別相色十一等二中法知自性義知生滅三中行相現在差別過未差別四中教本解釋五現知不異比知如實六真俗無我相七乘相一乘諸乘八因相智法隨證分位差別九佛地相法身色身十住持相能說智德所說聲教後二則同皆詞則說於法義樂說乃詞中別義如一中云詞無錯謬說無斷盡二中云詞安立一切法說隨安立不可壞等故佛十八不共法者力等二乘有分此無分故一二三身口多劫戒定妙慧大悲成就故拔諸罪根因緣及習故念四念處心長夜修故心無得失無失通上三業四無異想於衆生無貴賤敬慢怨親等異故常觀誰可度故觀彼本來清淨故入不二法不行誑法故也五無不定心如澄停水如無風燈問佛若常定云何游行說法答佛於諸法實相中定不退失故欲界有定入定可說故也六無不知已捨衆生鈍根多覺苦受樂受於捨受中不覺不知而有捨心是為愚使所使佛於不苦不樂受中知生住滅時故念念心中粗細淺深無不悉知知已而捨忽捨衆入禪有人疑佛佛言我種種因緣知而故捨七欲佛知善法恩常欲集諸法故修習心無厭足故也八精進如欲中說欲為初行增長名進欲為意業進通三業又佛小息令阿難說法至進覺支佛驚起三問讚善又種種度生遇諸惡緣不生懈怠也九念於三世諸法一切智慧相應故失名錯誤減名不及故異於前十慧三世一切智慧力無畏無礙成就故禪油念炷故世世聞法讀誦思修問難十一解脫無漏智慧相應故有為解脫一切煩惱習盡故無為解脫十二解脫知見於解脫中智慧無量無邊清淨故言知見者譬如繩二合一則牢也無減貫通上六唯說六事無減者二利中四事即足欲求進行念守慧照辨此四法有二果報謂解脫解脫知見也十三四五一切身口意業隨智慧行無不利益衆生故異二乘故成就三不護故入外道衆中說法都無信受者及現胸現陰等皆有因由故前三無失不說因緣今說隨智慧行故行不失故異前也十六七八以智慧知過未現在通達無礙由此故上三業隨智慧行問過未無體現在無住云何能知三世答若無過未佛豈成就十力等德問若三世皆有便墮常過即無罪福生死縛脫有無量咎答三世各各有相非過未有現在相又若無過未亦無出家律儀亦無五逆諸罪以是業等已過去故亦無死入地獄未來無業故無報是為邪見又我不說過未如現在相我說過去雖滅可生憶想能生心心數法如昨日及明日與今日可生憶想過未亦爾現在心雖無住相續生故能知諸法也問無見頂相等亦無與共云何不說答此十八中但說智慧功德不說自然果報法力等四科全依智論三十七助道品者略為四門一釋名二辨類三出體性四明行相初助謂資助助正道故道即是因所謂止觀品即是類正因類故亦云菩提分分亦因義二辨類者有其總別總謂諸經論說大乘道品無量三十七者是其中別義通於大小若准智論但三十七無所不攝如四諦有無量相也別者總有七類謂四念處四正勤四神足五根五力七菩提分八正道分三出體性者但以十法為體謂信二進八念四戒三定慧各八輕安喜捨思惟各一四明行相者初中四念處者四謂身受心法念謂念慧四是念慧所安住處故亦名念住以慧守境由念得住故必要四者從粗至細對治凡夫四種倒故四即常樂我淨此即先重後輕為次初觀身不淨不淨有五謂種子住處自相自性究竟等二觀受是苦謂此身既爾衆生貪者以其情塵生諸受故計之為樂故觀其苦受謂苦樂捨等苦謂苦苦壞苦行苦此配三受三觀心無常謂誰受此樂故須觀心念念生滅四觀法無我即五蘊法皆不自在又如實觀察對治小乘四種倒故不淨等也無行經云觀身畢竟空觀受內外空觀心無所有觀法但有名然觀不淨等通大小乘智度瑜伽大集般若皆性相雙觀也觀其性空唯是菩薩又但觀法性即除八倒既除八倒即成八行涅槃雙樹四雙八隻四枯四榮正表於此謂法性之色實非是淨凡夫計淨是名顛倒實非不淨小計不淨亦名顛倒今觀色種即空空中無淨云何染著則凡淨倒破枯念處成色種是假假智常淨云何滯空而取灰斷言色不淨是名二乘不淨倒破榮念處成觀色本際非空非假非淨不淨乃名中道佛表此理故於中間而般涅槃餘三類此是則法藥有四觀智為念諦理名處然華嚴經四皆有三一內自己二外非情色三內外他有情又俱謂觀內身循身觀勤勇念知除世間貪憂等然深觀念處即坐道場更不須餘機宜不同故說餘品四正勤者四念處似火若得勤風則無所不燒故次辨之精進為體故總名勤異外道勤故名為正雖是一勤隨意分四前二勤斷二惡是止惡行後二勤修二善是作善行二善二惡皆所緣境前中未生之惡遏令不生已生之惡斷令不續後二未生善令生已生令廣四神足者謂欲猛利樂欲勤精進無間心專一境性觀由先聞教法內自揀擇上定此慧也以勤過散亂智火微弱故須定制即所欲自在神即是神通足即是定由出世法最勝自在欲等四定能證此故名為神足亦名如意足所欲如心故神足所緣即種種變事神足自體即三摩地欲勤心觀皆是助伴由欲增上力證心一境性名為欲定餘三亦然勤觀心性名為上定皆從加行受名此四加行即華嚴前正勤中云欲生勤精進發心正斷等以發心中持心能生止定持大舉故策心能生觀定策大沈故是以隨一念處有四正勤隨一正勤有四神足五根者信信為上首能起餘四謂於諦寶深忍樂故進於前所信策勤而行即正勤也念念處也明記不忘也定繫緣一境即神足也慧揀擇是非此五通生出世間法而為增上然始入佛法即有信心未有定慧不得名根今由前三科則信不可拔前三至此總得名根若依位者在於見道之前則以速發現觀而為其果五力者即前五根增長魔梵惑等不能屈伏故名為力又能損滅不信等障故復名為力智論云能破煩惱得無生忍故名為力七覺者覺謂覺了七謂念所依支由繫念故令諸善法皆不忘失也擇法自體支覺自相故精進出離支由此勢力能到所到故喜利益支由心勇悅身調適故也輕安能除粗重定依此不染污故謂依止定得轉依故捨是不染污故謂行捨平等永除貪憂不染污位為自性故上三皆不染污支也若依位說即現觀自性如實覺慧覺法自性然七皆自體而差別者覺為自體餘六皆覺支分總收七覺不出三品念通定慧次三是慧後三定攝雖是前三至此增故依位所明能斷見惑以為其果又雖一剎那七法俱起而隨行相各說功能念除忘念擇除不正知餘除懈怠昏沈粗重散亂掉舉上約通說大乘七覺不念諸法故決擇不可得故離進怠相故絶憂喜故除安心緣皆叵得故性定之中無定亂故亦不見於能所捨故八正離八邪道開通涅槃者謂正通八見分別支依前所證真實揀擇故思惟誨示他支如其所證方便安立思惟名義發語言故語善於所證問答決擇令他信有見清淨故業身業進止正行具足令他信有戒清淨故命如法乞求依聖種性離五邪命令他信有命清淨故上三皆令他信支問離身語業無別正命如何建立三種答婆沙云瞋癡所起身業名邪業語業名邪語貪所起二業即名邪命邪活命故精進淨煩惱障支由此永斷一切結念淨隨煩惱支由不忘失正止舉相永不容受沈掉等定能淨最勝功德障支由此引發神通等無量勝功德故也若能如上分別誨示等即是道支之果然其八中語業命三是戒蘊攝念定是定餘三是慧定慧大同諸品但增勝耳上之七類次第者謂聞法已先當念持次即勤修勤故攝心調柔柔故信等成根根增為力七覺分別八正正行總以喻顯法性如地念處如種子正勤為種植神足如抽芽五根如生根五力如莖葉增長開七覺華結八正果如是乃至者超越多法謂三身四智五眼六通地度果向緣諦處定等八萬四千陀羅尼門者然法門廣說無量無邊今齊此結數者對治塵勞故然其所治即八萬四千煩惱古來釋云衆生煩惱根本有十然一惑力復各有十即為百計應分為九品但上品重故開為三品中下輕故各為一品合為五百復於內外境起謂自五塵為內他五塵為外一一各五百即為五千別迷四諦則成二萬并本一千則有二萬一千依三毒等分成八萬四千更有二說不能繁敘一一對翻即皆淨法數無增減故論云不覺念起見諸境界故說無明乃至具有過恆沙等妄染之義對此義故心性無動即有過恆沙等諸淨功德相義示現陀羅尼者得總持菩薩於一一法中持一切法故門者從一法中入一切法故然上從覺圓明故展轉躡前相由以顯世出世間諸法清淨至此五段歷法備周餘六七兩段但是結通他身他界更無別義五段相由者謂心本清淨由不覺故名賴耶識相應於意復曰見塵起於現行有根識境中有能造故說四大由是具足處界諸有有漏之法對治此等有修有證復成無漏因行果德今既覺了圓明故心意識及所變等展轉清淨皮之不存毛無所附然無漏法若約人修證則先因後果今據法本末故先果後因亦如論中根本滅故粗染隨滅六自他正報善男子一切實相性清淨故一身清淨一身清淨故多身清淨多身清淨故如是乃至十方衆生圓覺清淨解曰一切實相者即無相也夫有相者皆歸無常緣生之法性本虗假言實相者即是非相是故知來說名實相無遷無變究竟常住無量義經云如是無相不相不相無相是名實相智論云照色等空即名實相性空實理離於顛倒非虗僞故於空見空亦名顛倒於空無著乃至實法又楞伽經云一切妄息是名如實如實即實相也性清淨者此實相從本已來自性清淨一切妄法所不能染比迷似染今悟本淨名性清淨一身清淨者由前悟得根識塵大世出世間諸法皆歸實相清淨方始成就此人一身清淨故諸段清淨皆牒前支唯此獨指實相以為淨之所以多身清淨者既於自身證實相理亦見一切衆生同一清淨實相以觀一切衆生不取於相同圓覺性故志公云以我身空諸法空千品萬類悉皆同又下文云圓覺普照寂滅無二始知衆生本來成佛十方衆生圓覺清淨者以般若正智遍觀衆生菩提涅槃無漏智性本來具足也此乃一人悟性知一切衆生本性清淨非謂一人修道多人成佛七一多依報善男子一世界清淨故多世界清淨多世界清淨故如是乃至盡於虗空圓裹三世一切平等清淨不動解曰國土淨穢皆由自心衆生劫燒我土安隱螺髻鶖子二相不同按地寶嚴坐蓮無異況乃心冥覺性識智無生身土依真染淨俱泯廓通法界清淨湛然圓謂圓遍虗空裹謂含裹三世三世者竪極虗空者橫周一切者橫豎總該平等者本末同味清淨者都結七段不動者冥於一如然上七段悟時既相躡清淨迷時亦相躡垢染應云覺不明故令心不淨心不淨故見塵不淨見塵不淨故眼根不淨乃至如是一多世界不淨文勢及義意對經可知第二空色同如善男子虗空如是平等不動當知覺性平等不動四大不動故當知覺性平等不動如是乃至八萬四千陀羅尼門平等不動當知覺性平等不動解曰前之七段即空色無礙此當泯絶無寄彼云動念即乖法體反顯法體本不動也標空為首者躡前起後由前云盡於虗空平等清淨即知相盡同空空既本無生滅動搖當知諸法亦本不生亦不待滅一一當體如如不動覺性不動者然一切法唯依覺性生滅動轉諸法既盡同於虗空皆不動故則覺性不動也如波不起水則湛然不動理齊故言平等故法華云是法住法位世間相常住法句經云諸法從本來無是亦無非是非相寂滅本來無所動然諸法與覺性平等未名理事無礙法界者夫理事無礙要須多事全同一理而寂然一理全成多事而遷變即動即靜即靜即動生滅廣狹一切皆爾翻覆無礙今但一向不動但是攝色等事同真空理故唯名真空觀也乃至八萬等者還如前七段歷諸法門經恐文繁略標首末義兼中間故云乃至後段乃至之言亦例此知第二理事無礙法界善男子覺性遍滿清淨不動圓無際故當知六根遍滿法界根遍滿故當知六塵遍滿法界塵遍滿故當知四大遍滿法界如是乃至陀羅尼門遍滿法界解曰先示觀門者此有十門一理遍於事門謂能遍之理性無分限所遍之事分位差別一一事中理皆全遍非是分遍何以故彼真理不可分故是故一一纖塵皆攝無邊真理無不圓足二事遍於理門謂能遍之事是有分限所遍之理要無分限此有分限之事於無分限之理全同非分同何以故以事無體還如理故是故一塵不壞而遍法界也如一塵既爾一切法亦然思之此全遍門超情離見非世喻能況此二門後有海波喻及兩重問答也三依理成事四事能顯理五以理奪事六事能隱理七真理即事八事法即理九真理非事十事法非理上十同一緣起約理望事有成壞即離約事望理有隱顯一異逆順自在無礙同時深思令觀明現今經皆言遍滿法界者正是第二門行相兼於餘門義理謂此即理之諸法與理不異故一一自遍法界不同前門沒體攝歸理中故此名理事無礙也既遍法界即知動靜無礙一一周遍言覺性圓無際故當知六根遍滿者由前門已顯六根等與覺性平等平等者即無分毫之異也既與覺性不異覺性圓無際故六根亦圓無際故遍滿法界若不遍滿即是有際有際即與覺性成異異則乖於前門故躡前云圓無際故首楞云性見覺明覺精明見清淨本然周遍法界六塵已下皆例前知第三周遍含容觀善男子由彼妙覺性遍滿故根性塵性無壞無雜根塵無壞故如是乃至陀羅尼門無壞無雜如百千燈光照一室其光遍滿無壞無雜解曰先示觀門者亦有十門一理如事門謂事法既虗相無不盡理性真實無體不現此則事無別事即全理為事是故菩薩雖復看事即是觀理然說此事為不即理二事如理門謂諸事法與理非異故事隨理而圓遍遂令一塵普遍法界法界全體遍諸法時此一微塵亦如理性全在一切法中如一微塵一切事法亦爾三事含理事門謂諸事法與理非一故存本一事而能廣容如一微塵其相不大而能容攝無邊法界由剎等諸法既不離法界是故俱在一塵中現如一塵一切法亦爾此理事融通非一非異故總有四句一一中一二一切中一三一中一切四一切中一切各有所由思之四通局無礙重釋第二第二但遍遍即通也此兼不遍不遍局也五廣狹無礙重釋第三三但包含含即廣也今有不壞不壞狹也六遍容無礙此正合前四五兼合二三七攝入無礙翻對前門但前一望多故遍容此多望一故攝入也八交涉無礙兼前六七九相在無礙反對前門十普容無礙近收前二遠攝九門今經雖略義理全同謂根與塵皆是事法例前七段事事皆然故云乃至陀羅尼門無壞無雜當知種種事法一一交參周遍雖有性字此是各指根性塵性非謂泯根攝塵同於一性言無壞無雜者如一燈光已滿一室更有一燈光亦全滿百千燈光一一如是各不相壞亦不渾雜室中之空喻於法界燈之光相喻以根塵謂一燈光容多光相即一光相遍多光中一一皆然重重無盡含容周遍斯之謂歟所以然者唯是真心所現皆如幻夢影像故與所依性非一非異故故得遍多入一攝一容多等也大文第三頓同佛境於中三一用心同二見境同三稱實同初有法喻今初善男子覺成就故當知菩薩不與法縛不求法脫不厭生死不愛涅槃不敬持戒不憎毀禁不重久習不輕初學何以故一切覺故解曰覺成就故總指圓彰法界已下之文由斯故得同佛境界不與法縛等者於四對法無勝劣心如佛於三念之境故言同也同之所由經自徵釋云由一切覺故論云所言覺義者謂心體離念今則離前與求厭愛敬憎重輕等八念也舉八境者顯於心也喻云光無憎愛後云修習此心二喻譬如眼光曉了前境其光圓滿得無憎愛何以故光體無二無憎愛故解曰光即眼識現量所得故無憎愛首楞云其目周視但如鏡中無別分析但有自性分別無計度等汝識於中次第標指云其目者意取眼識云汝識者即是意識亦可但隨凡俗情見以目瞳為光如法華云梵王是衆生父二見境同善男子此菩薩及末世衆生修習此心得成就者於此無修亦無成就圓覺普照寂滅無二於中百千萬億阿僧祇不可說恆河沙諸佛世界猶如空華亂起亂滅不即不離無縛無脫始知衆生本來成佛生死涅槃猶如昨夢解曰修習此心得成就者近結八境安心遠結觀行成就無修等者泯前心跡起後依正凡聖平等之文若不泯之則雖無憎敬等尚見持毀餘三例之故須泯之方同佛見自此已下正顯其同圓覺普照寂滅無二者由自心已空但是覺照寧有凡聖差別之二焉冥一如之無心即萬動之恆寂故普照是用寂滅是體佛心所極極於寂照故瓔珞經說等覺照寂妙覺寂照今云同佛是等覺義故云普照寂滅金光明經攝大乘論皆說佛果無別色聲功德唯如如及如如智獨存三種世間融無礙故世界即器世間衆生即有情世間成佛即智正覺世間云於中者即於寂照中也圓無際故百千萬億者此方下數阿僧祇者此云無數是華嚴十大數中之首經論多用故此舉之不可說者大數第九若從一十百千倍倍積之總有一百三十七重數法恆沙者從阿耨池東面流出初出象口周四十里金沙混流沙細如麵今有不可說阿僧祇之數河一一河中一沙為一界以顯世界如是多矣然此中意者直指盡虗空遍法界所有世界不是算其數量為欲引機造無邊境故假增積多數耳諸佛世界皆如空華者緣無自性全體即真真性奪之無餘如前理奪事門故得相皆虗幻亦如善財求法展轉至摩耶等處會緣入實得願智幻解脫門見一切世界等皆如幻住云佛界者華嚴經說諸佛衆生一切世界有十種起具因緣故世界成就所謂如來神力法應如是衆生行業等亂起亂滅者有三意一者一切世界皆依妄念念既剎那不住世界亦起滅無停二者華嚴云染污衆生住故世界成染污大福衆生住故成染淨信解菩薩住故成淨染等三者成壞相也然成住壞空雖各二十增減而世界無量無數故總觀起滅繽紛問然佛化土許可如斯自受用中如何起滅答若依實教所明無形為淨土生公云佛有形纍託土以居佛是常住法身何須國土故華嚴云依真而住非國土此經云入於大光明藏餘義已如前辨問法華云我此土安隱天人常充滿復云何通答彼據理即事門此約理奪事門二皆無礙不即不離者明此世界不即圓覺亦不離圓覺如華與空如金與器由不離故覺性奪之成空華由不即故世界不妨有起滅無縛無脫者文通上下上即由世界無淨穢故下以衆生本成佛故始知衆生本來成佛者始知即始覺觀行成就方能知故本成即本覺知與不知本是佛故佛即究竟覺始之與本非二覺故生死涅槃猶如夢者亦無始覺之異四相本來同一覺故又寂滅無二是自覺世界及衆生是覺他成佛二字及生死涅槃如夢是覺滿成就是滿義故動寂雙亡方圓滿故上所釋文但明能知者成佛其所知衆生如次方釋云然說生本成佛唯是圓覺華嚴餘成義含不的指注但以語驚凡聽理越常情佛既罕言愚夫多謗若不具彰義類豈曰莊嚴契經故總敘六門顯成佛延促菩薩處胎經云或有衆生從初發意經歷劫數不得成佛或有次第成或有超越者亦使下文徵釋躡此易明一者一生成佛謂小乘有部唯悉達太子有大覺性於此生中苦行修道菩提樹下三十四心斷結五分法身初圓名為成佛二者三祇成佛謂始教說唯具大乘性者從初發意六度修行三無數劫五位伏斷十地滿足四智圓明於色究竟天受佛智職名成正覺三相盡成佛謂終教說一切衆生本覺真心本來離念不如實知匆然念起生住異滅念無自相不離本覺內外熏力始斷滅相終斷生相一念相應得見心性心即常住名成正覺前約功圓相滿此約相盡體現又前定待長久劫數此則唯依自心延促無定四初住成佛為華嚴說十信位滿於諸法中不生二解一切佛法疾得現前初發心時即得阿耨多羅三藐三菩提知一切法即心自性成就慧身不由他悟故彼疏釋云佛智何深情迷謂遠情忘智現則一體非遙既言一切法即心自性今理現自心即心之性已備無邊之德矣覺心理現理現則智圓若鏡淨明生非前非後非新非古不由他悟是自覺知一切法是覺他成就慧身為覺滿見夫心性豈有自他寂而能知名為正覺五一念成佛謂無始迷倒妄認衆生華嚴緣起一味章云若約衆生門中衆生及佛皆是生滅善惡境界未嘗見有一佛清淨解脫者識倒見佛亦倒故一念悟時全體是佛緣起章又云約佛門中佛及衆生皆本空寂情識已亡同諸佛故未嘗見一衆生流轉者心淨一切皆淨故也如夢身相夢時非無寤即自身豈待長養故論云亦無始覺之異華嚴云若離妄想一切自然無礙等智即得現前如塵破經出廣博嚴淨經云有三男子詣佛禮足作如是言世尊我今於此法能信能解不生疑惑第一男子白佛言若作是說我是如來此言便是正說所以者何我於此法不生疑惑第二男子云是世尊第三男子云佛其詞皆同爾時會中百千衆生心皆擾動不樂本座皆作是念無有二佛並出世間今此男子何故發如是言阿難謄大衆意問佛佛說偈印許偈云能知過去如亦知未來如見一切法如是故名如來不畏於生死正住生死中化度諸衆生是故名世尊覺無明無知其性無所有已得於明智是故名為佛菩薩處胎經云或有衆生朝發道心即得成佛諸大乘經其文非一達磨禪宗即心即佛是斯意也六本來成佛論云四相俱時皆無自立本來平等同一覺故涅槃論解微密義云身外有佛亦非密身內有佛亦非密非有非無亦非密衆生是佛故微密華嚴云如來成正覺時於其身中法界身也普見一切衆生成正覺乃至普見一切衆生入涅槃皆同一性所謂無性又云菩薩摩訶薩應知自心念念常有佛成正覺何以故諸佛如來不離此心成正覺故如自心一切衆生心亦復如是悉有如來成正覺彼疏問云此中之成為理為事若是事成云何皆同一性若是理成云何八相疏自答云此是華嚴大節若不對諸宗難以取解今約五乘及五教而辨然諸衆生若於人天教中觀之則具足人法二我若於小乘教中觀之但是五蘊實法本來無我若大乘始教法相宗即說唯識所現無相宗即說幻有即空人法俱遣若大乘終教唯如來藏具恆沙性德故衆生即在纏法身法身衆生義一名異猶據理說若大乘頓教則相本自盡性本自現不可說言成佛不成佛等若依此宗華嚴宗也舊來成竟亦涅槃竟非約同體此成即是彼成難若爾何以現有衆生非即佛耶答若就衆生位看尚不見唯心即空安見圓教中事如迷東謂西正執西故若諸情頓破則法界圓現無不已成猶彼悟人西處全東若爾諸佛何以更化答衆生不如是知所以須化如是化者是究竟化如是化者無不化時然上六門初門衆生無成佛義故次門五分中唯許一分半衆生定待三祇劫滿成佛後四門一切衆生皆許成佛於中三四妄盡覺顯是為成佛五頓悟無妄即名為佛六本無迷悟元來是佛又中間四門次次相望前延後促又前二事成次二事同理成五唯理成六皆無礙今經文者若約觀成方能知之即當四五兩門若約所知衆生本來皆佛即唯第六三稱實同善男子如昨夢故當知生死及與涅槃無起無滅無來無去其所證者無得無失無取無捨其能證者無作無止無任無滅於此證中無能無所畢竟無證亦無證者一切法性平等不壞解曰稱法界真實性故初句躡前由見生涅如夢即稱圓覺實性同佛境也此有二意一但有能依之夢必有所依之人夢是人之神遊亦見聞之氣分無別體故二但了夢體空無即證自身真實迷自身者由執夢故然餘喻皆帶自他唯夢喻尅體故大瓔珞經說過去有佛欲說法時令大衆睡眠夢中說法令增善根覺得道果涅槃羅剎云云迦旃延弟子云云亦表萬法皆夢大夢之境必有大覺之明矣當知下有四節初總明稱實謂迷時生死無起涅槃無滅悟時非滅却生死發起涅槃稱體而觀都無起滅聖法非新來凡心非滅去又直言體無起滅來去不約聖凡其所證下別指能所所證之境非得真失妄捨粗取妙能證之心都無分別離於四病病如下文於此下雙泯能所故故華嚴云若有見正覺解脫離諸漏不著一切世彼非證道眼一切法性下總結稱實故華嚴說衆生成佛次後亦云同此四節如注配之無相性無盡性無生性無滅性總明也無我性無非我性無衆生性無非衆生性無所證也無菩提性無能證也無法界性無虗空性雙泯能所亦復無有成正覺性總結四結牒問詞善男子彼諸菩薩如是修行如是漸次如是思惟如是住持如是方便如是開悟求如是法亦不迷悶解之可知後偈諷文三略於起行方便故初諷觀行成就文二初七句二空觀爾時世尊欲重宣此義而說偈言普眼汝當知一切諸衆生身心皆如幻身相屬四大心性歸六塵四大體各離誰為和合者後三句法界觀如是漸修行一切悉清淨不動遍法界長廣偈略次一偈半頌頓同佛境無作止任滅亦無能證者一切佛世界猶如虗空華三世悉平等畢竟無來去後一偈頌結牒問詞初發心菩薩及末世衆生欲求入佛道應如是修習音釋謄音騰傳也
