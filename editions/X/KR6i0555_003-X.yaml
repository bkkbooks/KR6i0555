body:
  text: 終南山草堂寺沙門宗密述第四分齊幽深者已知此經唯屬實教如前尅體未知所詮義理分齊如何今約論明染淨諸法從本至末略有五重以顯諸宗分齊淺深初唯一心為本源是心則攝世出世間法等即此圓覺妙心也經標圓覺為宗本故又說染淨皆從覺心所現起故華嚴即一真法界與一切諸法為體性故然華嚴雖有四種法界而彼疏云統唯一真法界總該萬有即是一心體絕有無等論中欲究妄本故約凡標心此經意顯淨源故約佛標覺華嚴稱性不逐機宜對待故直顯一真法界至於能起染淨一切諸法則三義皆同三法體一也二依一心開二門一者心真如門即是一法界大總相法門體所謂心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相乃至唯是一心故名真如知是空華即無輪轉乃至如法界性等二者心生滅門謂依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名阿梨耶識經五名中一名如來藏自性差別及云種種生於覺心等三依後門明二義一者覺義謂心體離念離念相者等虗空界無所不徧法界一相即是如來平等法身依此法身說名本覺乃至始覺覺圓明故顯心清淨乃至眾生本來成佛二者不覺義謂不如實知真如法一故不覺心起而有其念猶如迷人依方故迷眾生顛倒如迷方易處等念無自相不離本覺此無明者非實有體等自此之前正是此經宗旨始末所詮之義分齊四依後義生三細一者業相以依不覺故心動說名為業覺則不動二者能見相以依動故能見不動則無見三者境界相以依能見故境界妄現離見則無境界由有無始本起無明是故動念息念皆歸迷悶等唯識宗教唯齊此門以為諸法生起之本此三正是梨耶體故初即自體分二即見分三即相分故彼論引阿毗達磨經偈云無始時來界一切法等依由此有諸趣及涅槃證得以彼宗未顯此識與真如同以一心為源又不言依如來藏說為此識故所詮分齊不到前之三重問彼說賴耶既不約如來藏則與此異何得云是彼分齊耶答由此論後段亦云以依阿梨耶識說有無明不覺而起能見能現則同彼故問此論前說依無明有阿賴耶後云依梨耶有無明豈不二文自相矛盾答有三釋一由此梨耶有二義故謂由依真心有不覺動彼本覺心體起滅方名梨耶三相又即此梨耶還却與無明為依故論云三相與不覺相應不離何者謂前義依迷不覺起似梨耶即不覺真心成藏識後迷似為實即依此識有無明二云梨耶有二義謂覺不覺前別就本說故云依覺有不覺今就都位論故云依梨耶有無明此即二義中不覺之義正在梨耶中故得說依也三云此中正意唯取真心隨緣之義此隨緣義難名目故或就未起說依真如有無明或約成就起已說依梨耶有無明然此二名方盡其義是故文中前後綺互言耳唯識於三釋二義中各唯約後義以說無明今亦唯指後義為彼分齊問中間一釋云梨耶是都位具覺不生滅不覺生滅二義唯識中賴耶但是生滅豈同此耶答約此所通不約彼執故五依最後生六麤彌勒章初明輪廻本末謂一者智相依於境界心起分別愛與不愛故法執俱生二者相續相依於智相故生其苦樂覺心起念相應不斷故法執分別三者執取相依於相續緣念境界住持苦樂心起著故我見俱生四者計名字相依於妄執分別假名言相故我見分別上四皆惑五業六苦即三道矣五者起業相依於名字尋名取著造種種業故六者業繫苦相以依業受報不自在故然小乘宗教所詮分齊唯後四麤人乘天乘唯齊五六諸教分齊深淺歷然淺不至深深必該淺是知圓覺極盡五重然五重中曲論有十三法人乘天乘唯詮末二小乘有四唯識具九起信十三標云幽深良在斯矣五所被機宜者此經所詮境界既說如上幽深未委何等根機而能信解修證然約即時悟入各隨宿種不同若就畢竟而論一切無非所被且約即時料揀者又二初揀信解之器後揀修證之器初謂樂著名相以文為解者繫滯行位高推聖境者情尚於空觸言而賓無者自恃天真輕厭進習者固執先聞擔麻棄金者如上皆非其器反上即皆是器非器之中堅持不捨者障於信欲罷不能者障於解又依名求利不淨心說亦障實解如次反上即能信解名為器也後揀修證者二初明非器即經中我人眾生壽命等四相體相微細故唯障證入不障信解也文云一切眾生認四顛倒為實我體由此不能入清淨覺動念息念皆歸迷悶乃至雖經多劫勤苦修道但名有為終不能成一切聖果後明是器經云當求正知見人心遠二乘法離四病者應當供養不惜身命見其清淨乃至過患不起惡念即能究竟成就正覺亦如善財童子樂親善友故得一生圓普賢行也統而言之非其種者證小果入劫位亦不能入當其器者居凡劣處末世亦能入也如華嚴說二乘六度不及八難後明畢竟普收者一切眾生皆有佛性但得聞之無不獲益謂宿機深者悟入淺者信解都無宿種者亦皆熏成圓頓種性如華嚴經食金剛喻若約五性配者正被菩薩及不定性令修觀行證入兼為餘性作遠因緣故經文一一科段皆云為諸菩薩及末世眾生等三聚中則為正定令增妙行為不定聚令修信心為邪定聚作遠因緣故下文云能令未來末世眾生不墮邪見新熏本有之義前已辨之所被機竟六能詮體性者略作四門一隨相門於中有五五中前三通大小乘取捨不同各為一說一音聲為體諸佛唱唱號詞言詞評評量論論說語音宮商等語路語所行處語業語用語表令佗生解是謂佛教其名句文但顯佛教作用非佛教體離聲無別名等攝假從實故二名句文謂次第行列次第安布次第聯合能詮諸法自性差別二所依故聲是所依非正教體但展轉因故謂語起名等名等方能顯義此三離聲雖無別體而假實異亦不即聲今以體從用故取名等三雙取為體由前二說皆有教理為定量故俱舍云牟尼說法蘊數有八十千彼體語或名此色行蘊攝即雙存也故十地經有空中風畫之喻本論釋云風喻言音畫喻文字清涼云以余之意亦應雙取若就前二有去取者寧依名等良以音聲正就佛說容為教體流傳後代書之竹帛曾何有聲豈無教體書是色法亦與名等為所依故色聲俱是色法皆實也四徧於六塵一切所知境界總有生解之義悉為教體如淨名光明塵勞楞伽動身直視等五通攝所詮體瑜伽云諸契經體略有二種一文二義文是所依義是能依此明教義相成若不詮義文非教故二唯識門謂總收前五並不離心唯識等云一切所有唯識現故然通就諸教本影相對以成四句一唯本無影謂即小乘不知唯識故二亦本亦影即大乘始教謂佛自宣說若文若義皆是妙觀察智相應淨識之所顯現名本質教佛地云聞者善根本願增上緣力如來識上文義相生此文義相是佛利佗善根所起名為佛說若聞者識上所變文義名影像教佛地云如來慈悲本願增上緣力眾生識上文義相生此雖親依自善根起而就強緣名為佛說故二十唯識云展轉增上力二識成決定護法論師等皆立此義三唯影無本謂大乘實教離眾生心佛果無有色聲功德唯有如如及如如智獨存大悲大智為增上緣令彼所化根熟眾生心中現佛色聲說法是故聖教唯是眾生心中影像華嚴偈云諸佛無有法佛於何有說但隨其自心謂說如是法也龍軍堅慧論師等並立此義四非本非影如頓教說非直心外無佛色聲眾生心內影像亦空性本離故止言絕慮即無教之教耳佛言我從得道來不說一字汝亦不聞此前四說皆有其益自淺之深攝眾生故三歸性門文二一正攝歸性二說聽全收初謂此識無體唯是真如故論云是故一切法從本已來離言說相離名字相離心緣相乃至唯是一心故名真如即前之心境同入一實諸聖教從真流故不異於真故攝論中名為真如所流十二分教唯識釋勝流真如云謂此真如所流教法於餘教法最為勝故是知如來言說皆順於如金剛三昧云義語非文仁王說十二部皆如二說聽全收者又有四句一佛真心外無別眾生以眾生真心即佛真心故則唯說無聽故所說教唯佛所現二眾生心外更無別佛以佛真心即眾生真心則唯聽無說故所說教即眾生自現三佛真心現時不礙眾生真心現故說聽雙存二教齊立四佛即眾生故非佛眾生即佛故非眾生互奪雙亡即說聽斯寂淨名云無說無聞四無礙門謂前三門心境理事同一緣起混融無礙交徹相攝以為教體以一心法有真如生滅二門故二皆各攝一切法故教體竟七宗趣通別者當部所崇曰宗宗之所歸曰趣通別即二初通者統論佛教因緣為宗謂古來諸德皆判儒宗五常道宗自然釋宗因緣因緣有二一內二外外謂穀子水土人時而芽得生泥團輪繩陶師而器得成內謂十二因緣外由內變本末相收為一緣起故佛教從淺至深說一切法不出因緣二字然有四重一因緣故生死成壞涅槃云我觀諸行生滅無常云何知耶以因緣故二因緣故即空謂不自佗共生等故無生也三因緣故即假如鏡像水月之流緣會不得不現四因緣故即中若言不從因緣即是定有定無斷常二過故中論云因緣所生法我說即是空亦謂是假名亦是中道義四句如次配前四重涅槃亦說聲聞等四品菩提皆由觀之而得故佛教之宗因緣收盡然約佛涅槃後賢聖弟子相承傳習通大小乘宗途有五一隨相法執宗即小乘諸師依阿含等經所立以造諸論於中又三一我法俱有宗犢子部等立五法藏謂三世無為及我餘部呼為附佛法外道二無我因緣宗除一及三所論諸部一切諸法不離色心生滅從緣本無有我於中或立三世無為或分五類或無過未唯有現在或現在中在蘊為實在處界假或世俗是假出世為實然皆離我及邪因無因故異外道三因緣但名宗一說部等立一切我法但有假名由從緣故無定實體如鉄之剛遇火即鎔如水之柔遇寒即堅明知從緣則無定性此乃出世亦假名耳二真空無相宗即龍樹提婆依般若等經所立以造中觀等論三唯識法相宗即無著天親依解深密等經所立以造唯識等論四如來藏緣起宗即馬鳴堅慧依楞伽等經所立以造起信等論於中復有二義初眾生相盡唯是法身良以情識本空名相已盡未甞見一眾生流轉生死眾生寂滅即法身故淨名云一切眾生即寂滅相又云皆如也涅槃云十二因緣即是佛性論云離念相者即是平等法身等此與前宗異者云云可知後法身緣起全是眾生謂眾生及佛皆是生滅有無善惡境界良以情識不破識所現佛同眾生故楞伽云如來藏是善不善因能徧興造一切趣生涅槃云佛性隨流成別味不增不減經云法身流轉五道名曰眾生良由如來藏是法身在纏之稱故約在纏及法身反覆互奪曲成此二雖有二義必互相知若互不知便同無相及法相宗也但由於中崇尚各異故說二矣此經宗於前門良由染相本寂故得覺性本圓義如別宗說兼之後義五圓融具德宗謂事事無碍主伴具足重重無盡即華嚴經然此五宗對前五教互有寬狹謂一宗容有多教一教容具多宗故又教約佛意權實有殊宗就人心所尚差別故宗與教其旨不同後別明此經者又有總別總以心境空寂覺性圓滿凡聖平等為宗令修行者忘情等佛觀行速成為趣謂倒心妄境如杌鬼繩蛇元自空無不待除滅文云非作故無等依佗水月鏡像全體即是圓成四大不動故覺性不動等故凡聖靈覺真心本來清淨圓滿覺圓明故乃至根塵四大徧滿法界等行者如斯了悟自然喪己知是空華即無輪轉等又幻身滅故幻心亦滅忘情即縛脫等八不情忘即等佛心等佛為真觀行即普眼觀成同佛亦可鉤鏁前文成三重宗趣謂如上為宗令修行者忘情等佛為趣又忘情等佛為宗令觀行速成為趣又前趣為宗令惑業消滅身心客塵從此永滅等永絕輪迴知彼如空華即免流轉等起大神用初淨一身至一世界覺亦如是等安樂便能內發寂滅輕安等又云三事圓證故名究竟涅槃也自在永得超過礙無礙境煩惱涅槃不相留礙為趣上所注引皆觀成功用等文別者有五對一教義對教說為宗義意為趣二事理對舉事為宗顯理為趣三境行對理境為宗觀行為趣四行寂對觀行為宗絕觀為趣五寂用對絕觀心寂為宗起大神用為趣此五亦是從前起後漸漸相由矣八修證階差者謂若但約教文唯生義解忘詮修證復有其門故以心傳心歷代不絕自佛囑迦葉展轉于今灯灯相承明明無盡然初五師兼之三藏毱多之後律教別行罽賓已來唯傳心地黃梅門下南北又分雖繼之一人而屢有傍出致令一味隨計多宗今略敘之但敘隨機可用者不敘邪辟之流也會通圓覺由此經首末偏明修證故敘諸禪宗以會之有拂塵看淨方便通經有三句用心謂戒定慧有教行不拘而滅識有觸類是道而任心有本無事而忘情有籍傳香而存佛有寂知指體無念為宗徧離前非統收俱是象體上之諸宗不出定慧悟修頓漸無定無慧是狂是愚偏修一門無明邪見此二雙運成兩足尊故天台修行宗於止觀其頓漸悟修者頓悟日出孩生漸修霜消孩長為解悟漸修頓悟伐木入都頓修漸悟磨鏡學射漸修漸悟如登九層之臺足履漸高所鑒漸遠並為證悟若云頓悟頓修斬染綟絲則通三義謂先悟廓然頓了後修不著不證曠然合道為解悟先修服藥後悟病除為證悟修無心忘照悟任運寂知一時即通解證若云本具一切佛德為悟如飲大海一念萬行為修得百川味亦通解證若約楞伽地前信住行向四漸菴羅熟陶器成大地生習藝就聖位初地八地報身法身四頓明鏡現物日月照色藏識知境佛光然曜則修行為漸證理名頓此圓覺經備前諸說謂文殊一章是頓解悟普眼觀成是頓證悟三觀本威德章末辨音章是漸證悟又普眼觀通於解證又三觀一一首標悟淨圓覺次明行相後顯成功初中為對是頓悟漸修中後為對是漸修頓悟又普眼觀示漸修頓悟三期道場是漸修漸悟普賢後段是頓悟頓修又清淨慧章有忘心頓證更有餘文不能繁述此等頓漸皆語用心不同前門但是判教苟得其意皆成定慧如其失旨不成妄想即墮無記冀諸學者審而修之九敘昔翻傳者開元釋教目錄云沙門佛陀多羅唐言覺救北印度罽賓人也於東都白馬寺譯不載年月續古今譯經圖記亦同此文北都藏海寺道詮法師疏又云羯濕彌羅三藏法師佛陀多羅長壽二年龍集癸巳持于梵本方至神都於白馬寺翻譯四月八日畢其度語筆受證義諸德具如別錄不知此說本約何文素承此人學廣道高不合孟浪或應國名無別但梵音之殊待更根尋續當記載然入藏諸經或失譯主或無年代者亦多古來諸德皆但以所詮義宗定其真偽矣前後造疏解者京報國寺惟慤法師先天寺悟實禪師薦福寺堅志法師并北京詮法師總有其四皆曾備計各有其長慤邈經文簡而可覽實述理性顯而有宗詮多專於佗詞志可利於群俗然圓頓經宗未見開析性相諸論迢然不闕故今所為俱不依也其所依者已伸於序末十隨文解釋於中二初解題目後釋本文題中文三一總辨名二配法義三具解釋初中三一敘立名二顯得名三明取捨初者大方廣圓覺修多羅了義經然諸經教或佛說時便自立名如法華金剛之類或佛滅後結集者立如阿彌陀入楞伽之類今此經目是佛自立五種名也流通分中文云此經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來決定境界亦名如來藏自性差別二者諸經得名有其多種或以人為目或以法為名人有請說等殊法有法喻等別或體或用或果或因或能詮所詮或真妄境智乍單乍複其類不同今經五名已含多種大者是體方廣是用圓覺是果祕密王三昧是因又王是喻三昧是法修多羅了義是歎能詮餘皆所詮如來是能證人即當其智決定境界是境兼餘皆法如來藏是在纏之名即真妄和合斯則人法總彰法喻皆舉具體具用有果有因詮旨雙題真妄俱顯方諸經目莫備於斯了義之名照然義現其每字別釋得名如下所辨三明取捨者文中雖五首題唯二良以宗本體用是法義之宏綱詮旨功能是言象之皎鏡事周理盡須建五名簡要標題且存兩號二配法義者凡欲解了義經論先須明識法義依法解義義即分明以義照法法即顯著故論中欲顯大乘深隱性相道理先開此二論云摩訶衍者略有二種一者法二者義法指一心義開三大正同此也心是如來藏心即圓覺在纏之名義謂體相用即如次是大方廣論文為欲發起眾生大乘信根故就凡夫位中目此圓覺為眾生心也今經題目十一字中圓覺兩字正是其法大方廣三字是圓覺體用之義經之一字正是能詮教法修多羅了義五字歎教法勝能之義故正宗之初佛自標本唯立圓覺中間處處牒前起後標結指陳一一只言圓覺不言大方廣也或唯覺之一字是法餘四皆義故文中或但云覺或淨覺大覺妙覺覺性覺心覺相等能詮法義配此可知是則上五字總屬所詮下六字總屬能詮矣三具解釋者於中分二初釋所詮後釋能詮且初所詮五字略為二釋一以三字對兩字二以四字對一字前對中三字者如次是圓覺體性德相業用三大然各二義大者當體得名常徧為義當體者不同法相宗揀小之大大外有小可揀猶是分限豈為至大今以圓覺體無邊涯絕諸分量強名大也慤云大者敘心靈之絕量常徧者常則竪通三世徧則橫該十方竪者過去無始未來無終無有一法先之唯此先於諸法故名大也涅槃經云所言大者名之為常橫者十方窮之無有涯畔涅槃又云所言大者其性廣博猶如虗空方者就法得名方是法也軌持為義軌生物解在持自性持自性者一切眾生皆有本覺雖流浪六道受種種身而此覺性不曾失滅生解者眾生悟入知見雖因善友開示然其智解從覺性生如水土之潤生糓等芽芽從種生不從水土故文云圓覺流出菩提涅槃及波羅蜜教授菩薩廣者從用得名廣多廣博為義廣多者此圓覺性本有過塵沙之妙用潛興密應無有休息無有窮盡廣博者此無盡之用一一同於覺性無有邊際無有分限故文云覺性徧滿圓無際故當知六根徧滿法界如是乃至八萬四千陀羅尼門徧滿法界問華嚴經題亦云大方廣與此同異答配屬三大則同釋義隨宗則異華嚴疏釋大云一切相用皆同真性而常徧故持則雙持性相具十玄門軌則一切諸法一一皆能生解如觀一切見百門義等廣則能包能徧相即相入重重無盡一一對此同異可知圓覺者直指法體若不尅體標指則不知向來說何法大說何法廣圓者滿足周備此外更無一法覺者虗明靈照無諸分別念想故論云所言覺義者謂心體離念離念相者等虗空界等此是釋如來藏心生滅門中本覺之文故知此覺非離凡局聖非離境局心心境凡聖本空唯是靈覺故言圓也故下文說涅槃昨夢世界空華眾生本成佛道又云一切覺故又云幻滅覺圓滿然此圓覺於諸經中隨宗名別涅槃經但約凡夫身中本有此性悟之決定成佛故名佛性法華約稱讚唯此一法運載眾生至於寶所餘乘不能餘法皆劣故名一乘妙法淨名但約住此性者神變難量非口可議非心可思故名不可思議解脫金剛但約此性顯發能破煩惱故名般若餘類可知皆是圓覺門中差別之義良由未決定的顯無明本無眾生本佛故雖神用繁廣勝德無邊不得標題直名圓覺禪門離念無念亦是此中拂迹遮過之意然以心傳心密意指授非今簡牘所論且約形言對此辨矣後四字對一字釋者唯覺之一字指法餘四盡是釋義意言此覺有廣大義有方圓義以廣對大以方對圓謂體大而用廣理方而義圓方是正直不徧揀小不邪揀外圓是滿足無虧無缺揀諸菩薩亦可大方是體大方無隅廣圓是用慤云廣越塵沙圓無間缺謂體大而方正不偏用廣而圓滿無缺故復以方連大以圓連廣又四字中上三字是別圓字是總意明此覺具足三大之德故名圓也是則總別之德具彰法義之門雙指故名大方廣圓覺後能詮六字者於中先配後釋配者修多羅三字總指諸經了義兩字歎此一卷此一卷是諸經決了之義也故下文云是十二部經清淨眼目經之一字正是此圓覺能詮之體後釋者修多羅之義已如前釋了義者決擇究竟顯了之說非覆相密意含隱之談然諸經中何者了義何者不了義清涼答順宗皇帝所問諸經了義云佛一代教若約本為一事則八萬度門莫非了義若圓器受法無法不圓得之由人亦皆了義此二不足揀別今約開方便門示真實相則有了不了故淨名涅槃寶積等經皆云依了義經不依不了義經不了義經者謂小乘教了義經者謂大乘教大乘教復有了不了謂有大乘雖六度悲智兼修而定說三乘不一亦非了義若有會歸一極以玄鑪陶於群像智海總乎萬流無二無三無不成佛中道理觀不共二乘方為了義又大寶積經云舍利弗問佛何等經中名為了義何等經中名不了義佛告舍利弗若諸經中宣說世俗名不了義小乘一藏唯說俗諦雖云四真諦望於真如還成世俗法相一宗經論亦多說世俗少說勝義宣說勝義名為了義的指勝義方是唯真不俗即圓覺也下文云圓覺出一切清淨真如涅槃故所流出者亦是安立真如對此還成世俗若諸經中宣說作業煩惱名不了義業煩惱等相教廣明說真性處百分無一從多而說屬不了義宣說煩惱業盡名為了義下文云永斷無明又云此無明者非實有體又云知是空華即無輪轉亦無身心受彼生死若諸經中宣說厭離生死趣求涅槃名不了義宣說生死涅槃二無別名為了義涅槃及種種幻化既出於覺心即二法同源正是無二也又云生死涅槃如夢及不厭愛等若諸經中宣說種種文句差別名不了義法相宗漏定漏為無為一切定別宣說甚深難見難覺差別即無差別名為了義下云有思惟心測度圓覺如取螢火燒須彌山終不能著釋曰據上說了義行相皆與圓覺相當佛自料揀固應無惑雖諸經中亦有了義之說然非句句始終故各隨別義標題唯此圓覺首末顯了直破差別之相五性斷證總屬輪迴全成了義宗旨故特標了義如法華一部獨受妙名經者契經亦如上釋逐便從簡又略契字問修多羅與經但唐梵文異今雙置題目豈非繁重答上則總指諸部此則唯目當經對總歎別故非重也亦如大方等修多羅王經豈不亦修多羅王四字是總指諸部以歎其經耶又如法華歎云諸經之王若存梵語兼稱歎之文標題目者應云妙法蓮華諸修多羅王經即與此無異彼不兼之此乃兼者各是譯人之意耳上來總釋首題中二名竟餘祕密王等三號住流通分中至文當解二釋本文者一卷總分三分第一序分第二正宗分第三流通分以三分之興彌天高判冥符西域今古同遵所以三者夫聖人設教必有其漸將示微言先敘由致故初有序分由致既彰當根受法故次演正宗正宗既陳務於展轉利濟非但益於當會復令末世流傳永曜法燈明明無盡故結以流通今初序分中諸經多有二序一證信序如是之法我從佛聞標記說時說處分明大眾同聞非謬以為證據令物信受經無豐約非信不階由是經初必須證信故智論云說時方人令生信故二發起序發明生起正宗之法如淨名寶蓋法華毫光之類然證信亦云通序諸經皆同故亦云經後序佛說法時未有故發起亦云別序諸經各別故亦云經前序佛光自發起方說正宗故今此經文即前序中便是發起謂佛入大光明藏與一切佛同住眾生清淨覺地現諸淨土菩薩主伴皆入三昧同一佛境以表因果無異凡聖同源顯發此經旨趣如是故無別發起序也將解證信總序三門一述建立之由二明建立之意三則正釋經文初者則佛臨滅度阿難請問四事佛一一答我滅度後汝等當依四念處住一以戒為師二默擯惡性比丘三一切經初云如是我聞一時佛在某處與某眾若干人等四四念處者一觀身不淨有五一種子二住處三自體四自相五究竟二觀受是苦受與苦各三一苦受苦苦二樂受壞苦三捨受行苦三觀心無常四觀法無我餘三文易故不牒釋二明建立之意者意有三焉一斷疑故謂結集時阿難昇座欲宣法藏忽然自身相好如佛眾起三疑一疑佛重起說法二疑佗方佛來三疑阿難轉身成佛故說此如是我聞等言三疑頓斷既言我從佛聞即自非佛明矣真諦三藏引律云爾此通如是我聞二息諍故智論云若不推從佛聞言自製作則諍論起今廢我從聞聞從佛來故經傳歷代妙軌不輟此局我聞三異邪故外道經初皆立阿優為吉此局如是三釋文者然證信序具六成就謂信聞時主處眾六緣不具教則不興必須具六故云成就今隨文便均於廣略總分三段一信聞時主二說處依真三同體法眾今初如是我聞一時婆伽婆解曰此文已具四種成就餘二成就後二各一先且合釋如是我聞者指法之詞也如是之法我從佛聞佛地論云謂結集時諸菩薩眾咸共請言如汝所聞當如是說傳法菩薩便許可彼言如是當說如我所聞釋曰宣法藏者不云阿難乃言菩薩者以佛地經在淨土說故論釋結集者云是菩薩不指聲聞今圓覺經亦淨土說正同彼論矣華嚴疏引纂靈記云摩訶衍藏是文殊師利與阿難海於鐵圍山間結集故與畢鉢羅窟不同集法傳云阿難有三一阿難此云歡喜持聲聞藏二阿難䟦陀此云喜賢持獨覺藏三阿難伽羅此云喜海持菩薩藏但是一人隨德名別大法念經亦說三種但喜賢却是其初第二復云喜持三則同也上合釋竟此下離釋如是者信成就也智論云佛法大海信為能入智為能度信者言是事如是不信者言是事不如是故肇公云信順之辭也信則所言之理順順則師資之道成又聖人說法但為顯如唯如為是故稱如是劉虬釋也此唯約所詮理又真不違俗故名如俗順於真為是真諦三藏釋也約所詮理事又如者當理之言言理相順謂之如也是者無非之稱生公釋也此同遠公說事如事說理如理能詮之教稱於理事也又有無不二為如如非有無為是此約所詮理事無二若唯就當經釋者凡聖因果不異圓覺名如唯此因果方離過非為是華嚴疏云無障無礙法界曰如唯此無非為是應隨教門深淺以顯如是不同我聞者聞成就也我即文殊及阿難海五蘊假者云何稱我我有四種一凡夫徧計二外道宗計三諸聖隨世假分賓主大小乘法相四法身真我法性今是後二非那慢心而有所說故無過也聞謂耳根發識大小乘宗各有三說或耳或識或俱俱者為正然或具四緣八緣雖因耳處廢別從總故稱我聞若無相宗我既無我聞亦無聞從緣空故不壞假名即不聞聞耳若約法性此經旨趣傳法菩薩以我無我不二之真我根境非一異之妙耳聞真俗無礙之法門也然阿難所不聞之經有云如來重說有云得深三昧自通若推本而言即阿難是大權菩薩何所不了如不思議境界經說況同文殊結集何滯迹而疑焉一時者時成就也師資合會說聽究竟總言一時揀異餘時也謂如來說經時有無量不能別舉一言略周故但云一時如涅槃云一時佛在恒河岸等又諸方時分延促不定故但言一時若約當宗即說聽之時心境泯理智融凡聖如本始會此諸二法皆一之時然一與時皆無自體但隨世假立婆伽婆者主成就也涅槃云能破煩惱名婆伽婆三德之中即當斷德斷德即顯法身也此宗法報不分淨土說經非應化矣故佛地經云是薄伽梵六義最清淨覺極於法界盡虗空窮未來際彼論云次顯諸佛異餘大師異說餘經之佛故說世尊功德又為其餘生淨信故況彌勒般若頌云應化非真佛亦非說法者耶若約諸經多是佛字具云佛陀此云覺者謂覺了真妄性相之者據大雲金剛疏引論中心體離念以釋佛字則知有念終不能覺故論又云一切眾生不名為覺以從無始來念念相續未曾離念故又云若有眾生能觀無念者則為向佛智故然覺有三義一自覺覺知自心本無生滅若以常釋此唯揀凡今則從此便異於二乘及權教菩薩二覺佗覺一切法無不是如三覺滿二覺理圓稱之為滿若約佛地論即具十義智障諦覺喻各二若依華嚴即說十佛成正覺願業報住持涅槃法界心三昧本性隨樂若出其體即圓覺也四成就竟二說處依真者處成就也謂佛入法性源現無邊無礙剎土亦不定分自佗受用故曰依真亦如華嚴云普賢身相如虗空依真而住非國土釋此一門疏文有二初通疑難後正釋文初中或問曰外道言教首建阿優孔老篇章不標處所佛經異此故必以序分為初彰說處則山城有依明說人則主伴無雜六種成就千代楷模邪正區分實由斯矣今云入光明藏三昧正受現諸淨土與諸菩薩同入等者但是真智所造之境非化身形相之依既不言佛在何山城國邑則說經主處文不顯彰幸為釋通覬無所惑答曰夫三身一體四土一性聖言三四者立教有權實對機有隱顯劣機隱淨現穢勝機隱穢現淨若揀邪教定釋宗則唯標變化身土說大小乘法相及大乘破相顯性等經若除細惑彰妙境則直顯受用自佗圓覺密嚴之類十有餘本然此了教委窮識智之體備搜性相之源深究無明之根圓彰無漏之界經宗既詮實境教主須明真佛故受用身居受用土為諸大士說圓覺經然諸大乘經同是淨土說者即深密解脫經如是我聞一時婆伽婆住法界殿如來境界放大光明普照之處法集經婆伽婆在虗空法界無差別住處稱讚大乘經婆伽梵住法界藏密嚴經住出過三界密嚴之國諸佛心印經住如來境界眾寶道場興顯經在如來建立之土大毗盧經住如來加持廣大金剛法界宮入印法門經住如來住持境界方等王虗空藏經遊如來無礙智智行處佛地經住最勝光曜放大光明普照無邊世界周圓無際超過三界所行之處然如是我聞等言一一皆準深密讚之略舉十經是此類也然淨土說經儀式稍異學識淺者或謗或疑故佛地論中具有徵釋但解此論自及三隅十經之意例此皆解故載其文次第錄此一段以遮愚惑聖言定量不假餘詞論曰受用變化二佛土中今此佛土何土所攝說此經佛是為何身此下有四初謬次正三徵責四圓了初云有義此土變化土攝說此經佛是變化身外難云既爾何故經云住最勝超過三界所行處豈是穢土耶下答云佛為化地前等令其欣樂修因故暫化作淨土妙身神力加眾令暫得見次云有義此土受用土攝說此經佛是受用身此淨土量無邊際故難初義云若暫化作加眾令見應如餘經分明顯現法華三變淨土淨名足指按地經文皆云佛神力等經不說故佛地不然是受用身土結成若爾此是地上菩薩所應見聞何故於此化佛土中結集流布假設傳法菩薩為欲示現一切智者法報佛身及所居處淨土超過世間化身穢土如是示現此下說現勝之意意有四焉一云欲令所化生欣樂故二云為令發願當生如是淨土見如是佛聞如是法修彼因故三云為生廣大勝解有情及諸菩薩勝歡喜故結集流布結上三也四云又是法勝於此宜聞然處若非勝化身相麤不可宣說下結故受用身居受用土為初地上諸菩薩說令傳法者結集流通總結成正義次下又假設外難云若爾何故不但說彼所說法耶何不但以化身標住山城等處然後但就經內讚說真身淨土勝妙等法如無量壽觀經等耶下又出不標說處之過云若不說處及能說者若不說有形相名字化身化土如釋迦在祇園等也不知此法何處在何處說誰說是何人說一切生疑由無主處缺六成就故故須具說結也後窮盡道理和會釋云如實義者釋迦牟尼說此經時不妨還是釋迦世尊地前大眾見佛化身居此穢土為其說法地上大眾見受用身居佛淨土為其說法故亦有雙標淨穢者如等目王三昧經等所聞雖同同聞正宗法義所見各別有見在舍衛國摩竭耆闍祇園之類身長丈六三十二相八十種好有見在光明無邊清淨國土盧舍那身徧法界有八萬四千相好等有見毗盧遮那在華藏世界及無邊世界一一塵中身具不可說佛剎微塵數相好等雖俱歡喜信受奉行各信所見身土所聞之法解有淺深所行各異各隨所見所解而修其行而傳法者為令眾生聞勝希願勤修彼因當生淨土證佛功德故就勝者所見結集言婆伽婆住最勝等出結集菩薩隱化身穢土位號名相但彰真身淨土境界之意也諸餘經教例亦如然由隨機益故但各就本經意趣隱真身淨土顯化身穢土等也故前云對機有隱顯也釋曰論釋分明不假別議驗前經等類例照然然前所列之經十經兼圓覺皆詮殊勝之事境深細之理趣至於領受結集瓶注不遺者非登地菩薩則不堪任故淨土宣揚唯大士親受展轉流布則群類普霑問華嚴大經宗趣圓博佛土是華藏世界佛身毗盧遮那尚標穢境之中人天七處初會摩竭提國二及七八普光明殿三忉利天四夜摩五兜率六佗化九祇園並不離欲界故佛地經等何不然耶答大聖設教權實多門總一切經不出三意謂諸餘經等欲令隨識者趣入故唯舉化身穢土佛地等經欲令隨智者領受故偏舉真身淨土華嚴則識智融通淨穢交徹法界圓攝稱性而談不逐機宜屈曲故釋迦全是毗盧不壞娑婆而見華藏是以標舉則給孤九會摩竭初會同於濁世四處在欲天皆是五濁境閻浮三處在天竺釋相則金地經說摩竭云其地堅固金剛所成蓮臺經云見佛坐蓮華藏師子之座十佛剎微塵數菩薩圍繞一一塵中亦復如是一一普周法界佛身一一肢節一一毛端佛土一一微塵皆徧法界二類各有宗趣何執一而難乎然佛化儀隱顯殊迹一身異應一音異聞故教海無邊權實叵測且天竺小乘宗人尚有總不信大乘經典況時澆佛滅度百年毱多持律不如佛在六群乳味不如佛在水味況今向二千年耶處異震旦與天竺隔遠詎免疑流今以聖言分明顯示庶袪其惑直入真乘然一部經入由證信故須通決勿厭文繁上來通釋疑難竟音釋杌五忽切音兀木無枝也綟力霄切音麗染色也罽居例切音計魚網鑪音盧火牀也覬音冀希望也
