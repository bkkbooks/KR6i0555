body:
  text: 終南山草堂寺沙門宗密述自下依師離病者謂此廣勸依善知識除去四病及諸細惑問目雖有五句義攝不出此二經文四初三之初於是普覺菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言解之可知正陳中二一慶前大悲世尊快說禪病令諸大眾得未曾有心意蕩然獲大安隱解曰禪病者四相二請後世尊末世眾生去佛漸遠賢聖隱伏邪法增熾使諸眾生求何等人依何等法行何等行除去何病云何發心令彼群盲不墮邪見解曰前皆有我相未可施功今既障除方堪修習修習用意復有是非故須依師免溺四病於中三節初明請問之意如人有子病者偏憂菩薩大悲先哀末世賢聖隱沒正法將沉欲益當來懸與此問次正請問求何等人者由前云求善知識不墮邪見故此請問何等之人是善知識答中具指餘之四問文顯可知後明所為群盲者無慧目也後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告普覺菩薩言善哉善哉善男子汝等乃能諮問如來如是修行能施末世一切眾生無畏道眼令彼眾生得成聖道汝今諦聽當為汝說三佇聽時普覺菩薩奉教歡喜及諸大眾默然而聽四正說長行中五一指示明師令事二分別四病令除三辨事師之心四明除病之行五顯發心深廣亦當次答五問然復有少相濫至文當指故且宜直顯經意初中三一令識二令事三顯益今初善男子末世眾生將發大心求善知識欲修行者當求一切正知見人心不住相不著聲聞緣覺境界雖現塵勞心恒清淨示有諸過讚歎梵行不令眾生入不律儀求如是人即得成就阿耨多羅三藐三菩提解曰將將欲發大心揀餘乘也者正因針鋒善知識者正緣芥子因緣備具佛道方行如論中說善能知真識妄知病識藥名善知識初心便令求者文殊告善財云親近供養諸善知識是具一切智最初因緣故光讚亦云欲學六波羅蜜者當與真善知識相隨常當承事正知見人者標指也善達覺性不因修生決擇無礙名正知見法句經云善男子一切眾生欲得阿耨菩提者當親近善知識請問法要必聞如斯甚深要句又云善知識者善解深法空無相無作無生無滅了達諸法從本已來究竟平等無業無報無因無果性相如如住於實際於畢竟空中熾然建立是名善知識華手經云有四法者當知為善知識謂善知教化修道各及過患次下釋釋有二節初明順行言心不住相者離凡夫煩惱境界若有少法當情皆名住相乃至菩提涅槃尚不取著何況世間夢幻境界故不應住色聲香味觸法生心應無所住而生其心得無住心即契圓覺不著等者離二乘境界稱讚大乘經云寧在地獄經百千劫終不發二乘之心亦可正知見者揀外道不住相揀凡夫不著等揀二乘後明逆行即淨名云行於非道通達佛道之意塵者六塵勞謂勞倦由塵成勞故名塵勞又染心懃苦亦是塵勞心清淨者現染之中心自淨也如淨名云示有女子常修梵行等華嚴云菩薩在家與妻子俱未曾捨離菩提之心次四句則現過之中令佗淨也欲度有過眾生先以同事相攝心既相親方能受教如淨名云入於婬舍示慾之過等亦同華嚴善財善友婆須愛水而不溺無厭恚火而不燒勝熱癡邪而不惑矣讚梵行等者縱使自身有病服食非儀或為利益或有別緣蹔乖真教只得貶己承非不得飾非說理以誤凡下此乃不同邪人自造諸過復說非梵行事為其真實令無量人墮大險趣但為同事攝故雖現諸過常須讚歎真實梵行故論云壞見之人雖不壞行不堪與眾生為其道眼雖壞行而不破見者是則人天真勝福田求如是人下結成大益二令事者文二一舉身命之難二例身外之易初中二一正舉末世眾生見如是人應當供養不惜身命解曰謂捨泡幻之軀以貿金剛之質如將瓦器以換金瓶即雪山捨身香城敲骨之類儒典尚令竭力事父致身事君何況為法故大乘四法經云諸苾芻盡壽乃至逢遇喪命因緣必定不得捨善知識二遮疑彼善知識四威儀中常現清淨乃至示現種種過患心無憍慢解曰於中先明疑境常現清淨指前順行示現等者指前逆行心無憍慢正明不疑法句經亦云若善知識諸有所作不應起於毛髮疑心所以者何若有疑心不得正受甚深法句夫菩薩化現權道難測但依法門莫疑其跡不以順行即効虔誠或覩逆行便生憍慢故智論云於諸師尊如世尊想若有能開釋深義解散疑結於我有益則盡心敬之不念餘惡如弊囊盛寶不得以囊惡故不取其寶又如夜行險道弊人執炬不得以人惡故不取其照菩薩亦復如是於師得智慧光明不計其惡復次弟子應作是念師行般若波羅蜜無量方便力不知以何因緣故有此惡事如薩陀波崙聞空中十方佛教汝於法師莫念其短常生敬心然為從之難為師不易勿因此誡誤敬麤人欲驗真虗如前揀擇已諳其道如此遵承又此藥治徒師勿錯服服之增病無藥可治以縛解縛無有是處二例身外之易況復摶財妻子眷屬解曰摶謂摶食財謂錢帛詳經意勢是說財食食有四種此當段食食總段別以段揀餘古譯經論訛云摶食今此三藏承古訛音遂作摶字又不分總別謂摶即食仍略食字故云摶財也妻子者最親眷屬者僕從對前身命之難故云況復問淨名等復云依法不依人如何和會答不依人者不効其跡跡者取捨對機逆順無準不觀種性非不求師三顯益若善男子於彼善友不起惡念即能究竟成就正覺心華發明照十方剎解曰不起惡念者由前無慢故也憍慢若起惡念便生障覆自心法何得入即能下二句既無惡念之覆即得正覺成就心華下二句覺心既明即慧光開發觸向無染故曰心華稱體無邊照十方剎二分別四病令除者此當答第二依何等法之問標以妙法釋依圓覺是所依法故此法離於四病方可依故除病之問下自有答然文似濫故但含而科之直銷經也文三一總標徵起善男子彼善知識所證妙法應離四病云何四病解曰心病無邊要唯此四隨有其一即不堪為師二別釋行相然此四病文皆四節一標名二辨相三指體以破四結名皆名病者但緣不以教為繩墨不以師為指南但自舉心作如是意故經文皆云若復有人作如是言言是意言矣文四一生心造作一者作病若復有人作如是言我於本心作種種行欲求圓覺彼圓覺性非作得故說名為病解曰辨相中作如是言者思惟揣度計校籌量興心運為擬作行相造塔造寺供佛供僧持呪持經僧講俗講端然宴坐種種施為止息深山遊歷世界懃憂衣食謂是道緣故受饑寒將為功德觀空觀有愛身厭身於多行門隨執其一託此一行欲契覺心既是造作生情豈合無為寂照此病從前幻觀中來彼云一切菩薩從此起行至諸輪中皆云度生起行起用失彼文意成此作病破中云非作得故者圓覺性非造作造作如何契之若了覺性本圓不用興心求益不興心處即合覺心合覺心時自無諸妄無諸妄已則所作相應積土聚沙皆成佛道即於上來諸行遇緣力及便為隨病隨治不順妄念但得妄盡性自開明歇即菩提不從外得肇公云玄道在乎妙悟妙悟在乎即真二任意浮沉二者任病若復有人作如是言我等今者不斷生死不求涅槃涅槃生死無起滅念任彼一切隨諸法性欲求圓覺彼圓覺性非任有故說名為病解曰此作意云生死是空更何所斷涅槃本寂何假修求不厭不忻無起滅念任彼一切隨諸法性者火熱水濕之類各各差別之性今時現有一類人云妄從佗妄真任佗真各稱其心何必改作作亦任作好閑任閑逢餅即飡遇衣即著好事惡事一切不知任運而行信緣而活睡來即臥興來即行東西南北何定法住此病因前諸輪標云圓覺清淨本無修習依於未覺幻力修習失彼文意自謂已覺何必作幻故成任病破中前則驅馳覓佛此乃放縱身心設令善惡不拘即名無記之性七賢豈是大道四皓寧為聖人尚昧欲天焉冥覺體行人至此溺水沉舟宜自警懷勿霑斯病故前文云若諸眾生本不修行於生死中常居幻化令妄想心云何解脫三止息妄情三者止病若復有人作如是言我今自心永息諸念得一切性寂然平等欲求圓覺彼圓覺性非止合故說名為病解曰此者生心恐非隨情慮失一向止息豈合任之但止妄即真何須別照得一切性者息念故離相離相故得性是諸法無性之性非即覺性寂然平等者由我心生妄相故招苦樂差殊今但止息妄心妄盡自然平等此從靜觀中來迷彼取靜為行及澄諸念之言因成此病破中覺本無念見念既乖性本靈明迷照亦失念無而有既止息令無照有而隱何不觀察令顯又真本無念念既乖真性本無止止亦違念故言非止合故故前云於諸妄心亦不息滅慤云心形起滅理況空華圓覺本如智冥真寂縱依漸止功亦何亡但證心源不言浮用四滅除心境四者滅病若復有人作如是言我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂欲求圓覺彼圓覺性非寂相故說名為病解曰與前異者前則但息心念令寂此則計於身心根塵本來空寂又前不妨見有根塵但不隨念愛染故云止息此即觀破至於空無故名除滅永斷煩惱等者煩惱之本即是身心若執身心煩惱何斷故標斷煩惱釋以身空何況等者既斷盡煩惱空却身心身心尚空根塵何有一切永寂者身等本空故名永寂諸相既泯寂相現前擬將此心求證圓覺此從寂觀中來彼諸輪中皆云寂滅及斷煩惱迷彼文意故成此病破中夫覺體靈明不唯寂滅今滅惑住寂豈得相應況圓覺者非動非靜雙融動靜恒沙妙用無礙難思住寂之心何能契合言即似近理即全疎與體相違故言為病三結明真偽離四病者則知清淨作是觀者名為正觀若佗觀者名為邪觀解曰然上四種行門皆是諸經勸讚況前三觀具有斯文今以此為病者有其二意一者四病文中皆無觀慧二者但以率心偏住一行不窮善友圓意不究佛教圓文纔悟一門之義便不能久事明師纔見一經妙文便不能廣窮聖意但貪單省執一為圓是以經文總呵為病若能四皆通達不滯一門即此四中並皆入道雖然作種種行元來任運清閑雖頓覺身心本空習起還須息滅又須常冥覺體不得取四為心則自然休時非休作時非作故淨名云但除其病而不除法文中則知清淨者將前四行自驗其心隨落一門即知是病故言離者則知清淨作是觀者雖不取四病而慧解昭然不得懼落四中即便因循而已若佗觀者復有聞斯四過離四又更生情便信胸襟別為見解又作是觀者離四也他觀者取四也問為說揀師之時求於離病之者為說學人自離四病若說師病何以問中別標其目又結云作是觀者等若說學人病者云何標云彼善知識所證妙法應離四病答二皆不異既聞經識病須求離病之師既事此師即修離病之行然別釋之中若師若徒病無別相雖含二意而無二途解釋結文之中即須料簡若結行人即依前釋若結揀師師無四病即須歸依若縱志別求名為邪觀故菩薩戒云其法師者或小姓年少卑門貧窮而實有德是故不得觀法師種姓意云但觀病中離與不離莫觀種姓貴之與賤三辨事師之心善男子末世眾生欲修行者應當盡命供養善友事善知識彼善知識欲來親近應斷憍慢若復遠離應斷瞋恨現逆順境猶如虗空了知身心畢竟平等與諸眾生同體無異如是修行方入圓覺解曰此當答第三行何等行之問故標云欲修行者結云如是修行然且唯說事師更無別行故但辨此以當修行謂菩薩行門本無定跡隨當時事隨差別機但令善事明師明師必自臨事指示亦同善財於文殊處發菩提心已問菩薩行文殊亦不具說但令親近善友遂指德雲比丘展轉令往矣應當供事者涅槃經說是具足因緣故故法句經以二十一喻喻善知識謂父母眼目脚足梯飲食寶衣橋梁財寶日月身命等後結云善知識者有如是無量功德是故教汝親近大眾聞已舉聲號哭自念曠劫為善知識守護今日值於如來乃至未曾報恩無心親近說是語已重復舉聲號泣等欲來親近者夫善友度人種種方便師徒心契法意方傳所以俯就物機相親相近愚者無識憍慢便生慢既翳心即不入道故云應斷遠離者或欲除慢或遇異緣相去相離便生瞋恨云疎我親彼說愛說憎既一念瞋百萬障起非論失道亦墮三途故此令斷論語云唯女子與小人為難養也近之則不遜遠之則怨怨則此瞋恨也不遜則此憍慢也逆順者遠離名逆親近名順又違情曰逆隨情曰順故勝鬘云應攝受者而攝受之應折伏者而折伏之則佛法久住如虗空者心無改易了知等者結示同體悲智所以然者若不了善友及諸眾生與己同體者雖知菩提可進而不能屈節事師雖知薩埵可悲而不能忘軀弘道故此示也如是下結因成果四明除病之行此答第四除去何病之問然前文是離病故亦不定局之文二初明所治善男子末世眾生不得成道由有無始自他憎愛一切種子故未解脫解曰自他憎愛前已頻明今復說者是種子故是入道微細病故由此種子難契圓明故隨所聞法門即生心作意捨此取彼憎妄愛真能所難忘良由此矣故後能治云即除諸病現行麤而易覺種子細而難明故偏指也後明能治文二一等心觀人若復有人觀彼怨家如己父母心無有二即除諸病解曰七品行慈之中此當上怨同上親也觀之既同應與上樂二等心觀法於諸法中自他憎愛亦復如是解曰前既云怨家父母無二例此觀法應云涅槃生死不殊不殊故則無自他憎愛故知諸病只由愛真憎妄見自見他故不肯久事師宗但自生情起行今既斷斯種子即知諸病自除所以觀人中云即除諸病此云亦復如是又此文於諸法中明自他憎愛尤顯異於前段前段不言法故五顯發心深廣正答第五云何發心之問文三一總標發心二別明心相三通結離邪今初善男子末世眾生欲求圓覺應當發心作如是言解曰諸佛因地皆發此心依此願修方成正覺若無心願策引所修行亦不成如車闕一輪鳥唯一翼二別明心相此同金剛經中具四心也四心者彼經彌勒頌云廣大一第一二常三其心不顛倒四今此文二初廣大第一盡於處空一切眾生我皆令入究竟圓覺解曰即同彼經四生九類廣大我皆令入無餘涅槃也第一盡虗空者橫竪皆無分劑一切者不擇強愞怨親故云廣大皆令覺於本覺入於始本不二究竟圓覺故名第一然虗空眾生無有邊際菩薩悲願亦復如是然由發此願自熏成種得成菩提承此願力任運而化不要起心三世諸佛悉同於此若不爾者何異二乘二常不顛倒於圓覺中無取覺者除彼我人一切諸相解曰我入覺時我即圓覺眾生亦爾何有取者故天親云自身滅度無異眾生故名常心若見眾生因我入覺即非常也除彼等者除我人及所度眾生等相是不顛倒故天親云遠離依止身見眾生等相故無著亦云已斷我見得自行平等相故信解自他平等上來總是彼經實無眾生得滅度者常心若有我人等相即非菩薩不顛倒心三通結離邪如是發心不墮邪見偈中文五依次長行但文略耳一示明師令事五句爾時世尊欲重宣此義而說偈言普覺汝當知末世諸眾生欲求善知識應當求正見心遠二乘法二分別四病令除二句法中除四病謂作止任滅三辨事師之心五句親近無憍慢遠離無瞋恨見種種境界心當生希有還如佛出世還如佛出世者長行達己同凡此乃敬師如佛四明除病之行二句不犯非律儀戒根永清淨但頌能治也以所治憎愛是犯律因云未解脫亦違戒德故此云不犯及永淨也五顯發心深廣一偈半度一切眾生究竟入圓覺無彼我人相常依止智慧便得超邪見正覺般涅槃初四句如次頌四心第五頌通結第六潛具二果長無此有般涅槃之義留對下佛出現文以釋後一問答道場加行下根修證得道之處名曰道場謂於此處誓志剋期加功用行以求證入故名加行下根修證者謂雖信解前法而障重心浮須入道場自為制勒緣強境勝則功用有期問此入道場但是修前三觀何得別為大科答觀行法門雖同修之方便有異隨機施設故故此文先結前云若在伽藍安處徒眾隨分思察如我已說結已然後說道場儀式故知別是一段矣若約四分科經此當其證修三觀中有證相故文四初三今初於是圓覺菩薩在大眾中即從座起頂禮佛足右遶三帀長跪叉手而白佛言解曰菩薩名圓覺者可引前文再示正陳中二一慶前大悲世尊為我等輩廣說淨覺種種方便令末世眾生有大增益解之可知二請後世尊我等今者已得開悟若佛滅後末世眾生未得悟者云何安居修此圓覺清淨境界此圓覺中三種淨觀以何為首唯願大悲為諸大眾及末世眾生施大饒益解曰此有四節初躡慶前二若佛下明所為三云何下正請於中二初問道場後此圓覺下問加行四唯願下結請後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告圓覺菩薩言善哉善哉善男子汝等乃能問於如來如是方便以大饒益施諸眾生汝今諦聽當為汝說三佇聽時圓覺菩薩奉教歡喜及諸大眾默然而聽四正說長行中二一答道場二答加行初中二一結前善男子一切眾生若佛住世若佛滅後若法末時有諸眾生具大乘性信佛祕密大圓覺心欲修行者若在伽藍安處徒眾有緣事故隨分思察如我已說解曰佛滅後者正法像法法末時者即是末法具大乘性者宿有聞熏之種不同唯識永揀餘性信佛等者聞慧初開欲修行者菩提心發若在等者指前普眼門及三觀諸輪所說隨分思察者謂圓機菩薩不滯空閑種種運為作諸利益廣度群品備學法門隨其閑暇分中則便思察三觀故言隨分非謂見解未圓名為隨分二正說文三一道場期限二限內修行三誡取邪證今初若復無有佗事因緣即建道場當立期限若立長期百二十日中期百日下期八十日安置淨居解曰無佗緣者菩薩逢益即為遇緣且赴如法華中官事當行之類若無勝利須建道場剋志加功以期聖果即三期皆是自利為揀利佗故名無佗事亦可王賊命難名為佗事定三期者過則情生疲厭少則功行未圓故量剋三時亦無別義然約三根配之有其二意一約障盡難易配長期下根中期中根下期上根二約精進懈怠配者即反於此根有利鈍期有遠近對病設藥斯之謂歟後安置淨居者欲使內外清淨身心潔白事理稱可音釋摶音團揑聚也梯梯天黎切體平聲木階也音鐙几屬
