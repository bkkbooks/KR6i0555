body:
  text: 終南山草堂寺沙門宗密述二善業樂報知欲可厭愛厭業道捨惡樂善復現天人解曰知欲可厭者知愛欲心是惡道因於彼欲境深生厭離愛厭業道者怖彼惡道不造惡因於離惡法門人天教也深生愛樂捨惡樂善者比由愛欲故造惡今知欲可厭故捨十惡樂十善也現天人者華嚴云十善業道是人天受生因人天二道亦五門說初釋名中人者涅槃云以多思故雜心云意寂靜故天者地持云所受自然俱舍云光潔自在神用名天二出體如上三種類者人有四洲海中陸地謂南閻浮提新云贍部俱舍云阿耨達池岸有樹名此因為洲名提則此云洲也東弗婆提此云勝身身勝餘洲也西瞿耶尼此云牛貨以牛貨易故北鬱單越此云勝生以定壽千年衣食自然故天謂六欲及上二界今此經文意唯六欲欲者希須之心與五塵合謂婬欲等六受欲者地居相交空居四天則如次相抱執手笑視四身量者人則南洲四肘或三肘半餘東西北如次倍增面相相次如車形半月圓滿正方洲相亦爾天則四王半里餘五次增五壽量者北千西半東又減半此洲不定天者人間五十年下天一晝夜乘斯壽五百上五倍倍增積年為日倍增亦爾判云樂報麤相言之若論人間八苦生老病死愛怨求盛天上五衰華萎汗出光滅眾厭厭座地居斫截殘害驅擯豈能免苦若於天鬼畜中開出修羅即成六道三不動業報又知諸愛可厭惡故棄愛樂捨還滋愛本便現有為增上善果解曰初略消文後具釋義初云知愛等者知其愛惡愛善俱未免苦棄彼愛心樂修捨法即四禪八定而不知樂捨之心還同彼愛故云還滋滋潤愛本增上善果者上二界殊勝依正二報後釋義者初釋禪定後釋受報初又四門一釋名二方便三出體四辨相初中梵音禪那此云靜慮謂於一所緣繫念寂靜而審慮故四無色定有靜無慮欲界等持有慮無靜唯色界四得受斯名四但依次不別立稱若分別者即一尋伺二喜三樂四捨定者心一境性四無色界皆唯定也言無色者超過違害有色法故前三從加行得名有頂昧劣當體受稱方便者謂以六行厭下苦麤障欣上淨妙離伏下地惑展轉得上地定出體者俱舍云是善性攝心一境性以善等持為自性故大乘云云辨相者離欲惡不善法皆離障支有尋有伺此二是修行對治支也離生喜樂修行利益支也慶離欲惡故生喜身心輕安故樂也住初禪於所緣審正觀察心一境性為彼對治利益二支之所依止依止定力尋等轉故下倣此之也滅尋伺尋伺發三識亂二禪如淨水波內淨以捨念正知為體一心釋於內義唯緣法塵定生喜樂慶覺觀心息故如鑑淨止水故身心適悅住二禪離喜分別想生如貧得寶還失莫若憂喜雙絕也住捨於已生喜不忍可故平等正直無動安住有念於喜不行中不忘失正知失念喜行即分別正知而於能捨也身受樂正對二禪喜心浮動故設是心樂亦名身受初禪之樂如土石山頂有水二純土山頂有池三如純土山在大池內住三禪斷樂如重病觀音聲先除苦二禪除喜三禪除憂滅初禪也為對前樂先言除苦也不苦不樂捨念清淨不同三禪捨念亦樂受俱住四禪四無色者超一切色想過眼識相滅有對想次四識和合相滅也不念種種想不念意識和合想然唯約想色而言入無邊虗空住無邊虗空處超空入無邊識處住心緣內識作無邊行相故以為名也超識入無所有處住內外皆無也何以須超事念麤故心於所緣捨諸所有寂然而住也超此住非想無下七地明了想非非想有昧劣想處此中不出三界者由緣無想境即是細想外道不了謂為涅槃若知此患更求上進求上進時上無所緣竟無所得故滅而不轉則得滅受想定若未得此定厭想為先後想不行則入無想後受報者由於欲界修得此定各隨其地而生彼天此上諸天亦五門說初釋名中復有總別總云色無色者據色有無以得名界者分齊欲界雖亦有色約麤重立名以揀於色界其別釋名即當種類謂色界四禪總十七天初禪三天謂梵眾梵輔梵王具云梵摩此云清潔寂靜謂創離欲染得根本定故故佛地論云離欲宗寂靜二禪三天智論云通名光音彼天語時口出光故有云彼無尋伺亦無言語用光當語故三者謂少光無量光極淨光約光少多及勝如次立名三禪三天謂少淨無量淨遍淨通云淨者此天離喜身心皆淨別則類光而說四禪八天謂無雲上皆無雲初故得名福生見即生福廣果異生福中無過此故無想外道亦居此天及五淨居無煩無熱善現善見色究竟天前三凡住後五聖住無色四天謂空處等雖義當最上然亦不離欲色也體性如前身相者梵眾長半瑜繕那八里次三增半半次五增倍倍唯無雲減三百二十五繕那次七還倍倍上四既無色蘊即無分量壽量者色界無晝夜壽劫等身量空處二萬劫餘三二二增上來業等無量無邊若令有體相者盡虗空界不能容受然報有遲疾總有其三謂順現順生順後順現報者善惡始於此身即此身受生報者來生便受後報者或二生三生乃至無量生方受受報及時有定不定復有四句謂報定時不定等然上所說三千界內五趣三報定處定時者皆是權小教文隨宜約相若據實教大乘即隨心見異如梵王身子一境四心等若就佛而言皆法界相本非淨穢等二總結皆輪迴故不成聖道解曰愛為根本故皆輪迴不了自心故非聖道前指無明此標貪愛發潤備矣故瓔珞本業經云佛子無明者不了一切法迷法界而起三界業果迷法界中一切色欲心故色欲心所起報故分為欲界果報迷法界中一切色心故色心所起報分為色界果報迷法界中一切定心故定心所起報分為無色界果報是故於法界中有三界報然十惡業一向須除十善八定則但除其病故華嚴二地經說五品心修十善道一有漏心修是人天乃至有頂因二以智慧修心狹劣故從他解故成聲聞乘三自悟因緣修大悲方便不具足故成獨覺乘四以大悲方便大願修成菩薩廣大行五悟一切種清淨修一切佛法皆得成就也三地經說為化眾生修禪定等第二勸斷文三初正勸是故眾生欲脫生死免諸輪迴先斷貪欲及除愛渴解曰既知生死皆由貪愛故欲脫生死先斷此二遠公報應論云夫事起必由其心報應必由於事是故自報以觀事而事可變舉事以責其心而心可反渴者喻其至切二通妨善男子菩薩變化示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死解曰因前令斷貪愛恐有難云若爾云何菩薩亦有貪愛亦有受生故此通云菩薩示現受生非愛為本但以大悲益人為利欲行教化須現受生示同凡夫同事利物故淨名云眾生病則菩薩病又云眾生病從攀緣起菩薩從大悲起示現等者悲深也非愛者智深也三顯益若諸末世一切眾生能捨諸欲及除憎愛永斷輪迴勤求如來圓覺境界於清淨心便得開悟解曰先能除捨方可勤求如出鑛金始堪為器問從前但云貪愛何故此云及除憎愛答由愛身愛境境違於情或身被惱故生憎也是知憎亦由愛故雖兼憎意但說愛二明種性令知者亦可前五道業報已答輪迴種性今此五性差別是答修佛菩提文中說修證故前問幾等此答五種文相承故後文不言幾種非答此故有此三義應答菩提然更細詳復有五義宜却依前一者彌勒本疑修行者輪迴不疑五道謂由前說始終動靜乃至思度佛境皆是輪迴生死涅槃凡夫諸佛悉同起滅故問輪迴有幾種性比聞餘教祇言五道輪迴今何得三乘行人亦未能免故佛為說由本貪欲發揮無明顯出五性故屬輪轉若以五道而答何關所疑二者非唯標以貪欲無明而乃釋以二乘外道不應是此答佛菩提三者結云是名眾生五性不言菩提五等四者彌勒四問中輪迴自有其二初問斷本後問種性佛說愛為根本生起五道業報令厭五道斷其貪愛至此便答種性次答化生方便最後依覺乃至證覺是答修佛菩提是則經有四門問答一義問答相可文理亦彰若將五性答菩提問則令最後剩一段經答文已終彼何所被然答菩提處不言幾等者如答幾種方便之問亦云唯以大悲方便皆將一道攝於差別悲智例等此不應疑五者菩薩性及最後文修證雖同根本全別初由貪欲後依覺心若將俱答菩提二文何異經宗簡要豈合繁重然至聖微言實難究了或含兩勢未敢指南今就理長且依前判問五性既屬輪迴可斷不可答可除其病病謂依本貪等不可斷法法謂菩薩性中修證之行故今科云明種性令知不言斷舉要言之此宗始自信心終於證極一一依淨圓覺性若更有一法別有自性可依彼圓覺性即同流轉故下諸觀門一一首標悟淨圓覺以淨覺心方說修觀行等又前云如來寂滅性未曾有終始權宗菩提有始煩惱有終若以輪迴心始終之身即是思惟則旋復等由此五性差別之心乃是輪迴差別種性故偈云不因差別性皆得成佛道次銷文者分二一總標因依善男子一切眾生由本貪欲發揮無明顯出五性差別不等依二種障而現深淺解曰由本貪欲等者然五性學人皆發出離之心皆修戒定慧行但緣不了本覺自見定是眾生遂欲斷障求真厭凡貪聖貪聖之念還是本貪所貪三乘既殊能貪隨教亦異積習既深遂成別性故楞伽云隨說彼而成皆名教熏起復有三皆不定復有錯入邪途由是激發無明遂成五性差別發揮者發揚分布令顯了也然根本無明但迷真而已本無差別由貪欲不同故熏發之令成五別既不了本覺則唯將二障為本故依伏斷此二現深淺也若遇邪師教者則於我法轉增堅執故二障轉深若遇二乘則且除我執對前為淺若遇菩薩及佛相望深淺可知二別釋差等文二一所依二障云何二障一者理障礙正知見二者事障續諸生死解曰二門分別初總釋二障後別釋理障初中此二障者有體有義義同唯識煩惱所知謂事是煩惱煩惱即障又能續生死故理是所知所知非障是障障於所知理故體即起信根本無明及六染心染心各一分義六中各二義一不覺義二相生義今取相生也即此事障染污淨心展轉相生乃至執取計名能起諸業皆是連續生死義故各餘一分不覺義也及根本無明皆此理障覆翳法界真心不覺妄念生起不達諸法性相是礙正知見義若唯依法相宗說則二障數同但是用別故彼論云是心從本已來自性清淨云云以不達一法界故心不相應未有能所王數之別忽然念起更無染法能為此本故云忽然名為無明云云為無明所染有其染心染心義者名煩惱礙能障真如根本智故即寂之照如理智也故下說真如自體本有真實識知大智慧等即經中知字染心喧動違此寂靜故云障也無明義者名為智礙能障世間自然業智故如量智也言自然者如月無心頓應千水經中見字又知見俱通前是知見之性此是知見之相無明昏昏無所分別違此智用名為智礙經雖但云理障而實通於理事論局於事智礙理障皆從所障得名也問准論配經障真如智全合取為理障障世間智合為事障如何上配與此參差答上已明言此障有體體在此論須如上配義同唯識與此似違此論藏疏亦云今此二障約本末相依門以明不約人法二執故與唯識義意稍殊然通釋理事二障就障理智令不明顯俱名無明就障心行令不解脫俱名煩惱經以宗於理智故總取論中二障合為理障真如世間是理二智是正知見皆所障也無明及染中一分為能障即前上對唯取染中生起一分為事障此但約過患以為障義無所障法若欲立之即解脫是生死相續不解脫故所障是解脫能障煩惱即前下對以解脫無體攝歸真理故含其義不立其名論則但約相違為障故六染却障真如智無明却障世間智由此涉於相反故論自徵云此義云何徵能所障不相應之意也釋云以依染心能見能現妄取境界違平等性染心展轉生起差別真如平等故相違也成前上句以一切法常靜無有起相無明不覺妄與法違故不能得隨順世間種種智故無明冥然世智種種故相違也成前下句上來對會經論雖各從一勢理無違故所配釋體義誠非謬矣總釋二障竟次別釋理障者此中所障之法須識其體初云理障但是標名礙知見者正出體相此宗以知見為理故故經與論每拂病窮法皆歸覺心不以空寂虗無便為真極真如是流出涅槃如昨夢圓頓宗教顯體皆然故華嚴亦以真知為所迷法文云無一眾生而不具有如來智慧但以妄想執著而不證得智本有而未證即知不以斷證方為智也若離妄想一切智無師智不因學得自然智不因修得無礙智徧聖徧凡即得現前二能依五性文三一徵云何五性解曰然此五性皆是新熏不同法相宗中本有之說此宗推其本有之性皆是圓覺故也性相兩宗五性之義已如懸談中述今此又與彼所引楞伽等文大同小異如文詳之二釋中二一總明未熏善男子若此二障未得斷滅名未成佛解曰然五性者本以發心修證約斷二障故成五種此都不斷故非五數亦未發心遇教故言未熏若據楞伽之文似當第五無性今不取者據涅槃說無性闡提斷大善根我不能救今此但未成佛必不大惡第五自有外道種性故此非數二熏成五性文中四二乘合為一處說故一二乘性若諸眾生永捨貪欲先除事障未斷理障但能悟入聲聞緣覺未能顯住菩薩境界解曰合辨聲聞緣覺二種性也先除等者知生死苦止息攀緣故云除事尅體而言唯除初染餘但不加取著其實未能覺了故變易生死猶在意責不先悟理但先除事故有先除未斷之言然障有事有理執則有人有法煩惱則有現行習氣生死則有分段變易此四對中二乘唯斷於前未斷於後故云但能等雖至長者之家猶在門外止宿草庵未敢當堂故言未能顯住菩薩境界二菩薩性善男子若諸末世一切眾生欲汎如來大圓覺海先當發願勤斷二障二障已伏即能悟入菩薩境界若事理障已永斷滅即入如來微妙圓覺滿足菩提及大涅槃解曰先約地前以辨其相故言已伏言先當者似令修證不似分別五性譯人訛也應云唯先發願又應改悟為順後若事理障下約入地乃至果位以辨其相故言永斷及菩提等言即入等者此中但除其病不除修證行故三不定性善男子一切眾生皆證圓覺逢善知識依彼所作因地法行爾時修習便有頓漸若遇如來無上菩提正修行路根無大小皆成佛果解曰言皆證圓覺者自悟本來圓覺證知一切皆然非諸眾生皆已修證經文倒者譯人訛舛應云若善男子證諸眾生皆有圓覺即顯然矣修習頓漸者證信雖圓忻趣有異遇教不同故有頓漸若遇等者自能圓信復遇圓宗故不揀大乘小乘之根皆成佛果反明雖是圓信若志趣狹劣不遇圓頓殊勝良緣則熏其根性成二乘等由此義故名不定性經文闕者或略或脫若不爾者何以標云修習便有頓漸而乃唯釋頓耶四外道性若諸眾生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非眾生咎解曰就中曲分為二初正明邪種然內心雖勝宿遇邪宗既熏其心種習成種故於聖道難起信心後明師過意顯此性定是新熏非自本有故云非眾生咎前諸種性亦例此知但文略也則知眾生本同覺性但遇教成差便有大小有邪有正故知發心之者切須善辨宗途然餘經論目第五性云無性者但明本來不覺染心相續未有邪正師教所熏無三乘種故聞亦不信由此濫於本有今云外道性者決了新熏之義彰矣三結是名眾生五性差別解曰若答菩提幾等之文應云是名菩提五性等差別今云眾生五性即知義屬輪迴二答修悲智既識輪迴之病用心免落異宗則須依解修行速求證入然菩薩修行不出悲智二行故須明之前問中先智後悲今答則先悲後智意表即智之悲即悲之智無先無後故互明之文中二初答度眾生方便以成大悲善男子菩薩唯以大悲方便入諸世間開發未悟乃至示現種種形相逆順境界與其同事化令成佛皆依無始清淨願力解曰前問云當設幾種教化方便今答意云但以大悲方便示現種種形相順逆隨時無定種數言唯以者雖遇種種之機唯用此二各隨其類而應化也但有大悲必能普化但有方便必稱根宜無其過累開發未悟者令知妄法本空真法本淨示現種種等者此下明四攝法也四攝者布施愛語利行同事經文但有同事意該餘三言種種形相者即如觀音隨三十二類而應其身逆順境界者論云或為眷屬親友或為怨家能令眾生增長善根若見若聞得利益故又婆須密女無厭足王亦斯類也令成佛者不取餘乘故法華云我本立誓願欲令一切眾如我等無異皆依無始清淨願力者菩薩因地之時必發度眾生之願乘此願力所生之處更不退轉心若疲倦即憶昔願力以自策勵常須怨親普度勿隨憎愛之情故云皆依願力又非希望報恩亦非愛見之悲故言清淨云無始者同體大悲稱性大願性本具足非別新得但由迷悟有發不發發即無始二答修佛菩提以成大智若諸末世一切眾生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘依願修行漸斷諸障障盡願滿便登解脫清淨法殿證大圓覺妙莊嚴域解曰於大圓覺等者正明大智上求菩提對前大悲下化眾生也決定趣向名為增上發大願者彌綸諸行速至佛果若無願力則多退轉住佛等者決定不趣餘乘不同前隨五性故言莫值等依願修行者依願策勵如前悲中所說願是總相通悲通智故二段中皆說願力具悲智願即菩提心漸斷諸障者理雖頓悟其空事乃漸除方盡障盡則行住坐臥一切時中觸向無非解脫故以清淨法殿喻之願滿則觸目對境一切諸法無非圓覺故以妙莊嚴域喻之域謂彊域偈讚中二初諷斷輪迴於中又二初五句示所斷爾時世尊欲重宣此義而說偈言彌勒汝當知一切諸眾生不得大解脫皆由貪欲故墮落於生死解曰長離而廣此合而略後兩偈勸令斷及明種性若能斷憎愛及與貪瞋癡不因差別性皆得成佛道二障永銷滅求師得正悟隨順菩薩願依止大涅槃亦長離此合後七句諷修悲智十方諸菩薩皆以大悲願示現入生死現在修行者及末世眾生勤斷諸愛見便歸大圓覺上來深究輪迴因竟此下第四略分修證之位也既顯覺智之源復究輪迴之本已知圓覺染淨無殊但未辨隨順圓覺之心從凡至聖如何差別故次明之言略分者三賢統為一位十地等覺合之一門修則修圓覺證則證圓覺圓覺無差約修證以明位地文四初三之初於是清淨慧菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言解之如上次正陳詞句中文二初慶前大悲世尊為我等輩廣說如是不思議事本所不見本所不聞我等今者蒙佛善誘身心泰然得大饒益解曰不思議事者有三徵釋謂何名不思議心言罔及故何法不思議謂前輪迴根本種性差別即經中事字何故不思議謂一味淨覺之中說差別雜染無乖違故謂若一向說淨一向說染則可思議今於淨中說染種種差殊染中之淨纖毫不雜故不思議故勝鬘說不染而染染而不染皆難可了知本不見聞者立相之教染淨迢然破相之宗染淨俱絕今顯出覺性染淨融通故此之前未曾聞見問答云云得大益者蕩除細惑二請後中文二一正問願為一切諸來法眾重宣法王圓滿覺性一切眾生及諸菩薩如來世尊所證所得云何差別解曰於中前是舉所證覺性後一切下問能證位地覺心一味因果階差二義既乖故須起問二結益令末世眾生聞此聖教隨順開悟漸次能入解之可知後展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告清淨慧菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生請問如來漸次差別汝今諦聽當為汝說三佇聽時清淨慧菩薩奉教歡喜及諸大眾默然而聽如上正說中長行二一明圓覺無證二明對機說證初中二一法二喻法中二初正明無證後徵釋所以今初善男子圓覺自性非性性有循諸性起無取無證於實相中實無菩薩及諸眾生解曰非性者指圓覺自性非前五性及輪迴性性有者前差別性皆有圓覺循者隨也圓覺不守自性隨緣成諸差別之性諸性起時全覺性起故法身經云法身流轉五道名曰眾生無取證者非當情之境無菩薩眾生者即下自徵釋所以云二徵釋所以何以故菩薩眾生皆是幻化幻化滅故無取證者解曰約有幻垢名曰眾生對離幻垢名為菩薩二俱假名了不可得然前輪迴及此修證皆云無者其無不同前似繩蛇此如鏡像二喻譬如眼根不自見眼性自平等無平等者解曰夫眼能見一切唯不能自見眼根又如眼光照矚物時境則萬差見則是一故云平等但約於境無分別等級之心說平等義亦無能作方便平等之者二對機說證文二一總標大意二證位階差別中二今初功用有殊眾生迷倒未能除滅一切幻化於滅未滅妄功用中便顯差別解曰眾生若無迷惑顛倒則無差別之義故先標迷約之以明證覺差別迷倒之體即根本無明及三細六麤論中亦約翻此以顯始覺階位未能除滅幻化者執之為實於滅未滅者即論四位中前三覺前不覺後也妄功用者七地已還皆是夢中修道故華嚴有夢渡大河之喻圓明證悟始知煩惱本無則見能斷智慧功用亦是虗妄如夢中以藥治病得差寤後則藥病俱無故言妄功用也志公云大道不由行得等便顯差別者正是總標位地二功極不異若得如來寂滅隨順實無寂滅及寂滅者解曰寂滅隨順者隨順寂滅也揀異灰滅故言如來隨順者當體相應非謂將心順佗寂滅實無等者泯能所也一念不生前後際斷即不見有寂滅之法亦無能寂滅者滅之令寂二證位階差者然修證位地五教不同一小乘果別非所明二大乘始教定有位地自為三說一依唯識五位一資糧位從初發心乃至未起順決擇識為趣正覺為度有情修習福智順解脫分二加行位為入見道復修煖依明德定發下尋伺創觀無所取法頂依明增定發上尋伺重觀無所取法也忍依印順定發下如實智印無所取順無能取故世第一依無間定發上如實智無二取伏除二取順決擇分三通達位亦名見道謂入初地無分別智實證真如四修習位始從初地住心乃至金剛無間為斷餘障證二轉依復數修習無分別智五究竟位金剛心後解脫道中初得一果利樂有情窮未來際二者攝論說有四地一勝解行地餘三即見修無學三瑜伽等說有七地一種性二勝解行三賢三淨勝意樂初地四行正行二至七地五決定八六決定行九七到究竟十地如來雜立為地三終教假說地位故仁王先觀一切空但法集故有因果方說位地故佛非數瓔珞云乃至三賢十地之名亦無名相但以應化故有十地之名亦有其三一仁王五忍謂伏忍信忍順忍無生忍各上中下寂滅忍上下二瓔珞六種性一習二性三道四聖皆云種性五等覺性六妙覺性三天台六即謂理即及名字觀行相似分真究竟等即四頓教無位之位即此經及起信論翻妄四位言無位者論結四位云而實無有始覺之異本來平等同一覺故經即就實言無證得約妄說別也如下所明五圓教融通位地即華嚴經略有七位第二會說十信第三會說十住四說十行五說十向六說十地第七會初六品說等覺次三品說妙覺然復有差別平等兩重因果上皆差別也後兩品說平等因果廣有五十二位謂前五各十等妙各一諸教說十信等覺或開或合華嚴俱開故五十二也然因該果海果徹因源行布圓融二無礙故今釋本文文分為二一明依位漸證即上假說二明忘心頓證即上無位初中四一信位二賢位三聖位四果位此四即論中四位也論文逆次約息除生住異滅四相麤細寄顯返流四位亦明始覺分齊約真心隨熏麤細非約剎那也然心性離念本無生滅良由無明迷自真體鼓動起念能令心體生住異滅從細至麤微著不同先後際異先際最微名為生相中間二三名住異相後際最麤名為滅相初最微者謂由無明不覺心動轉彼淨心名為生相二者謂此無明與前生相和合轉彼淨心能見能現分別相續行相猶細法執堅住名為住相三者謂此無明與住相合轉彼淨心乃至此位行相稍麤執取計名發動身口令其造業名為異相四謂此無明與異相合轉彼淨心至此後際不了業報廣對諸緣造集諸業滅前異心令墮諸趣行相最麤極至於此周盡之終名為滅相是故三界四相唯一夢心皆因根本無明之力然雖微著階差始終竟無前後總此四相以為一念唯一心故然未窮源者隨行淺深覺有前後達心源者一心俱時而知謂既因不覺之力起生相等種種夢念今因本覺不思議熏力起厭求心又因真如所流聞熏教法熏於本覺益勝解力損無明能漸向心源始息滅相終息生相朗然大悟覺了心源本無所動今無始靜平等平等無別始覺之異大意如此今以論文對經釋相照然義現但論約覺染麤細經約悟淨勝劣今用論者分齊一也又因互顯兩義俱通初信位者論寄息於滅相論云如凡夫人十信覺知前念起惡信位能知惡業定招苦報故能止後念令其不起止滅相也雖復名覺覺業故即是不覺不覺惑故謂不知滅相如夢也經文分三一標具足凡夫善男子一切眾生從無始來由妄想我及愛我者曾不自知念念生滅故起憎愛躭著五欲解曰此初一段未入信位所以有此文者不約凡迷即無位地故先標此翻之彰信即論文翻顯四相成四位之謂也由妄想我者我體元無妄想謂有四生九類無不皆然及愛我者執為我故便生愛著不知念念生滅者我相本無唯心故有心既念念無常我亦念念生滅故淨名云是身如電念念不住故論云一切眾生不名為覺以從本來念念相續故說無始無明又上句我體即所執也下句我見即能取也我見是別境中慧故無著金剛論以為法執亦可妄想我即我癡我見及愛我者即我愛我慢具明我義下自有文二明聞法覺悟若遇善友教令開悟淨圓覺性發明起滅即知此生性自勞慮解曰善友教者即聞熏也淨圓覺性者即內熏也因緣既備因緣熏義論中廣明心性朗然起滅妄念如覺夢時故云發明也昔與妄合故不自見今冥真覺起滅皆知翻前曾不自知念念生滅故禪家說日光隙塵之喻此生性自勞慮者外無實境何憎愛也即此生起念慮當體自為勞役三明息妄隨真若復有人勞慮永斷得法界淨即彼淨解為自障礙故於圓覺而不自在此名凡夫隨順覺性解曰勞慮永斷者絕求作心但不隨之非謂都盡若盡何異二乘得法界淨者若理法界則法界體中絕諸勞慮塵境不生名之為淨若事法界則分別念慮之心差別塵境之法當體不生名之為淨何者法界淨穢皆由自心心穢則穢心淨則淨於淨起解名淨解繫心在淨故成障礙非外所擾故言自礙故於下結成信中證覺之相作意於覺故不自在此名下結成信位前即知等即論中覺知前念也勞慮永斷等即能止後念等也即彼淨解等即是不覺也唯此信位經論稍殊論唯約位但云覺業經含頓悟故說覺惑二賢位善男子一切菩薩見解為礙雖斷解礙由住見覺覺礙為礙而不自在此名菩薩未入地者隨順覺性解曰論寄息於異相文云如初發意菩薩等覺於念異異念者計我我所貪瞋見愛等念無異相以捨麤分別貪等執著相故著違順境名相似覺猶夢住相今云見解為礙者見前淨解是礙也即是覺於念異雖者預顯劣後斷解礙者超前位也即念無異相等猶住見覺者正當此位是相似覺覺礙下結成地前證覺之相劣於登地所覺是礙故能覺亦礙由存此跡還礙覺心故不自在佛頂經云如登高山身入虗空下有微礙名為頂地此亦如是諸礙既盡如身處空見心猶存如彼微礙彼說地前頂位又唯識論加行偈云現前立少物謂是唯識性以有所得故非實住唯識意亦同此故論但云名相似覺此名下結成賢位慤云見真凝寂能智方融拂解超凡仍拘見覺三聖位論寄息於住相文云如法身菩薩等九地皆同覺於念住四種相也念無住相知法唯識不起麤執以離分別異前人執及著外境故今約心但云分別麤念相故以異上相故云麤念名隨分覺細念既在覺道未圓今文分三一悟前非二明證相三結成位今初善男子有照有覺俱名障礙解曰有照者信中淨解有覺者賢位中覺礙之覺也俱名障礙者正顯前非則論中覺於念住二明證相略啟二門初總釋義後別解文初中復二一者果海離於說相以不可言障而不證斷而證故故十地經但說一分故下文雖寄對強說而但言障礙即覺等無別顯相二者因門可寄言說又有二門一證理法界二證餘法界理中有五一能所歷然謂以無分別智證無差別理心與境冥智與神會如日合空雖不可分而日非空空非日光始教二能所無二以即體之智還照心體舉理收智照體即寂舉智收理寂而常照如一明珠珠自有光還照珠矣終教三能所俱泯謂由智即理故非智由理即智故非理同時互即故互奪也又直顯本覺心體非能所故故此文云常覺不住不住即離能所矣頓教四存泯無礙以前三門說有前後體無二故謂必因能證方悟心體本絕能所故喻先因斷頭方無能斷故肇云般若之與真諦言用即同而異言寂即異而同同故無心於彼此異故不失於照功等融會權實也五舉一全收上列四門欲彰義異理既融攝開合寧殊次證餘者謂以無障礙智證無障礙境境智難思復有三義一開能所謂智無礙故一智即一切智境無礙故一境即一切境境智皆有一多無礙相對論之義有四句一一智證一切境無法不通方成一智故二一切智證一境具無量義智方識一塵故故一塵中具百門義三一智證一境不壞相故事法界也四一切智證一切境重重無盡故二合能所謂一切境皆是自心曾無心外境能與心為緣故心中悟無盡之境境上了難思之心心境重重無礙無盡三攝開合謂舉一全收義准上說上皆圓教今此教文當前證理其無礙境智寄在後果位中說文中二一不住證二不住教前中三謂法喻合今初是故菩薩常覺不住照與照者同時寂滅解曰常覺不住者念念知無所得故照與下即能所契合故唯識見道偈云若時於所緣智都無所得爾時住唯識離二取相故智無所得即此常覺即是無分別智不住即不取種種戲論相故離二取相即此照與照者寂滅智與真如平等平等俱離能取所取相故此智見有相無說無所取不取相故雖有見分而無分別說非能取彼文雖局於見道而證理之義十地無殊又常覺是智不住是理無住為本常覺即不住此當能所不二門照等寂滅即俱泯門亦可不同凡夫故云常覺不同地前故云不住此則念無住相覺住相無故不住矣次喻譬如有人自斷其首首已斷故無能斷者解曰如把刀劒自斷其頭頭未落時即無能斷之義頭若已落復無能斷之人後合則以礙心自滅諸礙礙已斷滅無滅礙者解曰礙心者覺礙之覺諸礙者所覺之礙二不住教者謂地前未證真理難忘言教登地證理不住名言不住故名真解教故華嚴初地文云得經論智又天親論釋初地約教道證道以明行相文中二一標以喻釋修多羅教如標月指若復見月了知所標畢竟非月解曰夫設言像在於得意無言象而倒惑執言象而迷真故以標月之指喻於言教謂見月須藉指端悟心須假佛教因指見月見月忘指因教詮心悟心忘教存指則失於真月執教則失於本心意令證實忘標故云畢竟非月故佛頂云如人以指指月是人應當看月不應看指若復看指非唯忘失月輪抑亦忘指二具以法合一切如來種種言說開示菩薩亦復如是解曰此明諸佛同以言詮顯理故文殊般若云總持無文字文字顯總持三結成位此名菩薩已入地者隨順覺性解曰論中結覺性隨順可知四果位論寄息於生相文云如菩薩地盡無間位也滿足方便一念相應覺心初起心無初相以遠離微細念故直云心無不同上云念無得見心性心即常住名究竟覺乃至以四相俱時而有皆無自立本來平等同一覺故今文分三一明境善男子一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及婬怒癡俱是梵行眾生國土同一法性地獄天宮皆為淨土有性無性齊成佛道一切煩惱畢竟解脫解曰文有十對統而言之智冥圓覺無分別心故十對法皆同真實何者夫覺海元真萬法非有混融一相體用恒如但以迷倒情深強生分別違其正理失本真常今既返本歸真銷迷殄相對治斯遣垢淨雙融剪拔生源成究竟覺故論云見性常住等文中總標言障礙者標每對中上句對待之法麤細皆礙究竟覺者即標下句皆同一體故解脫等謂若見有障礙可斷斷已名覺覺非究竟故障礙即覺方究竟矣即是論中四相本來同一覺也又究竟覺經論文同然此二句藥病俱亡謂無障可斷障即覺故無真可證障體即覺無別真故無斷證智但是覺故然無障可斷無是實無無真可證即不是無故十對文雖皆無二義唯真妄俱真並無真妄俱妄後十對別釋一識智對無念即得其正念是智也有念則為失念是識也論中說覺則離念念則不覺等今明念本自空元是無念故皆解脫二成破對眾緣相會曰成緣離曰破又進修曰成毀謗為破緣無自性成破一如故皆涅槃三愚智對大寶積云癡從分別生分別亦非有癡性與佛性平等無差別四邪正對思益云住正道者不分別是邪是正五真妄對涅槃云無明本際性本解脫古德云迷則真如是妄想悟則妄想是真如六染淨對夫戒定慧翻於三毒三毒本空元是梵行諸法無行經云貪欲即是道恚癡亦復然如是三事中有無量佛道七依正對涅槃云我以佛眼徧觀三界有情無情一切人法悉皆究竟究竟者即法性也故首楞嚴云覺海性澄圓乃至想澄成國土知覺乃眾生既本從覺海中起即知全同覺海覺海即性也八苦樂對極惡業成天宮即見地獄極善業熟地獄即是天宮二業之念由心地獄天宮豈定心則本空一切清淨故寶積經有地獄三昧天宮三昧然諸法皆爾非唯天獄今且約歒對相違之法以例餘者九有性無性對有性者三乘性也無性者闡提性也執定相者永不許闡提入道永不許定性二乘成佛今則非唯佗日迴心現已齊成佛道十縛脫對佛頂云根塵同源縛脫無二識性虗妄猶如空華然煩惱依識識性既空煩惱何縛上之十對名相雖殊其意不殊但緣佛證覺心心無取捨故得諸法普同圓妙故但引例而已不更別釋相即之由二明心法界海慧照了諸相猶如虗空解曰法界深廣故如海也慧即是用稱法界故無邊名法界慧照了諸相等者理量齊鑒無倒正知由分別心諸相差別今海慧離念故諸法如空又能照之慧離分別念猶如虗空即同淨名云其無礙慧無若干也如鏡照物鏡自無心上來皆是論中滿足方便一念相應覺心初起心無初相也三結位此名如來隨順覺性二忘心頓證由前普示教跡說有淺深今直指當根安心隨順前是隨相此當離相亦如華嚴先說差別位地因果後以平等因果融之即差別中之平等平等中之差別此中意趣正同彼也文三一忘心入覺二驗果知因三印成佛智初二一指示忘心善男子但諸菩薩及末世眾生居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實解曰除初標舉文有四節每節二句一妄念者攀緣取著外法也違於覺性故令不起二若求真棄妄猶避影逃形若滅妄存真似揚聲止響三境從心現元是自心若加了知即迷現量故經說非幻成幻論云心不見心但不生情自然如鏡照物且心體本自知覺何必更加了知知上起知名為加矣四能知既寂即真實知真實即知誰知真實如眼不自見眼等二依法頓入彼諸眾生聞是法門信解受持不生驚畏是則名為隨順覺性解曰彼當根眾聞此方便心無疑惑體達分明領受住持坦然合道亦同金剛經中不驚不怖不畏甚為希有等二驗果知因善男子汝等當知如是眾生已曾供養百千萬億恒河沙諸佛及大菩薩植眾德本解曰慤云驗今聞悟頓契佛心方達宿因曩承熏習若但就現世即是頓機若推其因已是積集金剛亦云不於一佛二佛等三印成佛智佛說是人名為成就一切種智解曰謂一切種智由此而得因果相攝決定無疑是以如來印言成就又此經宗分同華嚴因該果海果徹因源稱性互收無別先後彼云若諸菩薩能與如是觀行相應於諸法中不生二解即同此忘心之文即得阿耨菩提同此一切種智偈讚中三初一偈圓覺無證爾時世尊欲重宣此義而說偈言清淨慧當知圓滿菩提性無取亦無證無菩薩眾生次就機說證文二初二句總標大意覺與未覺時漸次有差別後證位階差文二初六句漸證四位眾生為解礙菩薩未離覺入地永寂滅不住一切相大覺悉圓滿名為徧隨順後六句頓悟圓滿末世諸眾生心不生虗妄佛說如是人現世即菩薩供養河沙佛功德已圓滿後二句總結雖有多方便皆名隨順智總結頓漸故云多方便也此文長行無也上來四段通明觀行竟音釋隟同隙慤乞約切音鷇謹也
