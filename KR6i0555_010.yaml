body:
  text: 終南山草堂寺沙門宗密述次四問答別明觀行中根修證言別明者有其二意一則由前一類人已依前門證入不必修此故此名別二則此門各各自別如三觀或則一人具三或二或一單復交絡成二十五種人各應一機故云別也其所離障亦各不同且如四相或一人具四或三二一其四病者人各有一定不兼餘以相違故故此兩四皆是別相不同前無明及愛但是凡夫悉有故前通此別矣然通別觀行中皆與惑障同科段者由是障觀行之惑惑除則成觀行故若約四分科經即當第三明行謂從彌勒終於淨慧始終因果理智昭彰即之於心方成真解華嚴中間六會修因契果五十二位總名為解依此解力三觀修行故一一標云悟淨圓覺也除障成功正是行也文中二初二問答三觀修行後二問答兩重除障初中二初示三觀行相後明單復修習初中文四初三之初於是威德自在菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解同上也次陳詞句二一慶前大悲世尊廣為我等分別如是隨順覺性令諸菩薩覺心光明承佛圓音不因修習而得善利解曰分別隨順覺性者領前依位漸證不因修習等者領前忘心頓證亦可通述聞時已益不待修之方得善利非不擬修二請後文二一問所修二明所為初中二一立理世尊譬如大城外有四門隨方來者非止一路一切菩薩莊嚴佛國及成菩提非一方便解曰謂前說修行觀行理趣分明今復咨詢恐涉非分故先立理請更投機於中前喻後法喻中大城喻圓覺四門喻行門如從東來不可西入法合可知二正請唯願世尊廣為我等宣說一切方便漸次并修行人總有幾種解曰言方便漸次者所修之行并修等者能修之機二明所為令此會菩薩及末世衆生求大乘者速得開悟遊戲如來大寂滅海後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告威德自在菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是方便汝今諦聽當為汝說三佇聽時威德自在菩薩奉教歡喜及諸大衆默然而聽四正說長行中四一標本舉數二正示觀門三引例彰圓四校量顯勝初二一約稱性之行以標本善男子無上妙覺遍諸十方出生如來與一切法同體平等於諸修行實無有二解曰初明所稱之性言出生如來者十方諸佛同證同修證義如前此問修矣與一切法同體平等者色心不二凡聖無差皆依覺性故云同體平等智論云此真如者在衆生數中名為佛性在非衆生數中名為法性後修行無二者能稱之行即如前二空觀門根塵普淨貪愛俱寂悲智雙行離相離性常無所得一切菩薩無不如斯隨事雖差此意無二故佛頂云十方薄伽梵一路涅槃門二約隨機之行以舉數方便隨順其數無量圓攝所歸循性差別當有三種解曰初總顯多門佛頂又云歸源性無二方便有多門然衆生根性利鈍不同煩惱厚薄沉掉不等隨其根性設教多端不爾難為趣入故楞伽云所說非所應於彼為非說彼彼諸病人良醫為處方如來為衆生隨心應量說後圓攝下攝歸三種衆生根性雖有萬差而此三門一切收盡必須三者義如下釋循者隨也性謂根性二正示觀門文三一泯相身心客塵永滅澄神取靜澄念觀心冥所觀之境更不異緣二起幻銷塵觀經文甚顯三絶待靈心觀非關真妄不對有空直照靈知而為觀行文云不取幻化及諸靜相又云超過礙無礙境又煩惱涅槃不相留礙皆絶待義也言無知覺明即靈心也然禪觀綱領已具懸談修習菩提非此不證但以教隨機異展轉殊途邪正凡聖小大權實事理漸頓有共不共今此託法進修以成圓頓觀行即事理定慧俱無礙也與論中修習真如三昧體相大同小異小異者彼不開為三也今初泯相文自有三一標本善男子若諸菩薩悟淨圓覺解曰謂發心修行欲趣佛果先須了悟身中淨圓覺性以為行本本即解也即是通明觀行依解而修方為妙行膏明相賴目足更資此金剛觀割煩惱障此牢強足越生死野下標本等皆同此矣若約能修方便准天台止觀總有十門具緣第一謂具五緣一持戒清淨是定因故二衣一如雪山大士隨得一衣蔽形二如迦葉糞掃三衣不畜餘長三多寒國土忍力未成亦許三衣外百一資身說淨知足食一上士絶世食果草等隨得資身二常行頭陀受乞食法能破下仰維方四邪三阿蘭若處檀越送食四僧常食及受請具足三間居不作衆事靜處離憒閙故一深山二離聚落三二里三遠白衣舍處清淨伽藍也四息諸緣務一生活二人事三工巧技術四學問讀誦也五近善知識一外護經營供給二同行互相勤發三教授禪定法門也訶欲第二欲謂色如熱金丸等又王入敵國淫房及截仙人手聲如毒塗鼓又仙人聞迦羅女獸失定香如弊龍氣蓮池神瞋責也味如熱密塗刀沙彌酪蟲觸如臥師子騎頸獨角仙人失通為欲所惱而猶求之得之轉劇如火得薪枯骨風炬夢得假借等棄蓋第三謂貪內發燒身得怖失惱亦如食吐瞋煞安隱無憂毒根滅善睡抱尸臥偈掉悔掉謂身口心三此由悔故成蓋悔謂因掉生悔或造罪怖悔也疑疑有種種未必障定障定者有三謂疑師疑自疑法棄之如脫債病差飢食等調和第四謂調食飽則氣急脉塞心悶飢則心懸意慮不固等睡喪功心暗常悟無常調之令神清心明不抑不恣也身常須動止詳審出入有度坐不低昂寬急息息有風喘氣息四相風散喘結氣勞息定息者出入綿綿若存若亡不澀不滑心亂心不起浮沉寬急須令得所然身息心三事雖有初後方便不同而乃合用用之則發戒定慧也方便第五謂行五法五法者欲欲離世倒欲得清淨智欲亦名志願樂等佛言一切善法欲為其本也精進初中後夜專精不廢如鑽火未出等念念世可賤禪定可貴巧慧籌量世樂禪樂得失輕重一心依止念慧明見可惡可尊故當一心決修止觀心如金剛覺魔事第六謂煩惱陰死及鬼神魔鬼神魔三一精魅十二時獸依本時說其名訶責即滅二塠惕鬼如蟲緣人頭面等閉眼陰罵或誦戒等即去三魔羅多作違虎狼等也順父母男女佛像等平平三種五塵境界相來破人善心行者既覺即修止觀却之止者悉知虗誑不怖不愛不捨不取亦不分別息心寂默觀者反觀能見之心誰愛怖等智論云除諸法實相餘皆魔事起信亦云現形恐怖違情現男女順情等平平當念唯心境界即滅又云現佛等像說施等法無相等理令知宿命他心辨才無礙能令衆生貪著名利或數瞋喜進怠無準疑慮故業定中得食顏色改變等常應觀察不取不著則能遠離若見善相以三法驗之一以定研磨二依本修治三智慧觀察如人欲知真金三法試之謂燒打磨治病第七然諸病者不過四大腫瘦痰脹熱痛煩嘔五臟心寒熱口燥肺支疼鼻塞肝憂愁眼暗脾身癢痛失味腎喉噎耳滿增損乖攝理故或業招鬼作今明治法不過止觀止者安心病處或臍下足下或了法空不取病相寂然止住故淨名云何為病本所謂攀緣云何斷攀緣謂心無所得觀者心用六氣謂吹去寒呼去熱嘻去風呵去煩下氣𭊌去痰呬去勞治風又十二息謂一一云息上沉重下虗懸滿枯瘦燋腫滿長羸損壞治增暖治冷冷治熱衝壅結持戰動和通治四大補資益四大善用則治衆患失所則更增諸病又假想觀謂身中火能治冷等又推身心病不可得衆病自除然上所說但具十法無不有益謂信用勤待汗為度住不異緣也別病如上方便吐納運想久行不計日月取捨益用損捨將護犯觸遮障益不外說損不疑謗或禁呪修善治鬼業等正修第八即當釋經文也然且先敘彼所修法修有二種一者坐修謂行掉臥沉立又疲倦故坐為勝初坐時亂心粗故應當修止止有理事事謂繫心一處隨起即制理謂體真知心本寂止若不除應當修觀觀亦理事事謂對治助道五停理謂觀法實相正道此有三觀如前已說又修止觀者對治浮沉故隨自便宜故對破定見細心故均齊定慧故二者歷緣對境修歷緣者謂歷行住坐臥作語等六緣皆作是念我今為何而欲行等對境者即根塵六對謂知色本空乾城水月愛厭不生是名修止了無見相是名修觀聲等例之具如彼說善根發第九證相第十皆如下說二正釋三一起行以淨覺心取靜為行由澄諸念覺識煩動解曰以淨覺心者約其所悟而起行也以者用也凡夫用妄菩薩用覺迷悟異故慤云標乎創智者即初悟也取靜為行者雖悟即動即靜為欲對治動亂之習一向以靜境安心漸漸修行方得成就慤云然覺心初建力尚尫微理宜處靜安詳方能展照問如何得心靜耶答既悟萬法唯識識唯真心真心不生於法斯為至靜安心住此為取不取於法名為取靜論云若修止者住於靜處端坐正意不依氣息數息觀境形骨鎖等也色青黃赤白虗空地水火風見聞知覺識也通前是十遍處觀也乃至當知唯心無外境界即復此心亦無自相等澄念覺動者由前以靜澄心諸念不起心合靜源體非分別故見分別之識煩勞動擾若自是識則不能見識如眼不自見今由念澄智顯故覺識也二功成靜慧發生身心客塵從此永滅便能內發寂靜輕安解曰靜慧發生者由前念澄覺識慧性開明因靜生慧故云靜慧比隱今顯故云發生身心等者由慧發生身心相盡塵妄不起名為永滅客非本性塵污自體慤云慧光圓發根識俄消便能等者由離根境內心自間寂靜清虗輕安調暢喧塵永息粗重長袪輕安者遠離粗重調暢身心堪任為性對治昏沉轉依為業三感應由寂靜故十方世界諸如來心於中顯現如鏡中像解曰初句躡前功用餘正明感應先法後喻法中如來心者真淨心也亦即法身故論中說色性即智性智性即色性於中現者衆生圓明心性與佛無殊但以妄情凡聖似隔今身心相盡妄念不生圓覺妙心凡聖交徹理實而言我之身心亦遍現十方佛中今但約入觀者為主故云諸佛於中顯現後喻如諸鏡入一鏡中諸鏡即成影像故諸佛心入行人觀心如影像也然塵鏡之性本明磨瑩即呈物像衆生自心亦爾心淨即現如來故論問云若諸佛有自然業能現一切處利益衆生者云何世間多不能見答曰諸佛如來法身平等遍一切處無有作意故說自然但依衆生心現衆生心者猶如於鏡鏡若有垢色像不現如是衆生心若有垢法身不現經云佛心論云法身身心一也皆據能現之本若就所現應云應化此乃鏡明則像像歷然智顯則心心交映此約心靜故則知佛心亦然故名為現非謂佛心有所現也故淨名云如自觀身實相觀佛亦然三結名此方便者名奢摩他解曰此翻云止定之異名寂靜義也謂於染淨等境心不妄緣故若準涅槃經釋即名能滅滅一切煩惱故能調調諸根惡不善故寂靜能令三業成寂靜故遠離能令衆生離五欲故能清清貪瞋癡三濁故結云以是義故名為定相二起幻消塵觀文三初標善男子若諸菩薩悟淨圓覺二正釋中五一起行以淨覺心知覺心性及與根塵皆因幻化即起諸幻以除幻者變化諸幻而開幻衆解曰於中初躡前成解心性是識識與根塵三和合有各無自性但是無明迷真而起故名幻化後即起下正明起行諸幻即幻智也幻者即根本無明是能幻之者除者依如幻始覺力分覺根本不覺始息滅相終息生相即是除幻具如普眼章中二空觀也然彼與此有三意異彼明稱理圓觀以成頓悟此明尅體進修堅持不捨又彼是總相觀行普被諸根此是別相方便別對一類彼上根入此中根入變化等者變起差別幻智遍觀自他八萬塵勞幻衆一一稱真清淨非障非蔽即為開也又變起種種方便應機說法開示如幻衆生又對上二句有四對別謂自行化他除障起行止持作持除遍計執翻染成淨一一配之可知二功成由起幻故便能內發大悲輕安解曰根塵既銷自他無二故能內發同體大悲知貴種成賤方可愍傷也又有數意故大悲發謂幻無怨親應等度故傷他執實不知是幻枉受苦故我幻身心何所惜故不怖幻生死故不貪幻佛果故輕安者由悲從定起非其愛見故輕安暢適三結通一切菩薩從此起行漸次增進解曰謂諸菩薩從二利觀門方能對境對機起於二行乃至佛果四揀濫彼觀幻者非同幻故非同幻觀皆是幻故解曰初二句揀識殊智能所勝劣異故後二句亦拂幻智五總結幻相永離是諸菩薩所圓妙行如土長苗解曰初法結成非幻稱真之行後喻如種穀等依土長苗收子之時苗土俱棄種喻覺心土喻幻法苗喻幻智謂以淨覺心對諸幻法而起智從幻智而忘心入覺入覺則前二皆袪三結名此方便者名三摩鉢提解曰亦名三摩鉢底此云等至等持之中能至勝位故又等謂齊等離沉掉故至謂至到到勝定故故前文有如幻三昧涅槃云毗婆舍那名為正見遍見次第見別相見即是觀也意亦同此三絶待靈心觀文三初標善男子若諸菩薩悟淨圓覺二正釋中三一起行以淨覺心不取幻化及諸靜相了知身心皆為罣礙無知覺明不依諸礙永得超過礙無礙境受用世界及與身心相在塵域如器中鍠聲出于外煩惱涅槃不相留礙解曰於中三節初句所依次明所離不取幻化者離第二觀及靜相者離第一觀了知等者釋離所以謂見身心即著我相著我則起過故前靜之次又觀之今了是礙故皆不取又身心是妄無可了知了知是能身心是所託所起能故亦皆礙後明所用於中又三謂法喻合法中無知覺者異乎身心謂身觸為覺心緣曰知由此分別障正知見正知見是無知覺明明字正顯靈妙之體然此靈心上而無頂下而無底傍無邊際中無在處既無當中何有東西上下欲言空寂不似太虗欲言相用不從緣起欲言知見異於分別欲言頑礙異於木石欲言其覺不同醒悟之初欲言其明不同日月之類故諸經教於寂靜空無訶為邪小於知見明覺互泯互存各有深意今此欲入觀門恐知字引分別念故宜但云明也諸礙者身心能所不依者直造靈明永得者究竟之詞超過者逈殊對待礙者幻涉煩惱無礙者靜同涅槃金剛三昧云不動不禪等受用者屬己資緣世界者共居國邑身者宛然形質心者還有見聞相在者不異尋常塵域者不離舊處比由執認沒體同他今不生情豈拘靈照喻中鍠者分二先釋喻依後正釋喻喻依者鍠字不定恐譯人錯遂為三釋一依鍠字音橫准切韻訓和訓樂不是器中之聲今率愚詳之取其聲勢不取訓字此應是金等器中聲相也今且現聞擊鍾磬之類其聲鍠鍠然即知鍠是此類聲之相狀譯人回潤稍拙應云如金器聲鍠鍠出外二作鐄字音同即大鐘也是諸器中之一數故云如器中鐄准此即順本經文回潤非失但筆授或寫録錯誤以鐄為鍠耳三者作簧音黃即笙簧之類以有簧之器非一故不局云如笙中簧乃云器中簧也亦如管籥之屬皆能發聲出于外故准此則譯人不善此方聲韻文字故字與音俱錯耳後正釋喻者前三雖異合法皆通皆器喻世界身心聲喻靈明觀智謂聲從器出器不能拘故聲聞四遠器局本處以喻觀智約身心修得身心所不能拘觀智廓爾無邊身心不離舊處但約所喻相當何爭喻所依物慤云如萬鈞之鏞星樓受礙搖杵一擊聲振寰區自體兼他不能留礙豈以樓拘鍾相使響不通形礙管聲令音不透觀此文勢未免懷疑復不能決通媕婀邈之而已意亦同前仍法合最具謂加樓喻世界餘准上知二功成便能內發寂滅輕安妙覺隨順寂滅境界自他身心所不能及衆生壽命皆為浮想解曰寂滅者謂不取幻化幻化即寂不取靜相靜相即滅亦可反此亦可俱通又但是真心實理非指靜幻故楞伽云寂滅者名為一心此非息動之寂生已而滅故云內發也輕安同前靜與寂異者靜是二乘境亦是禪定寂滅是佛境亦是涅槃故前數云如來寂滅仁王此忍當其位滿妙覺等者在觀之時用心同佛故云隨順自他等者唯獨自明了餘人所不見故他不及自己心識之量亦不能造如螢燒須彌必須離情方契故自不及又依體起智為自根塵發識名他不可識識智知故皆不及衆生等者壽命本無實體但為浮想任持故華嚴云一切衆生但想所持其猶空雲是空之浮氣了虗空者即知浮雲畢竟非空衆生壽命是真之浮想了真寂者知衆生畢竟非真三結名此方便者名為禪那解曰此云靜慮義如前釋即慮而靜故無散動即當定義即靜而慮故非無記即當慧義故四靜慮定慧平等問既是定慧平等云何科云絶待靈心答正由不滯此二直造心源故定慧等釋相文中絶待之義甚明固無疑矣故涅槃中名為捨相然釋相中指修行者忘情用心故顯雙非絶待後但約義以結故取雙是齊融齊融絶待雙是雙非皆是中道故釋相與結名互顯三顯文初皆標悟者聞前經故謂初靜觀修文殊中解次幻觀修普賢章全普眼前半之解後寂觀修普眼後半剛藏全章之解對配前經照然可見然此三觀與涅槃經三十三十一三相大同小異彼經云無十相故色聲香味觸生住壞男女名大涅槃若有比丘時時修集定慧捨相即三相也則斷十相定名三昧若取色相不能觀色常無常相是名三昧若能觀色常無常相是名慧相三昧慧等駕駟遲疾觀一切法是名捨相二乘定多菩薩慧多世尊等故明見佛性見佛性者名為捨相奢摩他者名為能滅云云如上所引故名定相毗鉢舍那名為正見遍見次第見別相見是名為慧憂畢叉者名曰平等不靜不觀不行是名為捨若菩薩善知定時生大憍慢非修慧時慧時精勤未益故悔心非修定時也捨時定慧不等不宜修捨等則修之及知非時各如上注是名行菩提道言小異者彼則初定次慧後等此則三門皆含定慧言大同者此初名止取靜澄神定相增勝彼云但不取色相此云取靜為行皆定境也又彼次後文云修集定者能見五陰生滅之相此云由澄諸念覺識煩動也次了根塵起幻除幻慧相增勝後絶待雙融即全同彼彼云平等名捨相也等即雙融捨即絶待彼雖初定次慧亦是從增勝說豈實教中有偏定偏慧耶又此三門與天台三觀依瓔珞經義理則同意趣則異同者一泯相即空觀也二起幻即假觀也三絶待即中觀也異者此明行人用心方便彼則推窮諸法性相此多約心成行故不立所觀之境彼多約義生解故對所觀三諦真俗及第一義本業經云無諦有諦中道第一義諦亦全同也又此不立三止者體真止隨緣止息二邊分別止一一門中即含止觀故也論亦先修止次修觀後雙修亦大同小異然此彼經及天台教數皆三者論及本業亦應同此標舉由法性之體本具三大體用相也迷起三道惑業苦今依三大顯三佛性了因緣因正因修三止三觀觀三諦淨三聚戒攝律儀衆生善法滅三道回向三處實際衆生菩提成就三智一切智道種智一切種智具足三德斷恩智得三菩提實相方便實智證三涅槃性淨方便淨圓淨也安住三種祕密藏故般若解脫法身問若爾即應一人具修三觀何故經文單復皆許答約修習門隨宜漸入理實圓證方名究竟故次文云此三法門等三引例顯圓善男子此三法門皆是圓覺親近隨順十方如來因此成佛十方菩薩種種方便一切同異皆依如是三種事業若得圓證即成圓覺解曰此三門皆依悟淨圓覺而起觀行觀行亦皆趣入圓覺始終不離故云親近隨順佛及菩薩同證同修隨機隨事行相各異或多人同修一門萬行中一或一人具修多行若三五若百千同之與異隨類難准然必皆依此三種業三種業中或具依三或一或二同時前後單復綺互具如二十五輪所明此是修行人之事業矣證成覺者趣入雖從一門功成則三皆圓證若偏修一行但名親近若三事圓通名證圓覺四校量顯勝善男子假使有人修於聖道教化成就百千萬億阿羅漢辟支佛果不如有人聞此圓覺無礙法門一剎那頃隨順修習解曰初舉劣後不如下顯勝且如勸得一人二人持於五戒十戒據諸教說福已甚多況令爾許億人成就辟支羅漢具足六通八解永超三界十纏而乃不如有人暫習圓覺時中極促唯一剎那豈況長時圓修妙觀慤云牛跡巨海何可校量聞此等者聞慧隨順者思慧修習者修慧偈讚中三初七句標舉爾時世尊欲重宣此義而說偈言威德汝當知無上大覺心本際無二相隨順諸方便其數即無量如來總開示便有三種類次六句三觀寂靜奢摩他如鏡照諸像如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠後七句引例三種妙法門皆是覺隨順十方諸如來及諸大菩薩因此得成道三事圓證故名究竟涅槃餘校量顯勝長有偈無上來三觀竟自下第二明單復修習文四初三之初於是辨音菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解之如上次陳詞句中二初慶前大悲世尊如是法門甚為希有解之可知二請後有二一問所修世尊此諸方便一切菩薩於圓覺門有幾修習解曰此諸方便者指前三觀圓覺門者指前所依行本有幾修習者前說三觀雖行相分明未審諸菩薩所修為復一人具三為三人各一為前後為同時為依次為超次二明所為願為大衆及末世衆生方便開示令悟實相解之可見後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告辨音菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生問於如來如是修習汝今諦聽當為汝說三佇聽時辨音菩薩奉教歡喜及諸大衆默然而聽四正說長行中四一舉意標數二觀網交羅三結成正因四總示修習今初善男子一切如來圓覺清淨本無修習及修習者一切菩薩及末世衆生依於未覺幻力修習爾時便有二十五種清淨定輪解曰於中初舉意後標數初中又二先明所依之本後一切菩薩下正明諸輪大意無修之修義同前段後爾時下舉數輪者摧輾義能摧惑障令正智轉故名為輪二觀網交羅於中三初有三輪單修三觀次有二十一輪交絡三觀後有一輪圓修三觀慤疏於此二十五觀約喻各立一名除初三輪餘並不釋今全用之兼解其意初中三輪者還是三觀亦不異前但為分成二十五數故略明之以顯單復之相言單修者標云唯結云單也意顯不兼餘二三者初澄渾息用觀若諸菩薩唯取極靜由靜力故永斷煩惱究竟成就不起于座便入涅槃此菩薩者名單修奢摩他解曰此下二十五輪皆有標列結亦應一一標云悟淨圓覺以為起行所依為前有故經恐文繁故略不載澄渾息用者澄渾濁令清息作用令靜唯取極靜者不兼餘觀次三句者由靜心之力覺身心相空瞥念尚無煩惱何據煩惱不起即是覺心故云究竟成就後兩句不起法空之座便入寂滅涅槃二庖丁恣刃觀若諸菩薩唯觀如幻以佛力故變化世界種種作用備行菩薩清淨妙行於陀羅尼不失寂念及諸靜慧此菩薩者名單修三摩鉢提解曰庖丁者是晉時屠子十九年以一刀解牛鋒刃不損喻菩薩利衆生修萬行應緣入俗自智無傷前開幻衆及內發大悲此以佛力即當大智變化世界者如前變諸幻也種種作用含於逆順自他之行備行等句則唯順行於陀羅尼下總明動而常寂寂念靜慧即定慧也三呈音出礙觀若諸菩薩唯滅諸幻不取作用獨斷煩惱煩惱斷盡便證實相此菩薩者名單修禪那解曰取前鍠聲出外作此觀名彼自釋云然器質音融隨犍應響形拘性寂妙用無方智德深妙證道遺骸性光圓照埃氛永寂唯滅等者幻境無邊難可窮究故須直滅滅者絶念作用施為又妨禪寂故云不取入佛境界經云諸法猶如幻如幻不可得離諸幻法故敬禮無所觀獨斷煩惱者不假諸行獨者正是絶待中道之義斷盡便證者所斷既盡能斷即空便為證矣然每說此觀行相皆云斷煩惱者寂滅涅槃相故生滅滅已名寂滅故照徹靈心窮惑源故次交絡三觀每以一觀為頭兼於餘觀交絡成七三七故有二十一輪兼前三單及後一圓足二十五然每一觀為頭七段之中皆有四節初兩段二二共合各兼其一次兩段三行次第次兼餘次有一段先一後齊齊兼餘二後有兩段先齊後一齊兼一今每觀為首之中但長科七段又緣每輪辨其先後一一須牒觀名今文句太繁每觀但各舉一字號謂初云靜觀次云幻觀後云寂觀寂與靜殊前已具辨文三初七輪靜觀為首兼於幻寂次七輪幻觀為首兼於靜寂後七輪寂觀為首兼於靜幻初中七觀一運舟兼濟觀若諸菩薩先取至靜以靜慧心照諸幻者便於是中起菩薩行此菩薩者名先修奢摩他後修三摩鉢提解曰菩薩修定以出塵即運舟發慧以化物即兼濟先取至靜者標首以者運也靜慧心者舟也照諸幻者下兼修幻觀照之欲化化即兼濟也若無靜慧則自居幻化何能照幻者而度脫之如舟自沈焉能救溺二湛海澄空觀若諸菩薩以靜慧故證至靜性便斷煩惱永出生死此菩薩者名先修奢摩他後修禪那解曰湛海即波瀾不動先靜觀以反流澄空則水性清明後寂觀以顯性以靜慧故者標首證至靜性者躡靜而兼修寂也性即是寂後兩句二觀功用斷煩惱是因亡出生死是果喪三首羅三目觀若諸菩薩以寂靜慧復現幻力種種變化度諸衆生後斷煩惱而入寂滅此菩薩者名先修奢摩他中修三摩鉢提後修禪那解曰三觀俱修如摩醯首羅面上三目以寂靜慧標靜也復現下次幻也後斷下寂也四三點齊修觀若諸菩薩以至靜力斷煩惱已後起菩薩清淨妙行度諸衆生此菩薩者名先修奢摩他中修禪那後修三摩鉢提解曰三點者梵之伊字慤云意者但一人具修三觀即名為齊非謂同時以至靜力標也斷煩惱已寂也後起下幻也此含二利謂淨行度生煩惱既寂愛見已無故所起行無不淨妙可度衆生五品字單雙觀若諸菩薩以至靜力心斷煩惱復度衆生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那解曰上單靜觀如上一口後雙明寂幻如下兩口故云單雙以至靜力標也心斷下三句齊兼幻寂初句是幻內除煩惱外度衆生具悲智也故淨名云若自無縛能解他縛斯有是處六獨足雙頭觀若諸菩薩以至靜力資發變化後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那解曰白澤圖中有山精頭如鼓有兩面前後俱見此喻靜幻雙照二利齊運如雙頭也單寂如獨足也此與前異前則上單下雙此則上雙下單初二句齊標靜幻以至靜力資助策發變化之力以度衆生也後句寂兼前二利備故入中道七果落華敷觀若諸菩薩以至靜力用資寂滅後起作用變化境界此菩薩者名齊修奢摩他禪那後修三摩鉢提解曰即以靜定之樹結寂滅中道之果後敷華者復以幻觀入有情界度諸衆生同令獲得涅槃之果初齊寂二句後兼幻二句次七輪幻觀為首一一標幻為初次兼餘二今初先武後文觀若諸菩薩以變化力種種隨順而取至靜此菩薩者名先修三摩鉢提後修奢摩他解曰武王代紂後鑄戈戟為農器喻此菩薩先變化種種已後入靜觀初幻二句後靜一句二功成退職觀若諸菩薩以變化力種種境界而取寂滅此菩薩者名先修三摩鉢提後修禪那解曰菩薩發慧利物即是功成習寂內修名為職退初幻二句後寂一句三幻師解術觀若諸菩薩以變化力而作佛事安住寂靜而斷煩惱此菩薩者名先修三摩鉢提中修奢摩他後修禪那解曰先起變化術法後歸空體寂故云解術初幻二句次靜一句後寂一句四神龍隱海觀若諸菩薩以變化力無礙作用斷煩惱故安住至靜此菩薩者名先修三摩鉢提中修禪那後修奢摩他解曰起幻化生如神龍布雲雨歸體入靜如隱海也初幻二句次寂一句後靜一句五龍樹通真觀若諸菩薩以變化力方便作用至靜寂滅二俱隨順此菩薩者名先修三摩鉢提齊修奢摩他禪那解曰先起假幻後歸空寂如龍樹初行幻術廣化邪途後習真乘自階聖果初幻二後齊兼靜寂二六商那示相觀若諸菩薩以變化力種種起用資於至靜後斷煩惱此菩薩者名齊修三摩鉢提奢摩他後修禪那解曰商那和修即優婆毱多之師也先以神力示相降伏毱多弟子慢心後乃入定歸寂初齊靜三後兼寂一雖化衆生不生於化即是資於至靜七大通宴默觀若諸菩薩以變化力資於寂滅後住清淨無作靜慮此菩薩者名齊修三摩鉢提禪那後修奢摩他解曰大通如來先化用利物後歸寂靜初齊寂二後兼靜二後七輪寂觀為首一一標寂為初次兼餘二此初寶明空海觀若諸菩薩以寂滅力而起至靜住於清淨此菩薩者名先修禪那後修奢摩他解曰佛頂文也寶明是慧空海是定經云同入如來寶明空海今靈心觀即本覺明如寶明也後靜觀如空海也初寂一次兼靜二二虗空妙用觀若諸菩薩以寂滅力而起作用於一切境寂用隨順此菩薩者名先修禪那後修三摩鉢提解曰靈心之體如虗空起化即妙用初寂一後兼幻三三舜若呈神觀若諸菩薩以寂滅力種種自性安於靜慮而起變化此菩薩者名先修禪那中修奢摩他後修三摩鉢提解曰舜若即虗空神遇日光映之暫現如此先寂次空後幻初寂次靜一後幻一四飲光歸定觀若諸菩薩以寂滅力無作自性起於作用清淨境界歸於靜慮此菩薩者名先修禪那中修三摩鉢提後修奢摩他解曰大迦葉也先證體次起神通後乃歸定初寂二次幻二後靜一五多寶呈通觀若諸菩薩以寂滅力種種清淨而住靜慮起於變化此菩薩者名先修禪那齊修奢摩他三摩鉢提解曰多寶佛先成道證如體後於塔中發起法華如靜幻無礙初寂二後齊兼靜幻二六下方騰化觀若諸菩薩以寂滅力資於至靜而起變化此菩薩者名齊修禪那奢摩他後修三摩鉢提解曰即法華菩薩六萬恆沙從下方現初齊靜二後兼幻一七帝青含變觀若諸菩薩以寂滅力資於變化而起至靜清明境慧此菩薩者名齊修禪那三摩鉢提後修奢摩他解曰帝青之寶含諸物像對則變應應而還空如靈心觀成包含德用應緣起幻而復安靜初齊幻一後兼靜二後有一輪如意圓攝圓修三觀若諸菩薩以圓覺慧圓合一切於諸性相無離覺性此菩薩者名為圓修三種自性清淨隨順解曰此名如意圓修觀謂如意寶珠四方俱照大智頓覺三觀齊修圓覺慧者稱圓覺而發慧故圓合一切者圓融和合一切事理性相真妄色空等類舉體相應是為圓合謂由圓覺合理理即非理故全即事又由此覺合事事即非事故全即理餘性相等皆同此說中道義諦於是現焉非理非事雙遮顯中即理即事雙照顯中遮照同時是為圓覺言於諸性相無離覺性者性即靜觀相即幻觀覺性即中道寂滅觀故云圓修三觀矣又以圓覺合一切是從體起用性相無異覺性是會用歸體體用無礙寂照同時是為圓滿無上妙覺三結成正因善男子是名菩薩二十五輪一切菩薩修行如是解之可見四總示修習若諸菩薩及末世衆生依此輪者當持梵行寂靜思惟求哀懺悔經三七日於二十五輪各安標記至心求哀隨手結取依結開示便知頓漸一念疑悔即不成就解曰示修習者修此二十五輪之時於事中威儀法式及用心方便三業事理具足修習之意當持梵行者戒也寂靜者定也思惟者慧也具戒定慧心在觀門如是修行必定成佛懺悔三七日者多生業纍恐障淨心懺悔求哀發露先罪日數若少慮不精誠三七日中已彰懇禱懺悔之義下道場加行中當釋各安標記者書此二十五輪名字文句安置道場之中禮念虔誠精祈一行隨手結取者若自的樂一門隨便即習若勝劣難分不能自決即憑聖力以卜應修信手取之不宜揀擇依結等者依所捻結開而視之頓漸自知無貪餘觀一念等者心懷疑阻併失前功縱使再修稍難成就據根驗理必在于茲無得等間輕於事相偈中亦四初一偈舉意爾時世尊欲重宣此義而說偈言辨音汝當知一切諸菩薩無礙清淨慧皆依禪定生其標數者長有此無言無礙慧依禪定生者令修觀之人先以所依之體為本而起觀行長行云圓覺清淨無能所修心冥此理即禪定義二一偈觀網所謂奢摩他三摩提禪那三法頓漸修有二十五種長廣此略三一偈半結因十方諸如來三世修行者無不因此法而得成菩提唯除頓覺人并法不隨順解曰長略此廣於中二初一偈正結所為後二句揀非所為此文長無偈有今為二釋一者兩句皆作上根釋謂唯除上根圓頓悟解之人并及於一切定相之法不隨順者大品云不信一切法名信般若則不必具依二十五輪及道場探結等不隨順法者不取相也既不隨相即隨真覺此乃頓入圓明觸目合道不可加之繩索傷乎無瘡是前知幻即離不作方便等類故除之矣二者下一句作無信下根釋謂都不信者聞之不能隨順依此即上智與下愚不移也前釋不隨不隨倒法此釋不隨不隨正法四一偈半總示一切諸菩薩及末世衆生常當持此輪隨順勤修習依佛大悲力不久證涅槃可知章門有四一修止觀章二四諦章三斷惑章四禮懺等章除釋本經外傍通餘義三十有三情無情平等隨根設教解為行本佛心現於觀心義見幻起悲五意無知覺明鍠字三解喻依喻體三觀義明三之所以凡不同佛辨法性覺性別兩種四相根本無明生盲喻判潛伏藏識解抑聖同己驗妬辨多聞失釋根本六煩惱七慢九慢城三義現過令他淨不譏師過四食事師之心金剛四心大小乘三安居六妙門出世涅槃四對兩種四句信必具解奉行二義右附録下音釋煞音鎩俗殺字掉杜弔切調去聲搖動也塠惕塠音堆謫也惕音剔敬懼也塠惕鬼名如蟲能緣人頭面噓呬噓音虗吹氣也呬虗器切音屓喙息也尫音汪羸弱也鏞音容大鐘也媕婀媕音諳婀音阿媕婀不決也
