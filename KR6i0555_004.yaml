body:
  text: 終南山草堂寺沙門宗密述此下正釋本文文分兩段初攝相歸真後稱真現土初中三一標入智用之源二明與凡聖同體三總彰稱體圓遍今初入於神通大光明藏三昧正受解曰藏即寶性法界藏起信心真如是諸佛衆生之本源神妙用難測通自在無壅光明之性體塵沙德用並蘊其中百千通光皆從斯起故云藏也亦名法性土亦名常寂光土息諸分別智與理冥名為入矣然諸佛有常光放光若約常光光即是藏謂心性本明迷之似暗妄想既盡顯煥無涯故論云心性不起即是大智慧光明遍照法界若約所放光及所起通即神通光明之藏持業依主配之可知然通與光數皆無量若取類説者通即或六或十光則身光智光三昧正受者唐梵雙彰安住藏中不受諸受名為正受又三昧此云正思謂在定時於所緣境審正思察故正揀尋伺思揀昏沈如曉公説二明與凡聖同體者既入其源即同其體故論云無漏無明種種業幻皆同真如性相華嚴亦云如心佛亦爾如佛衆生然心佛及衆生是三無差別又月上經云我亦當知十方佛皆悉同體覺一法真如體性無有二無量衆生同實際文中二初明聖同一切如來光嚴住持解曰一切即十方三世故華嚴云十方諸如來同共一法身一心一智慧力無畏亦然本覺真理名如能證始覺之智名來始本不二名曰如來是則衆生有本無始是如不來光嚴者重重交光照曜炳著住謂安住永絶攀緣持謂任持不失不壞後明凡同是諸衆生清淨覺地解曰迷真起妄妄見衆生妄體元空全是本覺心地論云一切衆生本來常住入於涅槃妄不能染故云清淨勝鬘經云染而不染然聖證此境直曰住持凡不知同但指覺地三總明稱體圓遍身心寂滅平等本際圓滿十方不二隨順解曰凡聖身心取相似異相皆虗妄當體寂滅寂滅故平等皆同一際即圓覺本際也既與覺體無異故隨體圓滿周遍法界慤云首楞歎虗空之小圓覺嗟法性之寬比之常談海形牛迹不二隨順者隨順不二也西國語倒譯者回文不盡故也生死涅槃為二凡夫順生死二乘趣涅槃今皆不住故云隨順又依報則淨穢不二正報則生佛不二尅體則身心不二通該則自他不二與此相應是隨順矣然凡聖平等復有多義且依佛説佛佛平等法身智身無增減故若依衆生生生平等煩惱業苦有支皆等若生佛相望者凡夫現在等佛過去進修得果等佛現在成佛究竟等佛常住此約三世互望煩惱佛即本有今無衆生即本無今有菩提即衆生本有今無諸佛即本無今有約迷悟異則説今本涅槃之性非三世攝故知三世有法無有是處若以性淨而説則佛與衆生現今平等不妨迷悟之殊是故三乘亦有差別亦無差別衆生寂滅即是法身法身隨緣即是衆生故寂滅非無之衆生恆不異真而成立隨緣非有之法身恆不異事而顯現又如前引華嚴心佛衆生三無差別亦是平等是故染淨三世一切諸法無不平等況稱性互收如是解者名為善住平等心地二稱真現土於不二境現諸淨土解曰先釋義後銷文初中淨土之義四門分別一釋其義相二出其體性三嚴之方便四身土一異初中然土雖多種不出其三一法性土二受用土三變化土若開受用有自有他則成四土統唯二種謂淨及穢或性及相融而為一有異餘宗又一質不成淨穢虧盈異質不成一理齊平有質不成搜源則冥無質不成緣起萬形故形奪圓融無有障礙次出體者小乘八微權教唯心實教法性又四土各別出體分性相者為權融攝者為實三方便者若經本起皆如來神力故法性如是故衆生行業故此通淨穢然隨宜攝物佛應統之故皆稱佛土若就行則唯淨非穢然淨有二種一世間淨離欲穢故以六行為方便上二界為淨土二出世間淨此復二種一者出世所謂二乘以緣諦為方便權教説之無別淨土約實言者出三界外別有淨土二乘所居智論有文二出世間上上淨此謂菩薩即以勝解萬行而為方便以實報七珍無量莊嚴而為其土此復有二一者真極佛自受用相纍兼忘為方便二者未極等覺已還故仁王云三賢十聖住果報唯佛一人居淨土未極之中復有二種一八地已上一向清淨以永絶色纍照體獨立神無方所故其淨土色相難明二七地已還未出三界無漏觀智有間斷故非一向淨若依瑜伽入初地去方為淨土三賢所居皆稱非淨此分受用變化別故然約圓教十信菩薩即有淨土後身土一異者又二初且約權教略配後據實義廣釋初中謂自性身依法性土餘之三身皆依自土鏡智淨識由昔所修因緣成熟從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴自受用身常依而住平智慈力由昔所修隨十地菩薩變為淨土小大劣勝前後改轉他受用身依之而住成智慈力由昔所修隨未登地有情所宜化為佛土淨穢小大前後改轉佛變化身依之而住後廣釋者問法性身土為別不別別則不名法性性無二故不別則無能依所依答經論異説統收法身略有十種土隨身顯乃有五重一依佛地論唯以清淨法界而為法身亦以法性而為其土性雖一味隨身土相而分二別智論云在有情數中名為佛性在非情數中名為法性假説能所而實無差唯識亦云雖此身土體無差別而屬佛法性相異故謂法性屬佛為法性身法性屬法為法性土性隨相異故云爾也又云此佛身土俱非色攝雖不可説形量大小然隨事相其量無邊譬如虗空遍一切處故華嚴云普賢依真住等一切如來皆同所證故上文云一切如來光嚴住持身心寂滅平等本際圓滿十方不二隨順二唯以大智而為法身所證真如為法性土故無性攝論云無垢無罣礙智為法身故三亦智亦如而為法身梁攝論中及金光明皆云唯如如及如如智獨存名法身故此則身含如智土則唯如四境智雙泯而為法身經云如來法身非心非境土亦隨爾依於此義諸契經中皆説如來身土無二五此上四句合為一無礙法身隨説皆得土亦如之六此上總別五句相融形奪泯茲五説逈然無寄以為法身土亦如也此上單就境智以辨七通攝五分及悲願等所修恆沙功德無不皆是法身收以修生功德必證理故融攝無礙即此所證真如體大為法性土依於此義身土逈異八通報化色相功德無不皆是此法身收故攝論中三十二相等皆法身攝然有三義一相即如故歸理法身二智所現故屬智法身三智相並是功德法故名為法身其所依土則通性相淨穢無礙我此土淨而汝不見衆生見燒淨土不毀色即是如相即非相身土事理交互依持通有四句謂色身法身各依色相土及法性土故單雙互望此上通諸大乘教九通攝三種世間皆為一大法身如華嚴説具十佛故其三身等並是此中智正覺攝故土亦如之十上分權實唯以第九屬於圓教若據融攝總前九義為一總句是謂如來無礙身土義隨隱顯不可壘安是故此經即於不二之境現諸淨土達者尋文無生局見上言土有五重者一唯法性屬前三身二者雙泯屬於第四三具性相五六七八之所依故四融三世間屬於第九五總前諸義即第十依釋義門竟次銷本文言於不二境者佛無現土之念如明鏡無心現諸淨土者無念而應緣如鏡無心而現像故肇公云淨土穢土蓋隨衆生之所宜淨者示之以寶玉穢者示之以瓦礫美惡自彼於我無定無定之土乃名淨土隨類普應故云諸也前凡聖一體即從自受用入法性土也此應諸菩薩即從法性現他受用故次云與大菩薩乃至同住如來平等法會第三同體法衆文三一總標與大菩薩摩訶薩十萬人俱解曰先標類具云菩提薩埵摩訶薩埵此翻菩提云覺則所求佛果薩埵云有情則所化衆生此約境釋又此人有了悟之覺餘緣慮之情此約心釋又此是求菩提之有情此約能所釋摩訶大也信大法解大義發大心證大道行大行赴大果故故華嚴地前即云摩訶薩也然今列者但是地上後十萬人標數也二別列其名曰文殊師利菩薩普賢菩薩普眼菩薩金剛藏菩薩彌勒菩薩清淨慧菩薩威德自在菩薩辨音菩薩淨諸業障菩薩普覺菩薩圓覺菩薩賢善首菩薩等而為上首解曰夫聖人無名為物立稱多依行德隨宜別標標立千差皆有所表此等是十萬中標領表十二段法門如次各於一門而為請問之主良以初心識昧未解咨求故菩薩慈悲騰疑為請今各以所詮法義對釋其名文理昭然非強穿鑿智者詳焉文殊師利者梵語訛也正云曼殊室利此云妙德即智德深妙謂道成先劫已稱龍種尊王現證菩提復曰摩尼寶積實為三世佛母豈獨釋迦之師影響華嚴一切咸見是以禮妙慧而不忘敬本勸善財而增長發心印無言於不二之門答光明於三點之會談般若玄致屢質本師説權實雙行頻驚小聖至德若此非妙云何普賢者略有三釋一約自體體性周遍曰普隨緣成德曰賢二約諸位曲濟無遺曰普鄰極亞聖曰賢三約當位等覺德無不周曰普調柔善順曰賢準華嚴三聖圓融觀文殊表解普賢表行行解同體即是毗盧遮那是為三聖故此菩薩常為一對今第一究真妄以成正解故當文殊第二徵幻法而明正行故當普賢良由此經是稱性真身説圓滿覺性故人法儀式懸符華嚴三普眼者由此法門令觀身心無體根識塵境世及出世自身他身一切清淨遍滿法界一切衆生普同諸佛觀行成就頓見如此境界是真普眼也此含悲智謂普見諸法清淨是大智普眼普見衆生成佛是大悲普眼四金剛藏者從喻為名金剛堅而復利堅則無物可壞利則能壞一切此菩薩智亦爾煩惱不能侵外魔不能動堅也能破諸障斷人疑惑利也故起三重甚深之難以消末世之疑疑心既無即具無盡功德故復云藏五彌勒者此云慈氏慈是其姓過去遇大慈如來願得斯號由此得慈心三昧又由母懷時便有慈心故以慈為氏族字阿逸多此云無勝勝德過人故今以姓而呼但云彌勒由此門深究愛根蕩除細惑所以五性修證皆屬輪回彌勒是等覺菩薩一生補處表除微細惑習即得正覺圓明也六清淨慧者表在此門修證地位因果相中而智慧不住不著虗心忘相不為行位差別之相所染若慧不清淨即落地位滯因果乖覺性七威德自在者三觀成就功用猛利邪魔不能嬈妄惑不能侵故八辨音者佛以一音逗於萬類雖此門統明三觀而隨機單復不同故二十五輪各皆證入此菩薩善能辨別隨類圓音故當其問九淨諸業障者一切業障盡依四相而生此門問答除之諸業自然清淨十普覺者從前諸過已離四相又除然於用意行心仍餘作止任滅之病覺猶未普至此決擇四病覺性無瑕普覺諸病故當此矣若具指者普覺本末普覺粗細普覺深淺十一圓覺者然此正宗中諸菩薩等與佛問答發揚本意欲顯圓覺但緣節節過患未盡義意未圓收機未普故表法菩薩未標圓覺之名今有三意得名圓覺一前雖病盡理圓仍恐下根難入又此曲開方便三期道場即上中下普歸圓覺二由前節級行解已圓至此名為證極證極之境更無別體唯是圓覺三最初標指圓覺為陀羅尼門者從本起末今顯義已周還至圓覺者攝末歸本表此三意故當此門十二賢善首者調柔善順曰賢賢之與善義意無別賢謂亞聖善則順理首是頭首欲使萬善齊興俱順真理成正因位亞次聖果者必藉經教經教流通是賢善之首故流通分中當此菩薩三總歎與諸眷屬皆入三昧同住如來平等法會解曰然夫大士必崇德廣業虗心外身崇德故進齊佛果廣業故行彌法界虗心故智周萬物而不為外身故功流來際而非已今此但歎主伴入定同佛會之德者發揚正宗融攝一切為圓滿覺之由致也諸經歎德皆亦各隨所宜言與眷屬者稱性之衆必具主伴如華嚴經故此十萬各有眷屬外徒衆內法行由入定故同住佛境不同前之諸佛但云住持不云入定當爾之時凡聖體同因果一相故云平等法性之會名法會也上來三段不同總明證信六成就竟然此序既含發起義如前科此經又越餘詮欲顯逈超應云六種殊勝謂所聞圓覺是性相源如是能聞結集是文殊等我聞説經之主是佛法身婆伽婆説聽會時心境融合一時説經之處淨土真源聽衆同體皆入三昧故也序分竟自下大文第二正宗分中有十一菩薩相次請問法門節節佛答總十一段束之為二初一問答令信解真正成本起因後十問答令依解修行隨根證入此乃前頓信解後漸修證也亦可初一信次五解次四行後一證至下更辨今且依前夫欲運心修行先須信解真正以為其本若不正所修一切皆邪縱使精勤徒為勞苦權宗多云先且漸修功成後自頓悟若華嚴此經教相儀式皆先頓同佛解方能修證故彼經十信位滿便成正覺然説三賢十聖歷位修行通妨云云故此文殊段中頓彰信解之境後普賢等十菩薩節級顯示總別觀行普賢最初問云聞此圓覺境界云何修行等今初言信解真正者華嚴三聖觀云有信無解增長無明有解無信增長邪見信解圓通方為行本今則頓信本有圓覺本無無明頓出生死名為真正真者揀妄則不同迷倒凡夫但將妄念修行正者揀邪則不同執見異宗及諸外道三聖觀又云信若不信法界信則是邪復云成本起因者最初發起之因也然此經説因意深文略若不會通諸教管窺者信解難生今於文前懸為開示根尋本末總有三重初了圓覺性次發菩提心後修菩薩行了覺性者四大非我五蘊皆空空病亦空了然自覺聖凡相異異則不真生佛體同同豈增減依此悟解終始無殊然堪發心學菩薩行見聞影響何實何虗雖應形聲誰主誰宰不依此悟所作非真自謂修行元是結業故華嚴云不能了自心云何知正道彼由顛倒慧增長一切惡又云設有菩薩無量百千億那由他劫具行六波羅蜜修習種種菩提分法若未聞此不思議大威德法門或聞不信順悟入不得名為真實菩薩若聞此法信解悟入當知此人生如來家具菩薩法離世間法深入如來境界故論中亦先開示二覺次令發三心後方修五行如次配此三重然就初門中引者初門之意最難信用故顯著若是幸不踟蹰二發菩提心者既悟圓覺則堪發大心為萬行本故華嚴二千行法最初以菩提心為所依然有心體心相心德言心體者大悲大智大願三種心是大願是總悲智是別願者樂欲樂欲何事唯發心願樂通達諸法救度衆生故成悲智是故論云信成就發心者略説三種一者直心正念真如法故即是大智無所執著二者深心樂修一切諸善行故即是大願謂四弘等對四諦故三者大悲心救護一切苦衆生故心相者所發之心要無分齊謂約悲願則大悲盡度衆生大願盡修諸行約大智念真如則上無菩提可求下無衆生可度中無萬行可修故淨名云當令此諸天子捨於分別菩提之見皆為無分齊也心功德者若依上發心一念之德過於虗空諸佛同讚多劫不盡故善友翻禮童子羅漢推敬沙彌雖始終不殊而先心難矣是以彌勒二百二十二喻廣顯功能種子生佛法良田長白法大地持世間淨水洗煩惱大風吹無礙盛火燒見薪淨日照世間盛月法圓滿明燈放法光淨目見安危大道入智城慈父訓菩薩慈母生菩薩導師知要道帝王願自在鉗身見刺命持大悲身甘露不死界淨琉性明潔鼓覺煩惱睡無畏毗笈珊陀無生念力住水日精璃寶宅迦王子懇勸善財再親妙德此上二門正是本起因也至文當配三修菩薩行者既已發心當修諸行故善財所見諸善知識一一云我已先發阿耨菩提心未知云何學菩薩行修菩薩道然對上了悟即是依理而修對上發心即是以行酬願難思佛法即之於心非向外求非數他寶廣有萬行統之三學要唯定慧車輪鳥翼互闕無能以是菩薩所依賴故天台宗於止觀意在斯焉此第三門即普眼章已下皆是上三重因兼果成四故我清涼大師答順宗皇帝所問諸經了義綸貫始終亦如次全同此四謂一明識不思議境使信解居懷二真正發菩提心令棲志高尚三巧安止觀萬行助修四回向菩提因果圓滿今本起因即彼一二隨根修證即彼三四是知顯示從凡至聖始終炳著者莫尚斯焉若約從本起末攝末歸本論因果者復成四句一所從之本是因因本起因也二起末正是其因六度萬行三攝末正是其果菩提涅槃二轉依果四所歸之本是果果生佛同成正覺然一與四但是覺性故華嚴所宗性因性果是以因該果海果徹因源初心即得菩提果後猶稱菩薩善財初後俱託文殊智身位地始終同會普光明殿皆斯義矣彼疏云契文殊之妙智宛是初心入普賢之玄門曾無別體然本起之義泛釋難明故此一章拔茅連茹實藉因果相照教理相符文雖稍繁為後綱領傍論已竟次釋本文文中有四一伸請二讚許三佇聽四正説下十初科皆同此四初中三初進問威儀次正陳詞句後三展虔誠後亦皆同今初於是文殊師利菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言解曰文殊表法已具上文餘皆咨求法要恭敬之儀也在大衆中從座起者亦表與一切凡聖同住法性從法空之體起悲濟之用頂禮佛足者以己最尊之頂禮佛最卑之足敬之至矣敬是意業意業無狀但以身口表之下標歎大悲世尊在發問之首即口業矣由隨文便故科之在後然泛論三業歸敬者欲顯諸聖有天眼天耳他心故淨三業故成就三輪因故或在明而遠在暗而近在暗而復遠故身語意如次伸敬今文殊等但是請問之軌俱非上説右繞者隨順之義表順覺性三匝者顯佛一體三寶三身三德表自願滅三道等故諸有三數表義例知長跪者表安危不易叉手者表信解合體心境交參理智冥符定慧無二次正陳詞句文三初問本起之心大悲世尊願為此會諸來法衆説於如來本起清淨因地法行解曰即前第一重也詳佛答處文相皎然咨求法要本為衆生故偏舉大悲之德又阿含經説六種力中如來唯以大悲為力六波羅蜜經云云何大悲能除重簷示勝義故成就有情住法性故諸來法衆者從法性起皆稱法性之衆也説於者但是請説而非問也如來下正是所請請意云夫求果者必觀於因因若非真果還是妄如造真金佛像先須辨得真金成像之時體無增減故首楞嚴經云若以生滅心為本修因欲求如來不生滅果無有是處又云汝觀因地心與果地覺為同為異同則尅證異則不成言如來本起者佛昔本因所起最初之心也如上廣釋清淨者圓照本體元無煩想因地者因行所依之地法行者稱法性之行下文佛答圓照淨覺本無無明等為因體也大集經憍陳如問佛云何名為法行法行比丘佛言若有比丘讀誦如來十二部經樂為四衆敷揚廣説思惟其義是名樂讀乃至是名思惟不名法行若有比丘能觀身心心不貪著外一切相謙虗下意不生憍慢不以愛水溉灌業田亦不於中植諸種子滅覺觀心境界都息永離煩惱其心寂靜如是比丘我則説之名為法行如是比丘若願獲聲聞菩提緣覺菩提如來菩提即能得之憍陳如如工陶師埏埴調泥置之輪上隨意成器法行比丘亦復如是下文佛答圓照淨覺本無無明等為本起初因也占察經亦云善男子若有衆生欲向大乘者應當先知最初所行根本之業最初根本業者所謂依止一實境界以修信解由信解力增長故疾入菩薩種性信成就入初信也所言一實境界者謂衆生心體從本已來不生不滅自性清淨無障無礙平等普遍無所不至圓滿十方究竟一相以一切衆生心一切聲聞辟支佛心一切菩薩心一切諸佛心皆同不生不滅無染寂靜真如相故所以者何一切有心起分別者猶如幻化無有定實釋曰以信解一實為最初業全同今經也配釋可知佛頂經亦然二問發心離病及説菩薩於大乘中發清淨心遠離諸病解曰即前第二發菩提心也故偈直云菩提心矣華嚴云忘失菩提心而修諸善根魔所攝持既為魔攝即過患衆多故請説發心因緣令得永離且中間忘失善根猶被攝持況都未發心修行豈離魔業言及説者揀此非前大乘中者揀宗非小清淨心者菩提心中大智心也直心正念真如故清淨矣離諸病者一發之後永無忘失無忘失故魔惑不嬈下佛答有無俱離覺照亦泯能所絶等此即不發一切心名真發清淨心也若遠而論之至於輪回根本四相四病亦答此意雖下文節節自有別問然此一段之問是諸問根本後為欲備收中下之機故諸門展轉問答以盡此中之理亦如華嚴初會發四十問近則當會答盡遠則九會方終三遠被當來能使未來末世衆生求大乘者不墮邪見解曰末世者佛滅度後正法像法各一千年末法一萬年末法即為末世去聖遙遠深可懸憂故顯益中偏垂結指又初標此會後結當來影略而言現未俱益金剛三昧經中解脫菩薩亦為末劫中五濁衆生請宣一味決定真實令等同解脫曉公因此四句判教求大乘者不墮邪見者謂末法中正解難得其有或縱心五欲或宗習異道或執滯二乘者置之言外縱有發意唯求大乘若不聞此法門亦墮邪見離本心外別有所求見妄見真並為邪見不必六師義如前説故華嚴云一切衆生皆墮邪見後三展虔誠作是語已五體投地如是三請終而復始解曰五體者四肢及頭三請者若唯一二未展虔誠若過於三禮煩則亂故三周終始顯示真心佛雖已知垂範應爾若約所表如三匝説二讚許爾時世尊告文殊師利菩薩言善哉善哉善男子汝等乃能為諸菩薩咨詢如來因地法行及為末世一切衆生求大乘者得正住持不墮邪見汝今諦聽當為汝説解曰先讚後許善哉善哉者智論釋云再言之者善之至也大乘了義理合宣揚針芥未投久默斯要既當嘉會根熟咸臻將演妙門必資發問今之所請實謂起豫利樂實多再三歎善善男子者順理剛斷乃能下牒所問詞正述善之所以得住持者安心覺海永絶攀緣住持萬行無漏無失汝今下許也誡令審諦勿雜餘緣無以生滅心行聽實相法智論偈云聽者端視如渴飲一心入於語義中踊躍聞法心悲喜如是之人可為説三佇聽時文殊師利菩薩奉教歡喜及諸大衆默然而聽解曰歡喜者默聽也即是願樂欲聞十地經云如渴思冷水如飢思美食如病思良藥如衆蜂依蜜我等亦如是願聞甘露法四正説文二初長行後偈頌下皆同此初中四一標示真宗二推窮妄宰三釋成因地四結牒問詞一中復二初明本有覺心後明悟則成佛初中又二一示本體善男子無上法王有大陀羅尼門名為圓覺解曰無上法王即是佛也於法自在更無有上然雖無一衆生而不具有圓覺且塵經未出寶藏猶埋既不自知宛受貧苦唯佛全得其用故但標大覺有之大陀羅尼者此云總持圓覺體中塵沙德用從本已來持之不失故有以攝散釋總持義義與此殊然陀羅尼有三謂多字一字無字今即無字無字即無邊際故言大也故大寶積經陀羅尼品云如來之智攝諸善巧所有宣説無不清淨無有少法所得皆歸於空乃至此是諸菩薩等入陀羅尼門問文字既非真實何用傳經答大品般若云總持非文字文字顯總持由般若大悲離言以言説若據智論即云陀鄰尼梵音小異耳論自翻為能持亦云能遮謂種種善法持令不失惡不善心遮令不生既言持善遮惡即是萬行之本故此標之矣門者是出入義出者一切染淨諸法皆從圓覺流出出淨如次文出染如下文入者若悟圓覺則百千萬法悉皆悟入故下文云覺圓明故顯心清淨乃至遍滿等是知欲了萬法須從圓覺中入又從本起末為出攝末歸本為入迷之則出悟之則入有出入義故名為門此中門者是根本義不同世法門淺室深故寶積經連次前云由是門故出生廣大差別覺慧此則無門之門門清淨故形相門者則為非門所言門者猶如虗空一切諸法依於虗空而有生滅又荷澤云知之一字衆妙之門皆説根本矣名為圓覺者正指其所屬當本體也義具題中二彰德用流出一切清淨真如菩提涅槃及波羅蜜教授菩薩解曰流出者非別有法從中流出於外但依覺性顯示諸門功德無有窮盡應用無有疲厭名為流出故論云若心有動則有過恆沙等妄染之義對此義故心性無動則有過恆沙等諸淨功德相義示現言一切者總標清淨者揀諸有漏有漏之法背真理故性本無故真如等者略舉其四以例百千將欲釋之二門分別初開章解義後依義釋經初中四法各為四別一釋名二出體三辨種類四明業用初真如中一釋名者真謂真實顯非虗妄如謂如常表無變易謂此真實於一切位常如其性故又真者體非偽妄如者性無改異偽是詐偽鍮如真金妄是虗妄影如本質異就橫説多物同時而各殊改約竪論一體前後而變易今皆離此故曰真如謂此實體於未來際常如過去釋竪於色中常如受中釋橫真實相如非為妄似二出體者若約法數即真如無為今依起信以一心為體論云心真如者即是一法界大總相法門體所謂心性不生不滅乃至竟無變壞唯是一心故名真如等三辨種類者或唯一如體中説或二安立非安立故依言離言故或説有七顯於染淨中常如其性故或立十種對十重障辨其德故四明業用者論云真如用者諸佛因地攝化衆生不取相者以如實知衆生及與己身真如平等無別異故以有如是大方便智除滅無明見本法身自然而有不思議業種種之用即與真如等遍一切處釋曰依真如故發智斷惑證體起用若不依之則取我我所相無由修證故知萬德萬行皆是真如用也菩提四者一中梵語菩提此翻云覺若云陀即是覺者義見題中二中約心數即別境中慧若取圓備即攝論云二智二斷為菩提體智論云菩提菩提斷俱名為菩提依今經者即是始覺合本三中或説唯一理智合故即寂之照故或開為二大品明有性淨菩提修成菩提或分為三約三乘故如十地論又起信本覺始覺究竟覺或開為四涅槃經説四品智慧觀十二緣得聲聞緣覺菩薩佛等菩提又大圓等四智菩提或分為五如大品智論説發心等等於伏明出到無上四中謂緣二諦斷二障證二空現萬像印群機該動寂通因果因圓果滿無不由之業用無邊不可具載涅槃者蓋衆聖歸宗冥會之所寂寥無為而廣大悉備形名絶朕識智難思今以無名之名亦為四別一中涅槃正名寂滅取其義類乃有多名總以義翻稱為圓寂以義充法界德備塵沙曰圓體窮真性妙絶相纍為寂二中據六無為即真如擇滅論其圓寂即摩訶般若解脫法身為體所以三者翻三雜染故能證大智冥所證理相纍永寂故然此三德不離一如如一明淨圓珠明即般若淨即解脫圓體法身故此三法不縱不橫不並不別如天之目如世之伊名祕密藏為大涅槃三中或説唯一即大涅槃或二性淨方便淨或三謂自性真應又約三乘或四一自性清淨通凡二有餘依三無餘依通二乘四無住處唯佛四中囊包終古導達群方靡不度生靡不成就故彼經云能建大義又華嚴云不為菩薩示現涅槃欲令常見佛圓滿故但為令衆生生欣樂戀慕故現出現沒佛日常現淨心器中心濁器破則不得見波羅蜜四者一中復二初通後別通者具云波羅蜜多波羅此云彼岸蜜多云到回文順此應云到彼岸也謂離生死此岸度煩惱中流到涅槃彼岸然一切衆生即寂滅相不復更滅但以迷倒妄見生死名為此岸若悟生死本來空寂名到彼岸若就修習分位説者要七最勝之所攝受諸有所修名波羅蜜七謂安住菩薩性依止菩提心意樂悲愍有情事業一切巧便無相智攝回向無上菩提清淨不為障雜若七隨缺非波羅蜜故諸度等名具四句一施非度等然五位通修佛方究竟別者又二初舉數謂對六蔽漸修佛法成熟有情故但説六止觀相由定慧相即故唯説五對治十障證十真如故有其十若總翻諸染即有八萬四千義如下釋後正釋但釋十名已兼六矣謂輟己惠人名施防非止惡為戒堪受諸法未能忘懷為忍鍊心於法為精精心務達為進心慮寂靜為禪推求揀擇為慧方法便宜故名方便希求樂欲為願不可屈伏名力如實決斷為智二中亦有通別通則大菩提心而為體性別者復有相性二宗相者施戒忍進如次以無貪受學無瞋勤等各及所起三業為體禪則等持餘五擇法性者皆從真如性功德起三中通則如釋名中舉數別則有三一者前六各三後四各二一施三者財法無畏二律儀攝善饒益三耐怨害安受苦諦察法四被甲攝善利樂五安住引發辨事六生法俱空無分別慧七回向拔濟八求菩提利樂他九思擇修習十受用法樂成熟有情前前粗後後細易難修習故次第如此二者觀心華嚴疏説三者空心金剛三昧經説四中相無相別二宗相宗者謂六中前三增上生道感大財體及眷屬故後三決定勝道能伏煩惱成熟有情及佛法故其後四者助六令圓滿故謂七助前三餘八九十次助後三如深密説又由前前引發後後復由後後持淨前前又此十中一一相攝互相順故若但説六六攝後四若開為十第六唯攝無分別智後四皆是後得智攝無相宗者準菩提資糧論以般若為初餘五依次般若成五五助般若論偈云既為菩薩母亦為諸佛母般若波羅蜜是覺初資糧施戒忍進定及此五之餘餘四皆由智度故波羅蜜所攝上來解義竟從此依義釋文謂圓覺自性本無偽妄變異即是真如無法不知本無煩惱無法不寂本無生死即是菩提涅槃無慳貪毀禁嗔恚懈怠動亂愚癡即是六波羅蜜餘諸無量無漏等法皆例此知問云準此菩提涅槃各唯一義如何上説無邊德耶答全體即圓覺故別中皆具總故揀之則幻化昨夢收之則一一圓通思之中間云及者有其二義一揀前義顯因果義別二合集義非但流出理果亦及因也教授菩薩者顯上所流真如等法之業用也謂約其情執即似都無妄盡功圓元非新得頓悟理者依之修行能生物解名為教授故論云順本性故修檀波羅蜜等涅槃亦云諸佛師法後明悟則成佛一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道解曰上且標指宗源未曰酬其問目今顯悟之成佛方名本起之因一切等者敘其所問皆依者無佛不然圓照者顯能悟之心圓通照了離於偏局清淨覺相者明所悟也寂寥虗廓了無情塵此中相即是性非為相貌但以初悟之時見有所悟之覺能所未忘故云相也此正同善財初遇文殊表信智見其身相後遇文殊表證智不見身相永斷等者本覺既顯無明本無畢竟不生名為永斷涅槃云云塵沙諸佛以此為因如是用心方成佛道必若心存妄念帶此妄念修行多劫虗事劬勞畢竟不成佛果如前所引積行菩薩音釋嬈乃了切音擾弄也埏值埏尸連切音羶水和土也埴音實黏土也
