body:
  text: 終南山草堂寺沙門宗密述二限內修行文二一明道場行相二明遇夏安居初文二一明隨相用心若佛現在當正思惟若佛滅後施設形像心存目想生正憶念還同如來常住之日懸諸幡華經三七日稽首十方諸佛名字求哀懺悔遇善境界得心輕安解曰於中三節初明佛在世行相正思惟者當知唯心無外境界次若佛下明佛滅後行相心存目想等者明設像之意謂大師去世不覩真儀設像諦觀引心入法相即無相即見如來亦可想佛真身常住不滅懸幡華者嚴飾壇場經三七日者去其久近無別所表稽首十方諸佛名字求哀懺悔等者準諸經論開合不同或二善戒經唯懺悔回向三智論云晝夜三時各行三事謂懺悔勸請隨喜功德無盡轉得近佛五十住婆沙加禮拜回向即常所用晨朝之文唯除發願發願是闍王説矣起信亦同文云應當勇猛精勤晝夜六時禮佛懺悔勸請隨喜回向常不休息其最備者即離垢慧菩薩所問禮佛法經總有八種通説其益則俱能遠離垢障速證佛果若別説者各如注配也一供養除慳貪障感大財富二讚佛除惡口障得無礙辨三禮佛除我慢障得尊貴身四懺悔除三四障依正具足五勸請除謗法障多聞智慧六隨喜除嫉妬障得大眷屬七回向除狹劣障成廣大善八發願除退屈障總持諸行供養者文云嚴持香華等然有三種謂財法觀行財供復有內外事皆可知其法供者即十法行謂於教法書寫供養轉施聽聞披讀受持開示諷誦思惟修習又新華嚴云諸供養中法供養最七行所謂如説修行利益攝受衆生乃至不離菩提心等然稱法施即法供養如善德受教喜見燒身觀行供養者華嚴緣起平等章云菩薩凡所施設乃至一香一華一衣一蓋一供養具皆稱真理等虗空界即以全法之身遊諸佛剎稱真之物供養於佛等彼經又云我以普賢行願力故華香音樂衣服等一一量如須彌諸香油燈燈炷一一如須彌山燈油一一如大海水即同願此香華雲遍滿十方界等讚佛者情發於中而形於言言之不足故歌咏之諸經讚詞甚多不可繁列禮佛者準魏朝勒那三藏禮佛觀門優劣有七一我慢禮身依次立心無恭敬高尊自得耻於下問如碓上下二唱和禮徒肅形儀心無淨想高聲喧雜詞句渾亂上二非儀三恭敬禮敬從心發運於身口五輪著地斷道離蓋住通具眼右膝正覺左膝不邪右手動地左手攝外頂得頂相言發情懇聞唱佛名便念佛身莊嚴晃曜心想成就云云此通人天二乘及六度菩薩宗教中禮也四無相禮發智清淨解佛境界深入法性離能所相自淨身心蕩蕩無礙始教空宗也空是大乘初門故五起用禮觀自身心及一切佛不離法界如影在鏡諸行位地因緣果報一一皆爾故普運身心遍禮一切終教中從禮起用也六內觀禮但禮身內法身真佛不緣他佛若外有可觀邪人行徑若能返照解脫有期終教中顯實宗也不計空色直見本覺真性如論中心體離念等此意以背塵合覺為歸依禮敬也七實相禮若內若外若凡若佛同一實相見佛可禮亦是邪見觀身實相觀佛亦然安心寂滅名平等禮故文殊云不生不滅故敬禮無所觀等頓教禮也即心見境界佛即境見唯心佛不取真棄假泯絶無寄但得如此於法自然常冥法界常禮諸佛亦可第四空觀禮真諦佛五假觀禮俗諦佛六中觀禮第一義諦佛此門則三觀一心禮三諦一境佛廣如彼説清涼大師又加八大悲禮九總攝禮十帝網禮以圓十數順其宗矣行願經云一一佛所現不可説不可説佛剎微塵數身一一身遍禮不可説不可説佛剎微塵數佛盡虗空界無有窮盡念念相續三業無疲今經既是隨相門中且當第三第五禮也餘在下離相攝念中懺悔者具云懺摩此云悔過若別説者懺名陳露先罪悔名改往修來滅除三障四障成淨戒善三障者如佛名經説罪雖無量不出其三一煩惱怨斷慧命賊劫善法瀑河羇鎖二業巧作六道令各不同懺之有三一伏二轉三滅然小乘唯時定報不定者方除大乘一切皆滅又善心懺罪即上下品類歒對若智斷煩惱及防未起之罪則上敵下下敵上三果報時至非空非海山石方所脫之不受唯懺乃滅此三能障聖道及以人天故名為障此三滅者八萬塵勞皆悉清淨四障者華嚴隨好品中加一見障見及煩惱利鈍分異業報則因果分異故然欲懺者先知展轉起由由無始不覺起貪瞋癡煩惱也是業之因也發身口意能發是三業故唯識説皆思為體所發是造業具故梵行品開之成六也造一切業善惡不動是所造業體也受諸苦惱報障也受有順現生後故婆沙云三三合九種從三煩惱生然懺有二意若約責心四障俱懺若就所作唯懺惡業於中復有二種一若犯遮罪先當依教作法悔之二若犯性罪復須起行起行復二一事理二順逆初中事如方等嚴場香塗圓壇高座請二十四尊設膳新衣或洗七齊三浴請一內外律者受二十四戒對師説罪要八日十五日常以七日為期此不可減也佛名經等歸三寶興七心一慚愧二恐怖三厭離四發菩提心五怨親平等六念佛報恩七觀罪性空通於萬行方等唯事佛名理事理如淨名觀罪性空不在內外等難曰觀罪性空罪即滅者觀福性空福亦應滅答曰不也以罪違性福順性故真性望罪是能治能治顯時所治之罪即滅望福是能生能生顯時所生之福無盡故金剛經云無住相布施福德如虗空等普賢觀經及華嚴隨好品具二種懺觀經明晝夜精勤禮佛即是事懺觀心無心從顛倒起若欲懺悔者端坐念實相即是理懺隨好品中等衆生界善身語意業悔除諸障即是事懺觀諸業性非十方來止住於心從顛倒生無有住處等即是理懺事懺除末理懺拔根二順逆者準天台止觀須達順逆十心謂先識十種順生死心以為所治一妄計我人起於身見二內具煩惱外遇惡緣我心增盛三內外既具滅善心事不喜他善四縱恣三業無惡不為五事雖不廣惡心遍布六惡心相續晝夜不斷七覆諱過失不欲人知八虜扈抵突不畏惡道九無慚無愧不懼凡聖十撥無因果作一闡提從無始來若自及他無不皆爾次起逆生死心從後翻破一明信因果二慚愧剋責屏罪慚天顯罪愧人三怖畏惡道翻抵突也四不覆瑕疵翻覆五斷相續心如再犯王法及吐已還食六發菩提心心等虗空翻前惡遍七修功補過翻前縱惡八守護正法翻前滅善九念十方佛翻惡緣也十觀罪性空見無我也若具此者無罪不滅若不解者設入道場徒為勞苦然上理事逆順若皆相應則一念懺悔功德與無始惑業齊等義如行願經婆沙論勸請者凡小自度但懺而已菩薩愍衆故須勸請勸請有二一請轉法輪偈云云謂知聲如響了法真實畢竟無主知佛法輪所出生處即常請常説未曾失時二請佛住世偈云云準行願經三乘賢聖諸善知識皆請住世然其義意乃有二請一隨相請可知二稱性請謂佛本常住衆生心垢業惡故不能見但依智離識常作佛觀心清智明即常見佛此義如下遍修三觀中釋故行願經云虗空界盡乃至我此勸請無有窮盡念念無間三業無厭請説請住皆爾隨喜者隨所見他善事而生歡喜又隨順歡喜也由昔不喜他善故今發隨喜心而慶悅彼以除之也準行願經於如來因果善根及六趣二乘一切菩薩所有功德悉皆隨喜佛為最勝所以先明法華則唯隨喜如來權實功德回回轉向趣向者回己修善向於三處謂實際菩提衆生展局成廣如聲入角所以要此三者凡是菩薩必大悲下化大智上求而離衆生及菩提相又此三者其必相資一即具三方成其一發願者策勵運意為發希求樂欲為願即四弘誓或五願也彌綸諸行直至菩提菩提心戒以之為體然上八重生起有緒謂發心香華供養口讚身禮次洗滌法器欣求法雨攝他同己回向三處願皆成佛然行願雖云十種但於勸請回向中開別義耳若不備斯理事何成禮懺觀門故為辨明勿譏其廣末後兩句道場獲益或見佛像或覩光明不作聖心即善境界身心調暢輕利安和神氣精明肢體柔潤論中説禮懺等五事已亦結云得免諸障善根增長天台止觀第九門中善根發相有其真偽偽者隨因所修數息等禪彼先説五停心觀發相後始明此真偽故所發之法身手紛動或重或輕或寒或熱或念散善或起惡覺乃至憂喜驚樂此名邪定若人念著多好失心或鬼神知之則加勢力令發諸定智辨神通感動世人謂得道果乃至命終墮鬼神道若因此行惡即墮地獄若能知之正心不著即當謝滅真者無有如上之法一一禪發即與信等相應分明清淨內心悅樂智鑒分明身意柔軟微妙虗寂厭患世間唯欣出離若見此善根發時應隨所宜或止或觀修令增長今經云遇善境即信等相應次云攝念等及下修三觀即彼長養之意隨相意二明離相用心過三七日一向攝念解曰亦名會緣入實謂初以塵心粗重令託勝相為緣相既皆虗誠宜入實攝念者論云若修止者住於靜處端坐正意乃至心若馳散即當攝來住於正念正念者當知唯心無外境界然論與經皆先以禮懺等除惑業之濁次以正念攝馳散之動空而又寂方能現佛境之像二明遇夏安居文三一標異聲聞若經夏首三月安居當為清淨菩薩止住心離聲聞不假徒衆至安居日即於佛前作如是言解曰然建道場或在伽藍或於餘處期限未滿夏首已臨入衆安居則乖誓約自終期限又犯毗尼道場中人由此疑惑如來遠念故為辨明為俗乖律即非因大廢小無失故決定毗尼經説持聲聞戒是破菩薩戒持菩薩戒是破聲聞戒心離聲聞者大小不同次下即説不假徒衆者不必六和作如是言亦在下二正陳詞句我比丘比丘尼優婆塞優婆夷某甲踞菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆解曰比丘梵語此含三義故存梵不譯一怖魔二乞士三淨戒尼者女也謂女比丘優婆塞夷者此言近事男女謂親近比丘比丘尼而承事故小乘局於二衆大乘道俗俱霑踞者居也菩薩乘者揀羊鹿車寂滅行者揀四諦行藏海疏云伽藍此云衆園園是衆居處故圓覺則萬德所依以八識海澄流注寂滅體遍法界故得名大於四智中則圓鏡也身心安居者身者五識身依五色根故心即第六意識以五識取塵意識分別熏動心海波浪從生故不名安今意無分別五不妄緣識浪永寂與體一如故名安也身安故即成所作智心安故妙觀察智平等性智者比以四惑相應妄計賴耶為自內我於平等理中起不平等見今既所緣性寂能緣七識自如如性皆同故平等矣涅槃自性無繫屬者為揀二乘計著方處今順法性故無所屬大因緣故者不拘小節之意也然小大安居略有八異一所依異別界圓覺二假實異定實示現三住持異事相實相四結安異對手作法獨自稱名五成安異身不出界心不起念六失安異身出越界念起背本七還界異身不逾時及界念不間斷而覺八所祈異阿羅漢果無上菩提問大小二藍何寬何狹答若以成相則大寬小狹界內及圓覺故若以破相即小寬大狹出界及當處念起故三結示休期善男子此名菩薩示現安居過三期日隨往無礙解曰道場三期已滿小乘夏限未終以本非小乘安居故不妨隨往無礙三誡取邪證善男子若彼末世修行衆生求菩薩道入三期者非彼所聞一切境界終不可取解曰此文是總標加行中所證之境誡其邪謬非彼所聞境界者夫信解行證雖階級不同而所信乃至所證之法始終不異謂解則解其所信修則修其所解證則證其所修今明證得境界若非本所信等法即不應取二答加行文三一別修三觀二遍修三觀三互修三觀初文二一別釋二總結初中三一靜觀二幻觀三寂觀初中又三一修觀成善男子若諸衆生修奢摩他先取至靜不起思念靜極便覺如是初靜從於一身至一世界覺亦如是解曰至靜等義具在前明覺亦如是者例於靜也應云如是初覺從於一身至一世界靜即是體是定覺即是慧是用初觀成不見自身之相名一身靜以我身靜時當體是覺名一身覺世界亦然二起功用善男子若覺遍滿一世界者一世界中有一衆生起一念者皆悉能知百千世界亦復如是解曰知衆生念者世界既全成覺衆生全在覺中故所起念無不了達如影入鏡鏡照無遺百千世界類此可解説則以一例多覺發則同時已遍三誡邪證非彼所聞一切境界終不可取義同上也二幻觀文二一明正觀善男子若諸衆生修三摩鉢提先當憶想十方如來十方世界一切菩薩依種種門漸次修行勤苦三昧廣發大願自熏成種解曰憶想等者前至靜觀不假外緣今起幻門中須憑聖境前威德段中圓説故約大悲化生今道場之內且自剋修故約大智求佛亦可諸佛菩薩必以大悲為本但依佛菩薩種種之門自然具大悲也道場之內且學悲心限滿對緣即將化用漸次等者前至靜歸體功則頓現今隨差別之相故應漸次所以前有起於功用今即無文是斯意也又亦可以例合有功用但是文略或傳譯脫漏願熏成種者但能發願願不虗行願廣心真漸熏成種即前文云願我今者住佛圓覺莫值外道二乘是也二誡邪證非彼所聞一切境界終不可取文義亦同三寂觀文三一修觀成善男子若諸衆生修於禪那先取數門心中了知生住滅念分齊頭數如是周遍四威儀中分別念數無不了知解曰先取數門者先用數息觀門治諸覺觀漸入妙境然修息者有六妙門謂一數二隨三止四觀五還六淨據天台説或依次第或隨便宜及對治旋轉觀心等次第者六各有二一修二證數中修者調和氣息不澀不滑安詳徐數從一至十想心在數不令馳散證者覺心任運住於息緣即捨數修隨下皆説捨前修後之意也隨中修者隨息出入想心緣息無分散意證者心既微細覺息長短遍身入出心息任運相依綿綿若存若亡恬然凝靜即捨隨修止止中修者不念前二凝寂其心證者覺身心泯然不見內外觀中修者定中觀於細微出入息想身心不實剎那不住定何所依證者覺出入息遍諸毛孔心眼開明徹見三十六物得四念處破四顛倒還中修者反觀觀心無所從生何有觀境境智雙亡道源之要證者心眼開發不加功力任運破析返本還源淨中修者知五蘊空故不起妄想心本淨故證者如是修時豁然開發三昧正受心無依倚無漏慧發隨便宜者謂於六中調試其心各經數日即知便宜隨便而用心若安隱必有所證證者謂種種禪定對治者攀緣諸境即數乍昏乍散即隨氣粗心動即止貪瞋障起即觀癡邪障起即還惡念惡境即淨然上三門有其通別謂凡夫求樂外道有見二乘求涅槃也菩薩通修數息道而宗趣不同故所證亦別今且唯明菩薩者但為求無師自然智如來知見愍念衆生故修息也如經中説阿那般那三世諸佛入道之初門故新發心菩薩欲求佛道應先調心數息知息幻化非生死涅槃以平等大慧無取捨心入於中道名見佛性得無生忍今經所明即是此意此後二門則一向別唯一乘故旋轉者如數息時先發願度生嚴土即當了所數之息即空空即息非真非假非世出世如夢幻等無而分別息念亦爾不妨從一至十了了分明知此息相成就世出世間一切諸法一一通達説不可盡餘隨等五一一如是觀心者此為上根不由次第懸照法源源者心也觀心無相即了萬法約心數法心即數門心數隨心即是隨門心寂即止覺心即觀心無能所即還惑不能染即淨直觀心性六門即具不由次第今此經者用心在此第五前云以淨覺心故此云心中了知故修在初門文云先取數門及漸進故或亦二三唯云先取數者舉一例於餘故成在第四乃至得知百千世界故或始終唯在第五心即數門不必息故心中了知下三句者由前心息相依息調心淨因息數而入心數或不由息但入心數故了知心中生住異滅粗細妄念本末分劑頭緒數量一一分明謂生滅各一住四異二經無異字者或略之且順三世或傳寫脫漏故論云得無念者則知心相生住異滅乃至同一覺故既云無念同於一覺正當此門絶待中觀問文無無念之言云何同此答三觀體用文在前章今此但明修之方便彼有絶對待之念又有寂滅之文由是科云靈心絶待絶待無念一覺靈心豈非同耶絶念之慧方能了知生住滅念故於此觀明之然論約究竟極證故説位滿方盡今據觀門慧發故許俱時了知周遍四威儀等者初則宴坐照見後則行住皆知知即無患譬如妖魅所欲著人若知其名自然消滅二起功用漸次增進乃至得知百千世界一滴之雨猶如目覩所受用物解曰淨心是圓覺體世界本在其中觀行成就全合靈源如雨渧固宜本分非論雨滴萬物皆然舉一例諸且標雨滴故前釋云旋轉諸法一一通達凡夫之類迷此靈心隨念所知故無其用三誡取邪證非彼所聞一切境界終不可取義準前也然此三觀雖各有證相理實圓修方證圓覺如前文説天台三止三觀證中第十門也亦云具修方為究竟謂了知諸法因緣虗假從假入空次從空入假因此入中雙照二諦心心寂滅自然流入薩婆若海於一念中具一切佛法了了見性安住大乘行步平正其疾如風行如來行入室著衣坐牀六根清淨於一毛孔具含一切乃至八相成道即是初發心住菩薩如華嚴涅槃大品法華等説後心證果境界則不可知推教所明不離止觀之果如法華涅槃所説今經證相即初住也又彼説六妙門證相云證有二種一者解證無礙巧慧不由心念自然圓識法界二者會證妙慧朗然開發明照法界通達無礙此復二種一相似證如法華六根清淨二真實證復有三等一初證即初發心住以正慧開如來藏顯真法身亦名為體二中證中間諸位三後證得一念相應慧妙覺現前窮照法界功用普備今經證相即相似也彼知三千界內一切所有此知百千世界心念雨滴故或即實證之初靜極覺遍故所知世界越三千故前云心現十方佛故下云如來出現世故圓頓教中因果交徹前後證相不局定故三總結是名三觀初首方便解曰前問云三種淨觀以何為首故具答已結云是名等也即知前段三觀諸輪雖具釋相趣入方便是此所明二遍修三觀若諸衆生遍修三種勤行精進即名如來出現于世解曰如來本所示生只緣勸物修習今三觀既備則萬行已圓故就此人已名佛出又即此人本覺離念名為佛出然前離四病云證覺般涅槃今修三觀名如來出世今以出世涅槃相對而釋有其二門一約實義二約對機實義有三一緣起即空之真諦則非出非般故大經云如來不出世亦無有涅槃二真如緣起之俗諦則念念處處而出現念念處處而涅槃大經又云菩薩應知自心念念常有佛成正覺如自心一切衆生心亦復如是即念念也又云當知無有少許處空無佛身即處處也涅槃者即如上遍一切處出現之佛身既是緣起有為之相念念即生即滅四相同時今以生生即滅為念念處處而般涅槃三約第一義諦即常住世常涅槃謂寂而常照故為住世照而常寂故為涅槃對機者機緣感則菩提樹下而出現機緣盡則雙林樹間而涅槃故大經云佛子諸佛如來為令衆生生欣樂故出現於世欲令衆生生戀慕故示現涅槃譬如日出普照世間淨水器中等對今經意配釋可知三互修三觀文三一明修觀不成若後末世鈍根衆生心欲求道不得成就解曰下中之下力不遂心二令懺除惑業由昔業障當勤懺悔常起希望先斷憎愛嫉妬諂曲求勝上心解曰重發誓願決心欲證加功勵志懺業斷惑論中亦云若人修行信心以從先世罪業衆多障礙應當勇猛禮懺等三令隨便互修三種淨觀隨學一事此觀不得復習彼觀心不放捨漸次求證解曰有人色想所礙空靜之觀難成先觀色幻幻即全空靜觀方成復有執定實色礙於心識難觀假幻先知其體本無而不妨覩其假相方成幻觀復有修中難成絶待先知假全空而無假空全假而無空空假俱無絶於對待方見寂滅又有人直見心源方知諸法即性故空不壞相故假或但從性現故假無別所現故空先後綺互如諸輪説偈讚中二第一道場中三初一偈期限爾時世尊欲重宣此義而説偈言圓覺汝當知一切諸衆生欲求無上道先當結三期次三句行相懺悔無始業經於三七日然後正思惟正思惟者攝念已後文也後二句誡邪非彼所聞境畢竟不可取長行總別相計四段此則合為一處第二加行中三初一偈別修奢摩他至靜三摩正憶持禪那明數門是名三淨觀次二句遍修若能勤修習是名佛出世後五句互修鈍根未成者常當勤心懺無始一切罪諸障若消滅佛境便現前結前及安居之法長有偈無佛境出現長先偈後餘但文略大文第三流通分謂正宗之分法義已周欲使廣益他方遠霑來世流傳通泰展轉無窮故有此分都無人傳是不流流則不住不滯傳之遇其障難是不通通則不壅不塞文五一慶聞深法請問流通二讚許佇聽交感流通三依問宣説內護流通四稟命加衛外護流通五時衆受持總結流通初文三段同上今初於是賢善首菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言可知二正陳中二一慶聞所詮大悲世尊廣為我等及末世衆生開悟如是不思議事解曰近慶道場遠該一部二請問能詮世尊此大乘教名字何等云何奉持衆生修習得何功德云何使我護持經人流布此教至於何地解曰然正宗分中但問所詮法義法義雖已圓備凡心難可任持聞時領會分明過後恐還遺忘事須持教貫穿文既不遺隨文解義依義起觀方成真正修行故此問經教也名字者解義先須識名迷名於義不了奉持者前雖已説持法今問持教功德者依理修行證聖已知功德無邊受持名教恐無利益故問護持者如何擁護持經之人流布等者總結十法行也謂於此經供養寫施聽受讀誦説釋思修如是分布流傳展轉終歸何地後三展虔誠作是語已五體投地如是三請終而復始二讚許爾時世尊告賢善首菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是經教功德名字汝今諦聽當為汝説三佇聽時賢善首菩薩奉教歡喜及諸大衆默然而聽三依問宣説文二初且標能説能護之人善男子是經百千萬億恆河沙諸佛所説三世如來之所守護十方菩薩之所歸依十二部經清淨眼目解曰説此經佛既是真身真身無礙塵沙同體故一説即是多説華嚴云十方諸如來同共一法身一心一智慧力無畏亦然又不了義經則隨方有説不説了義之教無佛不談如華嚴云我不見有佛國土不説此經等守護亦如華嚴經云我等諸佛護持此法令未來世一切菩薩未曾聞者皆悉得聞歸依者因行之中無不從此成佛眼目者良以推窮迷本照徹覺源是以理貫群經義無不盡於此若解則諸教煥然若不了之何知正道故云眼目二正答所説所護之法文五一答名字二答所至三答奉持四答功德五答護持今初是經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來決定境界亦名如來藏自性差別汝當奉持解曰經有五名二名已釋祕密王三昧者非器不聞名祕隨器異聞名密三昧之名其數無量圓覺三昧是彼根源故稱王也如來決定境界者極證之處如來藏自性差別者如來藏即圓覺在纏之名妄不能變名為自性隨緣起妄名為差別又空如來藏不空如來藏即是差別汝當奉持者敕令依此名義而持然答奉持之問者若以文顯則不妨因説經名承其文勢便於此答若以義求則在後頓漸文中二答所至文二一標行所依善男子是經唯顯如來境界唯佛如來能盡宣説解曰前云是諸衆生清淨覺地又説無明貪愛四相四病今云唯顯如來境界者下句自釋唯佛能説故説無明等皆無所有正是佛境佛境若不顯現衆生豈得皆空生若不空豈徹覺地故華嚴信位即佛境甚深雖智與知殊皆佛境界是此意也二依修所至若諸菩薩及末世衆生依此修行漸次增進至於佛地解曰依此修行者含十法行由經唯顯佛境故修之必至佛地三答奉持文二一法善男子是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切群品解曰宗是頓教事具漸門既漸頓俱收則遲速皆益己悟者文字性離而持法未悟者無離文而持義是奉持之相也入與不入總可留心故正宗中分上中下二喻譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿解曰謂漸教則乖頓教頓門必具漸門蚊虻飲海喻二乘受持修羅所飲喻菩薩受持大海有無量之水飲之則量腹之多少圓覺有無邊法門受之則隨器漸頓四答功德文三一以施寶校量顯聞經勝意明其福以福校量二以度人校量顯説經勝意明其智非智不能度人故又聞者假令不解亦生其福説者必無不解故唯智也三以宿因反驗顯信經勝雙明福智初中二初舉劣善男子假使有人純以七寶積滿三千大千世界以用布施解曰積福可知二顯勝不如有人聞此經名及一句義解曰如金剛經校量文例慤云且世珍盈剎能為漏果之資妙法一言必獲菩提之報二以度人校量者謂前以劣福顯勝福此以劣智顯勝智文二初舉劣善男子假使有人教百恆河沙衆生得阿羅漢果解曰積德可知二顯勝不如有人宣説此經分別半偈解曰凡全偈者所謂四句句有二種謂文句義句若約文句即兩句為半偈若約義句則説一切法本來空寂是半偈也顯空體不空方為全偈或無常真常為半及全三以宿因顯信經勝雙明福智者經文自顯也文二一明聞信善男子若復有人聞此經名信心不惑可知二驗宿因文二一反顯當知是人非於一佛二佛種諸福慧可知二順明如是乃至盡恆河沙一切佛所種諸善根聞此經教解曰亦如金剛文勢然此宗信者必是即解之信信該果海不是小緣故驗宿因亦非聊爾人耳五答護持汝善男子當護末世是修行者無令惡魔及諸外道惱其身心令生退屈解曰前問云何護持今答意云但莫令惡魔外道惱身心者即是護持然惱身心俱通魔外若以義配者外道以邪智惑人令疑是惱心也魔以神力令人種種不安乃至病等是惱身也故經説衆魔者樂生死外道者著諸見等等取瓔珞是非勝負二事皆令初心行人退屈實藉護持四稟命外護文三一力士衆爾時會中有火首金剛摧碎金剛尼藍婆金剛等八萬金剛并其眷屬即從座起頂禮佛足右繞三匝而白佛言世尊若後末世一切衆生有能持此決定大乘我當守護如護眼目乃至道場所修行處我等金剛自領徒衆晨夕守護令不退轉其家乃至永無災障疫病銷滅財寶豐足常不乏少解曰金剛者執此杵故若取名者梵云諾健𨹔神此云露肩露肩神也首頭也頭有火焰故摧碎者從用得名尼藍婆者未見翻譯此神等初發心時常願為力士護修行人其家者在家衆也凡發大心皆有障難障難多種略舉災病故云乃至財寶足者備道資緣不必富奢方名豐足故次云常不乏少不乏故即進趣妙門不退屈也二天王衆爾時大梵王二十八天王并須彌山王護國天王等即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經者常令安隱心不退轉解曰大梵者別指初禪王娑婆世界主二十八天者總指三界須彌山王別明帝釋護國者別顯四王別標三類者以梵與釋諸佛轉法輪時皆為請主護世持國使災害不生故於總列之外而更別明三鬼王衆爾時有大力鬼王名吉槃荼與十萬鬼王即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經人朝夕侍衛令不退屈其人所居一由旬內若有鬼神侵其境界我當使其碎如微塵解曰吉槃荼者亦名鳩槃荼食人精血其疾如風變化稍多住於林野管諸鬼衆故號為王來至道場而為上首其數十萬一一若斯依附深山或居巖穴其形可畏通變極多不屬人天住居鬼趣一由旬者則四十里或十六里五時衆受持佛説此經已一切菩薩天龍鬼神八部眷屬及諸天王梵王等一切大衆聞佛所説皆大歡喜信受奉行解曰文殊所問經説有三種義歡喜奉行一説者清淨不為取著名利所染故二所説清淨以如實知法體故三得果清淨即説益也自惟無始迷心海曠劫漂沉生死波塵沙諸佛出人中浮木盲龜難值遇何幸此身逢了教千重疑滯類冰消尋思纍世積聞熏慚愧多生善知識上士慈悲哀末世始終次第為咨詢能仁應感稱心源本末無遮頓演説已採群詮扣真寂隨應聖旨解斯文普回功德向衆生同入神通大光藏音釋虜扈虜音魯掠也扈音止也隨從也疵音𭎔病也渧音帝滴水也奉為明故禮部主事沈韞所琦懺業修福衆等損資刻此圓覺大疏全部所願亡靈乘此法力早悟圓覺淨性遠離生死空華見佛證果登不退地者除科文外通計全疏一十二卷計字一十三萬一千六百五十算該工銀六十八兩四錢六分除收過尊長親朋暨兄弟姪子女妾及家人助懺銀共四十五兩三錢五分送刻場用外尚少二十三兩乙錢一分同胞弟珫珣補足刻成明萬曆丁未冬十月徑山寂照庵識
